<script>
// ============================================================
//  ORB SHIFT v6 — Audio Edition
// ============================================================
const canvas=document.getElementById('gc'),ctx=canvas.getContext('2d');
let W,H,SCALE;
function resize(){const d=Math.min(window.devicePixelRatio||1,2);W=window.innerWidth;H=window.innerHeight;canvas.width=W*d;canvas.height=H*d;ctx.setTransform(d,0,0,d,0,0);SCALE=Math.min(W,H)/400}
resize();window.addEventListener('resize',resize);

// Easing
function easeOutBack(t){const c=2.2;return 1+(c+1)*Math.pow(t-1,3)+c*Math.pow(t-1,2)}
function easeOutElastic(t){if(t===0||t===1)return t;return Math.pow(2,-10*t)*Math.sin((t*10-0.75)*(2*Math.PI/3))+1}
function easeOutCubic(t){return 1-Math.pow(1-t,3)}
function easeInQuad(t){return t*t}

// ============================================================
//  WORLD THEMES
// ============================================================
const WORLDS=[
  {name:'Haunted Lab',bgTop:'#080412',bgBot:'#030108',
   glow1:'40,15,55',glow2:'50,20,10',mist:'80,55,120',
   particle:'160,120,220',silTint:'#0a0716',vigStr:0.7,
   // Audio: dark drone root, glassy alchemy overtones
   audioTint:{droneFreq:55,droneFreq2:82.5,padFreq:110,bellFreqs:[440,554,659],bellRate:0.018,filterFreq:800,filterQ:1.2,droneGain:0.055,padGain:0.028}},
  {name:'Arcane Cathedral',bgTop:'#0a0618',bgBot:'#04020c',
   glow1:'50,20,80',glow2:'30,15,60',mist:'90,60,140',
   particle:'140,100,200',silTint:'#0c0820',vigStr:0.65,
   // Audio: airy choir-like pad, resonant bells
   audioTint:{droneFreq:65.4,droneFreq2:98.1,padFreq:130.8,bellFreqs:[523,659,784],bellRate:0.022,filterFreq:1200,filterQ:0.8,droneGain:0.045,padGain:0.034}},
  {name:'Enchanted Grove',bgTop:'#040e08',bgBot:'#020806',
   glow1:'15,50,30',glow2:'20,40,15',mist:'50,100,70',
   particle:'80,180,120',silTint:'#060e0a',vigStr:0.6,
   // Audio: warmer, natural shimmer
   audioTint:{droneFreq:73.4,droneFreq2:110,padFreq:146.8,bellFreqs:[587,740,880],bellRate:0.026,filterFreq:1600,filterQ:0.7,droneGain:0.04,padGain:0.038}},
  {name:'Moon Ruins',bgTop:'#08081a',bgBot:'#030310',
   glow1:'30,30,70',glow2:'20,15,50',mist:'70,70,130',
   particle:'120,120,200',silTint:'#080818',vigStr:0.7,
   // Audio: hollow distant, cold bells
   audioTint:{droneFreq:49,droneFreq2:73.4,padFreq:98,bellFreqs:[392,494,587],bellRate:0.015,filterFreq:600,filterQ:1.5,droneGain:0.05,padGain:0.022}},
  {name:'Celestial Observatory',bgTop:'#0c0816',bgBot:'#040210',
   glow1:'60,25,80',glow2:'40,20,60',mist:'100,70,150',
   particle:'180,140,240',silTint:'#0e0a1e',vigStr:0.65,
   // Audio: cosmic shimmer, celestial sparkle
   audioTint:{droneFreq:61.7,droneFreq2:92.5,padFreq:123.5,bellFreqs:[622,740,932],bellRate:0.028,filterFreq:1400,filterQ:1.0,droneGain:0.048,padGain:0.032}}
];
function getWorld(lvl){return WORLDS[Math.floor((lvl-1)/3)%WORLDS.length]}
function getWorldIdx(lvl){return Math.floor((lvl-1)/3)%WORLDS.length}

// Colors
const ORB_COLORS=[
  {name:'Arcane',h:'#c44dff',g:'#7a18b0',r:[196,77,255],rg:[122,24,176],trailStyle:'wisp',trailHue:'200,160,255'},
  {name:'Ember',h:'#ff4d4d',g:'#b01818',r:[255,77,77],rg:[176,24,24],trailStyle:'spark',trailHue:'255,160,60'},
  {name:'Aether',h:'#4dc8ff',g:'#1870b0',r:[77,200,255],rg:[24,112,176],trailStyle:'droplet',trailHue:'140,220,255'},
  {name:'Venom',h:'#4dff7c',g:'#18b040',r:[77,255,124],rg:[24,176,64],trailStyle:'vapor',trailHue:'100,255,160'},
  {name:'Solar',h:'#ffd24d',g:'#b09018',r:[255,210,77],rg:[176,144,24],trailStyle:'glitter',trailHue:'255,230,140'}
];

// ============================================================
//  STATE & GLOBALS
// ============================================================
const STATE={TITLE:0,LEVEL_INTRO:1,PLAYING:2,LEVEL_COMPLETE:3,COMPLETING:4};

// ============================================================
//  FIREBASE SETUP
// ============================================================
const firebaseConfig={
  // ⚠️ Fill in your Firebase project config:
  apiKey:"YOUR_API_KEY",
  authDomain:"YOUR_PROJECT.firebaseapp.com",
  projectId:"YOUR_PROJECT_ID",
};
let db=null;
try{
  if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);
  db=firebase.firestore();
}catch(e){console.warn('Firebase init failed:',e);}

// ============================================================
//  GAME ID (shared by reactions)
// ============================================================
const GAME_ID='orb_shift';
let state=STATE.TITLE;
let level=1,score=0,totalScore=0,streak=0,bestStreak=0;
let orbsMatched=0,orbsMissed=0;
let containers=[],activeOrb=null,landingOrb=null;
let particles=[],mistLayers=[],bgParticles=[];
let transitionAlpha=1,transitionDir=-1,transitionCallback=null;
let shakeTimer=0,shakeIntensity=0;
let starAnimTimer=0,levelIntroTimer=0,completionTimer=0;
let screenFlashAlpha=0,spawnTimer=0;
let wrongFlashTimer=0,wrongFlashX=0,wrongFlashY=0;
let matchFlashTexts=[],completionBurstDone=false;
let orbSpawnCount=0,titleTime=0,gearAngle=0;
let trailingOrbs=[]; // extra orbs that follow behind the active orb at higher levels
let fgOcclusionZones=[];
let currentSpawnDelay=1200;
let levelTimer=0;        // counts DOWN — seconds remaining
let containerTierWins={}; // tracks wins per container count for gradual speed ramp
let levelTimerMax=0;     // set per level
let damageFlashTimer=0;  // full-screen damage overlay

// ============================================================
//  LEVEL CONFIG — smooth progression
// ============================================================
function getLevelConfig(lvl){
  const numContainers=lvl<=2?2:lvl<=4?3:lvl<=7?4:5;
  const fillTarget=Math.min(3+Math.floor((lvl-1)/2),8);
  // Base speed tied to container tier — deliberately gentle, ramps on repeat wins
  const tierSpeeds={2:4.5,3:5.2,4:6.0,5:7.0};
  const tierWins=containerTierWins[numContainers]||0;
  const tierBoost=Math.min(tierWins*0.28,1.1); // up to +1.1 after 4 wins in tier
  const baseSpeed=(tierSpeeds[numContainers]||4.5)+tierBoost;
  const baseDelay=lvl<=3?Math.max(800-lvl*50,550):Math.max(650-(lvl-3)*55,220);
  // Trailing orbs: 0 until L5, 1 from L5, 2 from L9
  const trailCount=lvl>=9?2:lvl>=5?1:0;
  // Gap between leader and each trailer (ms equivalent in Y-pixels at base speed)
  const trailGap=lvl>=9?H*0.22:H*0.28;
  // Timer: generous early, tightens per level, floor 20s
  const timeLimit=Math.max(55-lvl*3,15);
  return{numContainers,fillTarget,baseSpeed,spawnDelay:baseDelay,trailCount,trailGap,timeLimit};
}
function getSpawnDelay(){
  const base=getLevelConfig(level).spawnDelay;
  if(orbSpawnCount>0&&orbSpawnCount%3===0)return base*1.5;
  return base*(0.85+Math.random()*0.3);
}

// ============================================================
//  AUDIO SYSTEM
// ============================================================
const Audio={
  ctx:null,
  initialized:false,
  muted:false,
  masterGain:null,
  musicGain:null,
  sfxGain:null,
  // Ambient music nodes kept alive
  droneOsc1:null,droneOsc2:null,
  padOsc:null,
  droneGainNode:null,padGainNode:null,
  ambientFilter:null,
  // Convolver for subtle room feeling
  reverb:null,
  reverbGain:null,
  dryGain:null,
  // Bell scheduling
  bellTimer:0,
  currentWorldIdx:-1,

  // ── Init ──────────────────────────────────────────────────
  init(){
    if(this.initialized)return;
    try{
      this.ctx=new(window.AudioContext||window.webkitAudioContext)();
      if(this.ctx.state==='suspended')this.ctx.resume();

      // Master chain: dry + reverb blend → master → speakers
      this.masterGain=this.ctx.createGain();
      this.masterGain.gain.value=0.72;
      this.masterGain.connect(this.ctx.destination);

      // Music sub-bus
      this.musicGain=this.ctx.createGain();
      this.musicGain.gain.value=0.9;
      this.musicGain.connect(this.masterGain);

      // SFX sub-bus
      this.sfxGain=this.ctx.createGain();
      this.sfxGain.gain.value=1.0;
      this.sfxGain.connect(this.masterGain);

      // Lightweight reverb via short convolver impulse
      this._buildReverb();

      // Start ambient layers
      this._startAmbient();

      this.initialized=true;
    }catch(e){
      console.warn('Orb Shift: Audio unavailable',e);
    }
  },

  // ── Reverb impulse (lightweight — 1.2s IR) ────────────────
  _buildReverb(){
    const ac=this.ctx;
    const len=ac.sampleRate*1.2;
    const buf=ac.createBuffer(2,len,ac.sampleRate);
    for(let ch=0;ch<2;ch++){
      const d=buf.getChannelData(ch);
      for(let i=0;i<len;i++){
        d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.4)*0.9;
      }
    }
    this.reverb=ac.createConvolver();
    this.reverb.buffer=buf;
    // Reverb send/return
    this.reverbGain=ac.createGain();
    this.reverbGain.gain.value=0.18;
    this.reverb.connect(this.reverbGain);
    this.reverbGain.connect(this.masterGain);
  },

  // ── Ambient breath engine — no continuous oscillators, no hum ───────────────
  // Instead: sparse scheduled sine breath-pads that fade in and out gently,
  // separated by silence. The bells carry all the tonal interest.
  _startAmbient(){
    this.currentWorldIdx=getWorldIdx(level);
    this.breathTimer=0; // accumulated seconds; triggers a new pad breath
    this.breathInterval=7+Math.random()*5; // first breath in 7-12s
  },

  // Spawn one gentle breath: pure sine trio with slow fade-in/out, no buzz
  _breathNote(freq,peakGain,fadeIn,hold,fadeOut){
    if(!this.initialized||!this.ctx)return;
    const ac=this.ctx,now=ac.currentTime,total=fadeIn+hold+fadeOut;
    // Root + two very slightly detuned sines for natural warmth
    [0,-0.003,0.003].forEach((dt,idx)=>{
      const osc=ac.createOscillator();
      osc.type='sine';
      osc.frequency.value=freq*(1+dt);
      const g=ac.createGain();
      const gv=peakGain*(idx===0?1:0.28);
      g.gain.setValueAtTime(0,now);
      g.gain.linearRampToValueAtTime(gv,now+fadeIn);
      g.gain.setValueAtTime(gv,now+fadeIn+hold);
      g.gain.linearRampToValueAtTime(0,now+total);
      osc.connect(g);g.connect(this.musicGain);g.connect(this.reverb);
      osc.start(now);osc.stop(now+total+0.1);
    });
  },

  // World changed — next breath picks up new pitch palette automatically
  _crossfadeWorld(newTint){
    this.currentWorldIdx=getWorldIdx(level);
  },

  // ── Update — called each frame, handles bells + world checks
  update(dt){
    if(!this.initialized||this.muted)return;
    const wi=getWorldIdx(level);
    const w=getWorld(level);
    // World changed?
    if(wi!==this.currentWorldIdx) this._crossfadeWorld(w.audioTint);
    // Stochastic bells — the primary ambient texture
    this.bellTimer+=dt;
    const bellRate=w.audioTint.bellRate*(state===STATE.PLAYING?1:0.4);
    if(this.bellTimer>0.08&&Math.random()<bellRate){
      this.bellTimer=0;
      const freqs=w.audioTint.bellFreqs;
      this._bell(freqs[Math.floor(Math.random()*freqs.length)],0.022+Math.random()*0.018);
    }
    // Sparse breath pads — occasional soft sine swells between silence
    if(this.breathTimer!==undefined){
      this.breathTimer+=dt;
      if(this.breathTimer>=this.breathInterval){
        this.breathTimer=0;
        this.breathInterval=9+Math.random()*8; // next breath in 9-17s
        // Pick a mid-register note from the world palette
        const freqs=w.audioTint.bellFreqs;
        const freq=freqs[Math.floor(Math.random()*freqs.length)]*0.5; // one octave down
        this._breathNote(freq,0.028,2.2,1.5,3.0);
        // Occasionally add a gentle fifth above
        if(Math.random()<0.45) setTimeout(()=>this._breathNote(freq*1.5,0.016,2.8,1.0,2.5),600);
      }
    }
  },

  // ── Generic bell tone ─────────────────────────────────────
  _bell(freq,gainAmt,dur=1.8){
    if(!this.initialized||!this.ctx)return;
    const ac=this.ctx,now=ac.currentTime;
    const osc=ac.createOscillator();
    osc.type='sine';osc.frequency.value=freq;
    // Slight detune for shimmer
    const osc2=ac.createOscillator();
    osc2.type='sine';osc2.frequency.value=freq*1.0035;
    const g=ac.createGain();
    g.gain.setValueAtTime(0,now);
    g.gain.linearRampToValueAtTime(gainAmt,now+0.004);
    g.gain.exponentialRampToValueAtTime(gainAmt*0.3,now+0.12);
    g.gain.exponentialRampToValueAtTime(0.0001,now+dur);
    osc.connect(g);osc2.connect(g);
    g.connect(this.sfxGain);
    g.connect(this.reverb);
    osc.start(now);osc2.start(now);
    osc.stop(now+dur+0.05);osc2.stop(now+dur+0.05);
  },

  // ── SFX library ───────────────────────────────────────────
  // Game start / title tap
  sfxGameStart(){
    if(!this.initialized||!this.ctx)return;
    const ac=this.ctx,now=ac.currentTime;
    [220,277,330,440].forEach((f,i)=>{
      setTimeout(()=>this._bell(f,0.038,1.2),i*90);
    });
  },

  // Orb spawns — subtle descending shimmer
  sfxOrbSpawn(){
    if(!this.initialized||!this.ctx)return;
    const ac=this.ctx,now=ac.currentTime;
    const osc=ac.createOscillator();
    osc.type='sine';
    osc.frequency.setValueAtTime(900,now);
    osc.frequency.exponentialRampToValueAtTime(400,now+0.18);
    const g=ac.createGain();
    g.gain.setValueAtTime(0,now);
    g.gain.linearRampToValueAtTime(0.032,now+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,now+0.22);
    osc.connect(g);g.connect(this.sfxGain);
    osc.start(now);osc.stop(now+0.25);
  },

  // Lane move — soft magical whoosh
  sfxMove(dir){
    if(!this.initialized||!this.ctx)return;
    const ac=this.ctx,now=ac.currentTime;
    const osc=ac.createOscillator();
    osc.type='sine';
    const fStart=dir>0?320:440,fEnd=dir>0?480:260;
    osc.frequency.setValueAtTime(fStart,now);
    osc.frequency.linearRampToValueAtTime(fEnd,now+0.12);
    // Subtle noise layer
    const bufLen=ac.sampleRate*0.12;
    const nBuf=ac.createBuffer(1,bufLen,ac.sampleRate);
    const nd=nBuf.getChannelData(0);
    for(let i=0;i<bufLen;i++)nd[i]=(Math.random()*2-1)*0.12;
    const noise=ac.createBufferSource();noise.buffer=nBuf;
    const nf=ac.createBiquadFilter();nf.type='bandpass';nf.frequency.value=700;nf.Q.value=2;
    noise.connect(nf);
    const g=ac.createGain();
    g.gain.setValueAtTime(0,now);
    g.gain.linearRampToValueAtTime(0.05,now+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,now+0.14);
    osc.connect(g);nf.connect(g);g.connect(this.sfxGain);
    osc.start(now);osc.stop(now+0.15);noise.start(now);noise.stop(now+0.15);
  },

  // Correct match — bright mystical chime rising
  sfxMatch(streakCount){
    if(!this.initialized||!this.ctx)return;
    // Pitch shifts up slightly with streak
    const semis=Math.min(streakCount,6);
    const root=440*Math.pow(2,semis/12);
    this._bell(root,0.055,1.0);
    this._bell(root*1.5,0.028,0.8);
    // Tiny sparkle shimmer
    setTimeout(()=>this._bell(root*2,0.018,0.5),60);

  },

  // Wrong match — dampened darker rejection tone
  sfxWrong(){
    if(!this.initialized||!this.ctx)return;
    const ac=this.ctx,now=ac.currentTime;
    const osc=ac.createOscillator();
    osc.type='sawtooth';
    osc.frequency.setValueAtTime(180,now);
    osc.frequency.exponentialRampToValueAtTime(80,now+0.35);
    const filter=ac.createBiquadFilter();
    filter.type='lowpass';filter.frequency.value=220;filter.Q.value=3;
    const g=ac.createGain();
    g.gain.setValueAtTime(0,now);
    g.gain.linearRampToValueAtTime(0.07,now+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,now+0.4);
    osc.connect(filter);filter.connect(g);g.connect(this.sfxGain);
    osc.start(now);osc.stop(now+0.42);
  },

  // Vessel full — richer harmonic flourish
  sfxVesselFull(colorIdx){
    if(!this.initialized||!this.ctx)return;
    // Root tied loosely to orb colour index for variety
    const roots=[330,370,415,350,392];
    const root=roots[colorIdx%roots.length];
    this._bell(root,0.07,1.4);
    setTimeout(()=>this._bell(root*1.26,0.042,1.1),80);
    setTimeout(()=>this._bell(root*1.5,0.028,0.9),180);
    setTimeout(()=>this._bell(root*2,0.02,0.7),300);
    // Extra sparkle breath note to mark vessel full
    setTimeout(()=>this._breathNote(root*2,0.022,0.3,0.4,1.2),320);
  },

  // Level intro stinger — soft ascending glide
  sfxLevelIntro(){
    if(!this.initialized||!this.ctx)return;
    const ac=this.ctx,now=ac.currentTime;
    const osc=ac.createOscillator();osc.type='sine';
    osc.frequency.setValueAtTime(200,now);
    osc.frequency.exponentialRampToValueAtTime(660,now+0.9);
    const g=ac.createGain();
    g.gain.setValueAtTime(0,now);
    g.gain.linearRampToValueAtTime(0.045,now+0.05);
    g.gain.setValueAtTime(0.045,now+0.7);
    g.gain.exponentialRampToValueAtTime(0.0001,now+1.1);
    osc.connect(g);g.connect(this.sfxGain);g.connect(this.reverb);
    osc.start(now);osc.stop(now+1.15);
    // Layered second tone
    setTimeout(()=>{
      if(!this.ctx)return;
      const now2=this.ctx.currentTime;
      this._bell(880,0.025,1.2);
      this._bell(1100,0.015,0.9);
    },350);
  },

  // Level complete reveal — elegant reward cue
  sfxLevelComplete(){
    if(!this.initialized||!this.ctx)return;
    const notes=[330,415,523,659,784];
    notes.forEach((f,i)=>setTimeout(()=>this._bell(f,0.05-i*0.004,1.6-i*0.1),i*140));
    // Ambient breath bloom on level complete — chord of breath notes
    setTimeout(()=>{
      const tint=getWorld(level).audioTint;
      const base=tint.bellFreqs[0];
      this._breathNote(base*0.5,0.032,0.5,1.5,2.0);
      this._breathNote(base*0.75,0.022,0.8,1.2,1.8);
      this._breathNote(base,0.018,1.1,1.0,1.5);
    },400);
  },

  // Star fill — liquid shimmer rise, one per star
  sfxStarFill(starIdx){
    if(!this.initialized||!this.ctx)return;
    const ac=this.ctx,now=ac.currentTime;
    const baseFreqs=[660,784,932];
    const freq=baseFreqs[starIdx];
    // Slow glide up during fill, then chime at top
    const osc=ac.createOscillator();osc.type='sine';
    osc.frequency.setValueAtTime(freq*0.6,now);
    osc.frequency.linearRampToValueAtTime(freq,now+1.3);
    const g=ac.createGain();
    g.gain.setValueAtTime(0,now);
    g.gain.linearRampToValueAtTime(0.03,now+0.1);
    g.gain.setValueAtTime(0.03,now+1.1);
    g.gain.exponentialRampToValueAtTime(0.0001,now+1.5);
    osc.connect(g);g.connect(this.sfxGain);g.connect(this.reverb);
    osc.start(now);osc.stop(now+1.55);
    // Pop chime at completion
    setTimeout(()=>this._bell(freq*1.5,0.04,0.8),1300);
  },

  // Orb boost / swipe down — quick descending zip
  sfxBoost(){
    if(!this.initialized||!this.ctx)return;
    const ac=this.ctx,now=ac.currentTime;
    const osc=ac.createOscillator();osc.type='sine';
    osc.frequency.setValueAtTime(600,now);
    osc.frequency.exponentialRampToValueAtTime(180,now+0.14);
    const g=ac.createGain();
    g.gain.setValueAtTime(0,now);
    g.gain.linearRampToValueAtTime(0.055,now+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,now+0.18);
    osc.connect(g);g.connect(this.sfxGain);
    osc.start(now);osc.stop(now+0.2);
  },

  // Continue button tap
  sfxContinue(){
    if(!this.initialized||!this.ctx)return;
    this._bell(523,0.04,0.6);
    setTimeout(()=>this._bell(659,0.025,0.5),80);
  },

  // Transition — very subtle low swoosh
  sfxTransition(){
    if(!this.initialized||!this.ctx)return;
    const ac=this.ctx,now=ac.currentTime;
    const osc=ac.createOscillator();osc.type='sine';
    osc.frequency.setValueAtTime(120,now);
    osc.frequency.exponentialRampToValueAtTime(60,now+0.5);
    const g=ac.createGain();
    g.gain.setValueAtTime(0,now);
    g.gain.linearRampToValueAtTime(0.028,now+0.06);
    g.gain.exponentialRampToValueAtTime(0.0001,now+0.55);
    osc.connect(g);g.connect(this.sfxGain);
    osc.start(now);osc.stop(now+0.58);
  },

  // ── Mute toggle ───────────────────────────────────────────
  toggleMute(){
    this.muted=!this.muted;
    if(this.masterGain){
      const now=this.ctx.currentTime;
      this.masterGain.gain.setTargetAtTime(this.muted?0:0.72,now,0.08);
    }
    document.getElementById('iconSound').style.display=this.muted?'none':'block';
    document.getElementById('iconMute').style.display=this.muted?'block':'none';
  }
};

function spawnFloatText(x,y,text,color,big){matchFlashTexts.push({x,y,text,color,life:1,vy:-1.5,scale:0,big:big||false})}
function updateFloatTexts(dt){for(let i=matchFlashTexts.length-1;i>=0;i--){const f=matchFlashTexts[i];f.y+=f.vy*dt*60;f.life-=dt*0.8;f.scale=Math.min(f.scale+dt*8,1);if(f.life<=0)matchFlashTexts.splice(i,1)}}
function drawFloatTexts(){for(const f of matchFlashTexts){const s=easeOutBack(Math.min(f.scale,1));ctx.save();ctx.translate(f.x,f.y);ctx.scale(s,s);ctx.globalAlpha=Math.max(0,f.life);ctx.textAlign='center';ctx.textBaseline='middle';if(f.big){ctx.shadowColor=f.color;ctx.shadowBlur=12}ctx.fillStyle=f.color;ctx.font=`bold ${(f.big?17:14)*SCALE}px Georgia,serif`;ctx.fillText(f.text,0,0);ctx.shadowBlur=0;ctx.restore()}ctx.globalAlpha=1}

function spawnParticles(x,y,color,count,burst,opts={}){for(let i=0;i<count;i++){const angle=opts.angleRange?opts.angleBase+(Math.random()-0.5)*opts.angleRange:Math.random()*Math.PI*2;const speed=burst?2.5+Math.random()*6:0.5+Math.random()*2.5;particles.push({x,y,vx:Math.cos(angle)*speed*(opts.speedMult||1),vy:Math.sin(angle)*speed*(opts.speedMult||1)-(burst?2.5:0.5),life:1,decay:0.008+Math.random()*(burst?0.018:0.025),r:(opts.minR||2)+Math.random()*(burst?6:3),color,glow:burst,gravity:opts.gravity!==undefined?opts.gravity:0.03,drag:opts.drag||0,style:opts.style||'circle'})}}
function updateParticles(dt){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt*60;p.y+=p.vy*dt*60;p.vy+=p.gravity*dt*60;if(p.drag){p.vx*=(1-p.drag);p.vy*=(1-p.drag)}p.life-=p.decay*dt*60;if(p.life<=0)particles.splice(i,1)}}
function drawParticles(){for(const p of particles){const a=Math.max(0,p.life);ctx.globalAlpha=a*0.85;ctx.fillStyle=p.color;if(p.style==='square'){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.life*4);const s=p.r*a;ctx.fillRect(-s/2,-s/2,s,s);ctx.restore()}else{ctx.beginPath();ctx.arc(p.x,p.y,p.r*a,0,Math.PI*2);ctx.fill()}if(p.glow){let rgba='200,200,200';if(p.color.startsWith('#')&&p.color.length>=7){const h=p.color.slice(1);rgba=`${parseInt(h.substr(0,2),16)},${parseInt(h.substr(2,2),16)},${parseInt(h.substr(4,2),16)}`}const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*3.5*a);g.addColorStop(0,`rgba(${rgba},${a*0.3})`);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(p.x-p.r*4,p.y-p.r*4,p.r*8,p.r*8)}}ctx.globalAlpha=1}

// ============================================================
//  BACKGROUND GEAR
// ============================================================
function drawGearShape(cx,cy,r,teeth,toothH,fillA,rimA,spokes){
  ctx.save();ctx.translate(cx,cy);ctx.globalAlpha=fillA;ctx.fillStyle='#1c1430';ctx.beginPath();
  for(let i=0;i<teeth;i++){const a=(i/teeth)*Math.PI*2,a2=((i+0.25)/teeth)*Math.PI*2,a3=((i+0.75)/teeth)*Math.PI*2,a4=((i+1)/teeth)*Math.PI*2,oR=r+toothH;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);ctx.lineTo(Math.cos(a2)*oR,Math.sin(a2)*oR);ctx.lineTo(Math.cos(a3)*oR,Math.sin(a3)*oR);ctx.lineTo(Math.cos(a4)*r,Math.sin(a4)*r)}
  ctx.closePath();ctx.fill();
  if(rimA>0){ctx.globalAlpha=rimA;ctx.strokeStyle='#3a2860';ctx.lineWidth=1.5;ctx.stroke();ctx.beginPath();ctx.arc(0,0,r*0.58,0,Math.PI*2);ctx.strokeStyle='#2a1c48';ctx.lineWidth=1;ctx.stroke()}
  ctx.globalAlpha=fillA*1.5;ctx.fillStyle='#04010c';ctx.beginPath();ctx.arc(0,0,r*0.55,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=fillA;ctx.strokeStyle='#1c1430';ctx.lineWidth=r*0.07;
  for(let i=0;i<spokes;i++){const a=(i/spokes)*Math.PI*2;ctx.beginPath();ctx.moveTo(Math.cos(a)*r*0.2,Math.sin(a)*r*0.2);ctx.lineTo(Math.cos(a)*r*0.55,Math.sin(a)*r*0.55);ctx.stroke()}
  ctx.globalAlpha=fillA;ctx.fillStyle='#1c1430';ctx.beginPath();ctx.arc(0,0,r*0.18,0,Math.PI*2);ctx.fill();
  if(rimA>0){ctx.globalAlpha=rimA;ctx.strokeStyle='#3a2860';ctx.lineWidth=1;ctx.stroke()}
  ctx.restore();
}
function drawBackgroundGear(){
  const r1=Math.min(W,H)*0.32;
  ctx.save();ctx.translate(W*0.82,H*0.22);ctx.rotate(gearAngle);ctx.translate(-W*0.82,-H*0.22);
  drawGearShape(W*0.82,H*0.22,r1,18,r1*0.11,0.08,0.05,8);ctx.restore();
  const r2=r1*0.5;
  ctx.save();ctx.translate(W*0.14,H*0.48);ctx.rotate(-gearAngle*1.5+0.2);ctx.translate(-W*0.14,-H*0.48);
  drawGearShape(W*0.14,H*0.48,r2,12,r2*0.13,0.06,0.035,6);ctx.restore();
  ctx.globalAlpha=1;
}

// ============================================================
//  FOREGROUND SILHOUETTES
// ============================================================
function drawForegroundSilhouettes(t){
  const w=getWorld(level);
  const SIL=w.silTint;
  const SILA=0.75;
  fgOcclusionZones=[];

  const lx=W*0.55+Math.sin(t*0.22)*5;
  const ly=H*0.18;
  const lW=28*SCALE,lH=38*SCALE;
  ctx.globalAlpha=SILA;ctx.fillStyle=SIL;ctx.strokeStyle=SIL;
  ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(W*0.55,-4);ctx.quadraticCurveTo(W*0.55+Math.sin(t*0.22)*2,ly*0.4,lx,ly-lH*0.5);ctx.stroke();
  const lt=ly-lH*0.5,lb=ly+lH*0.5,ll=lx-lW*0.5,lr=lx+lW*0.5;
  ctx.beginPath();ctx.moveTo(ll+3,lt);ctx.lineTo(lr-3,lt);ctx.lineTo(lr,lt+6);ctx.lineTo(ll,lt+6);ctx.closePath();ctx.fill();
  ctx.lineWidth=2.5;for(let i=0;i<4;i++){const bx=ll+4+(i/3)*(lW-8);ctx.beginPath();ctx.moveTo(bx,lt+6);ctx.lineTo(bx,lb-4);ctx.stroke()}
  ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(ll+2,ly);ctx.lineTo(lr-2,ly);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ll,lb-4);ctx.lineTo(lr,lb-4);ctx.lineTo(lr-6,lb+2);ctx.lineTo(ll+6,lb+2);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(lx-2,lb+2);ctx.lineTo(lx,lb+10);ctx.lineTo(lx+2,lb+2);ctx.fill();
  ctx.globalAlpha=0.025+Math.sin(t*2.8)*0.01;
  const lg=ctx.createRadialGradient(lx,ly,0,lx,ly,lW*0.7);lg.addColorStop(0,'rgba(255,130,45,0.3)');lg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=lg;ctx.fillRect(lx-lW,ly-lH,lW*2,lH*2);
  fgOcclusionZones.push({x:lx,y:ly,hw:lW*0.6,hh:lH*0.65,strength:0.35});

  ctx.globalAlpha=SILA;ctx.fillStyle=SIL;
  const shY=H*0.14,shEnd=W*0.5;
  ctx.fillRect(0,shY,shEnd,6);
  ctx.beginPath();ctx.moveTo(shEnd,shY+6);ctx.lineTo(shEnd-16,shY+30);ctx.lineTo(shEnd-5,shY+6);ctx.fill();
  const b1=W*0.07;ctx.fillRect(b1-6,shY-24,12,24);ctx.fillRect(b1-3,shY-32,6,8);
  const b2=W*0.2;ctx.beginPath();ctx.arc(b2,shY-12,11,Math.PI,0);ctx.fill();ctx.fillRect(b2-11,shY-12,22,12);ctx.fillRect(b2-3,shY-28,6,16);
  const b3=W*0.38;ctx.fillRect(b3-10,shY-18,20,18);ctx.fillRect(b3-6,shY-22,12,4);
  fgOcclusionZones.push({x:shEnd*0.5,y:shY-5,hw:shEnd*0.5,hh:22,strength:0.25});

  const chX=W*0.73,chLen=H*0.36,chSw=Math.sin(t*0.28)*4;
  ctx.globalAlpha=SILA*0.9;
  for(let i=0;i<13;i++){const f=i/13,cy=-8+f*chLen,sw=chSw*f*f+Math.sin(t*0.28+i*0.5)*2*f;ctx.beginPath();ctx.ellipse(chX+sw,cy,3.5,7,0,0,Math.PI*2);ctx.fill()}
  const hkX=chX+chSw,hkY=-8+chLen;
  ctx.lineWidth=4;ctx.strokeStyle=SIL;ctx.beginPath();ctx.arc(hkX,hkY+12,11,-Math.PI*0.4,Math.PI*1.15);ctx.stroke();
  fgOcclusionZones.push({x:chX,y:chLen*0.4,hw:16,hh:chLen*0.45,strength:0.2});

  ctx.globalAlpha=SILA;ctx.fillStyle=SIL;
  const pX=W-5;ctx.fillRect(pX-5,H*0.42,10,H*0.35);
  const brY=H*0.5,brEnd=W*0.52;
  ctx.fillRect(brEnd,brY-4,pX-brEnd,9);
  ctx.beginPath();ctx.arc(brEnd+6,brY,9,Math.PI*0.5,Math.PI*1.5);ctx.fill();
  fgOcclusionZones.push({x:(brEnd+pX)*0.5,y:brY,hw:(pX-brEnd)*0.5,hh:8,strength:0.2});

  const cBase=H-8;
  ctx.globalAlpha=SILA*0.8;
  const cX=W*0.05;ctx.fillRect(cX-10,cBase-3,20,3);ctx.fillRect(cX-2,cBase-32,4,29);
  ctx.globalAlpha=0.03+Math.sin(t*3)*0.012;
  const cg=ctx.createRadialGradient(cX,cBase-36,0,cX,cBase-36,30);cg.addColorStop(0,'rgba(255,130,40,0.25)');cg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=cg;ctx.fillRect(cX-35,cBase-70,70,65);
  ctx.globalAlpha=1;
}
function getOrbOcclusion(ox,oy){let m=0;for(const z of fgOcclusionZones){const dx=Math.abs(ox-z.x),dy=Math.abs(oy-z.y);if(dx<z.hw&&dy<z.hh){const o=(1-dx/z.hw)*(1-dy/z.hh)*z.strength;if(o>m)m=o}}return m}

// ============================================================
function initContainers(num){
  containers=[];const config=getLevelConfig(level);
  const gap=12,cW=Math.min(68,(W-30-gap*(num-1))/num);
  const totalW=num*cW+(num-1)*gap,startX=(W-totalW)/2;
  const cH=cW*1.35,bottomY=H-28;
  for(let i=0;i<num;i++){
    const targetX=startX+i*(cW+gap)+cW/2;
    containers.push({x:targetX,targetX,introStartX:W/2,y:bottomY-cH/2,w:cW,h:cH,colorIdx:i,fill:0,target:config.fillTarget,full:false,pulsePhase:Math.random()*Math.PI*2,glowIntensity:0,shakeX:0,shakeDecay:0,bubbles:[],completePulse:0,energyArcs:[],wrongPulse:0});

function spawnOrb(){
  if(activeOrb||landingOrb)return;
  const avail=containers.filter(c=>!c.full);if(!avail.length)return;
  const tgt=avail[Math.floor(Math.random()*avail.length)];
  const laneXs=containers.map(c=>c.x);const sl=Math.floor(containers.length/2);
  const cfg=getLevelConfig(level);orbSpawnCount++;
  const orbRadius=Math.min(20,containers[0].w*0.30);
  // Each orb gets a unique random Y above screen so they enter at different depths
  const margin=orbRadius*2;
  const spawnY=-(H*0.15+Math.random()*H*0.25); // random between -15% and -40% screen
  const spawnX=margin+Math.random()*(W-margin*2);
  activeOrb={x:spawnX,y:spawnY,laneIdx:sl,colorIdx:tgt.colorIdx,radius:orbRadius,speed:cfg.baseSpeed,targetX:laneXs[sl],trail:[],glowPhase:Math.random()*Math.PI*2,velocityX:0,stretchX:1,stretchY:1,leanAngle:0,snapTimer:0,snapDir:0,magicTrailTimer:0};
  // Spawn trailing orbs also at random horizontal positions above
  trailingOrbs=[];
  for(let ti=0;ti<cfg.trailCount;ti++){
    const tavail=containers.filter(c=>!c.full);
    if(!tavail.length)break;
    const ttgt=tavail[Math.floor(Math.random()*tavail.length)];
    const trailSpawnX=margin+Math.random()*(W-margin*2);
    // Each trailer gets its own random entry depth above screen
    const trailSpawnY=-(H*0.15+Math.random()*H*0.25)-(ti+1)*cfg.trailGap;
    trailingOrbs.push({
      x:trailSpawnX,y:trailSpawnY,
      laneIdx:sl,colorIdx:ttgt.colorIdx,
      radius:orbRadius,speed:cfg.baseSpeed,
      targetX:laneXs[sl],trail:[],
      glowPhase:Math.random()*Math.PI*2,
      velocityX:0,stretchX:1,stretchY:1,leanAngle:0,
      snapTimer:0,magicTrailTimer:0,
      followGap:cfg.trailGap,
      // Independent — does NOT mirror the lead orb's lane
      independent:true
    });
  }
  Audio.sfxOrbSpawn();
}
function moveOrb(dir){

  activeOrb.laneIdx=nl;activeOrb.targetX=containers[nl].x;activeOrb.snapTimer=1;

  const cTop=containers[0].y-containers[0].h/2;

function updateTrailingOrbs(dt){
  if(!trailingOrbs.length)return;
  // Promote first trailer to active as soon as activeOrb is gone
  if(!activeOrb&&!landingOrb){
    activeOrb=trailingOrbs.shift();
    if(activeOrb)Audio.sfxOrbSpawn&&Audio.sfxOrbSpawn();
    return;
  }
  // Each trailer falls independently, only capped by the gap to the orb directly ahead
  const aheadList=[activeOrb,...trailingOrbs];
  for(let ti=0;ti<trailingOrbs.length;ti++){
    const o=trailingOrbs[ti];
    const ahead=aheadList[ti]; // orb directly in front of this trailer
    // Trailers keep their own lane — do NOT mirror active orb

    o.velocityX=o.velocityX*0.68+dx*0.30;

// Track which intro sounds we've fired this level
let introSfxFired=false;

function drawLevelIntro(t){
  const config=getLevelConfig(level),w=getWorld(level);
  const p=Math.min(levelIntroTimer/2.2,1),fi=easeOutCubic(Math.min(p*3,1)),fo=p>0.7?easeOutCubic((p-0.7)/0.3):0;
  const a=fi*(1-fo);ctx.textAlign='center';ctx.textBaseline='middle';ctx.globalAlpha=a;
  ctx.strokeStyle=`rgba(140,105,200,${a*0.1})`;ctx.lineWidth=1;const cr=55*SCALE*easeOutCubic(Math.min(p*2,1));
  ctx.beginPath();ctx.arc(W/2,H*0.36,cr,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='rgba(228,218,255,0.96)';ctx.font=`bold ${30*SCALE}px Georgia,serif`;ctx.fillText(`${level}`,W/2,H*0.36);
  ctx.fillStyle='rgba(195,178,232,0.82)';ctx.font=`${13*SCALE}px Georgia,serif`;ctx.fillText(`${config.numContainers} Vessels  ·  ${config.fillTarget} Essences`,W/2,H*0.46);
  ctx.fillStyle='rgba(172,152,218,0.70)';ctx.font=`italic ${13*SCALE}px Georgia,serif`;ctx.fillText(w.name,W/2,H*0.52);
  ctx.globalAlpha=1;
  // Fire intro stinger once
  if(!introSfxFired&&levelIntroTimer>0.05){introSfxFired=true;Audio.sfxLevelIntro();}
  // Staggered color bounce on each container — coords match the slide-in drawX
  const bounceStart=0.55; // start bounce after jars have mostly arrived
  for(let i=0;i<containers.length;i++){
    const c=containers[i],col=ORB_COLORS[c.colorIdx];
    // Compute the same lerped X used by drawContainer
    const slideDelay=i*0.12;
    const slideRaw=Math.max(0,levelIntroTimer-slideDelay);
    const slideP=easeOutBack(Math.min(slideRaw/0.65,1));
    const bx=c.introStartX+(c.targetX-c.introStartX)*slideP;
    const delay=bounceStart+i*0.18;
    const raw=Math.max(0,levelIntroTimer-delay);
    if(raw<=0)continue;
    const pulse1=Math.exp(-raw*5)*Math.sin(raw*18);
    const pulse2=Math.exp(-raw*3)*Math.sin(raw*9)*0.4;
    const bounce=(pulse1+pulse2)*1.1;
    const glowA=Math.max(0,Math.exp(-raw*2.5)*0.7);
    const rimA=Math.max(0,Math.exp(-raw*2)*0.9);
    const liftY=bounce*14*SCALE;
    const top=c.y-c.h/2;
    ctx.save();
    const gr=ctx.createRadialGradient(bx,c.y+liftY,0,bx,c.y+liftY,c.w*1.6);
    gr.addColorStop(0,`rgba(${col.r[0]},${col.r[1]},${col.r[2]},${glowA*0.5})`);
    gr.addColorStop(0.5,`rgba(${col.r[0]},${col.r[1]},${col.r[2]},${glowA*0.12})`);
    gr.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gr;ctx.fillRect(bx-c.w*2,c.y-c.h,c.w*4,c.h*3);
    ctx.globalAlpha=rimA;
    ctx.strokeStyle=col.h;ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(bx-c.w/2+2,top+1);ctx.lineTo(bx+c.w/2-2,top+1);ctx.stroke();
    const labelA=Math.max(0,Math.exp(-raw*1.8)*0.95);
    ctx.globalAlpha=labelA;
    ctx.fillStyle=col.h;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font=`bold ${10*SCALE}px Georgia,serif`;
    ctx.shadowColor=col.h;ctx.shadowBlur=8;
    ctx.fillText(col.name,bx,top-16*SCALE+liftY);
    ctx.shadowBlur=0;
    ctx.restore();
  }
}

// Completing
function updateCompletion(dt){
  completionTimer+=dt;
  for(let i=0;i<containers.length;i++){
    const tt=0.15+i*0.22;
    if(completionTimer>=tt&&completionTimer<tt+dt*2+0.01){
      const c=containers[i];
      if(c.completePulse<0.5){
        c.completePulse=1;
        spawnParticles(c.x,c.y-c.h*0.3,ORB_COLORS[c.colorIdx].h,22,true,{speedMult:1,gravity:0.01});
        spawnParticles(c.x,c.y,'#fff',10,true,{speedMult:0.5,gravity:-0.02,minR:1});
      }
    }
  }
  if(completionTimer>=2.5&&transitionDir===0){transitionTo(STATE.LEVEL_COMPLETE)}
}

function calcStars(){const total=orbsMatched+orbsMissed;if(total===0)return 3;const acc=orbsMatched/total;return acc>=0.92?3:acc>=0.72?2:1}
function roundRect(ctx,x,y,w,h,r){ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y)}

function drawFillingStarAt(x,y,size,fillAmount,t){
  ctx.save();
  const outerR=size,innerR=size*0.60;
  function starPath(){ctx.beginPath();for(let i=0;i<10;i++){const r=i%2===0?outerR:innerR;const a=(i*Math.PI/5)-Math.PI/2;i===0?ctx.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r):ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r)}ctx.closePath()}
  if(fillAmount>0.1){const sg=ctx.createRadialGradient(x,y,0,x,y,size*3);sg.addColorStop(0,`rgba(255,210,77,${0.08+fillAmount*0.08+Math.sin(t*2.5)*0.03})`);sg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=sg;ctx.fillRect(x-size*3,y-size*3,size*6,size*6)}
  starPath();ctx.fillStyle='rgba(25,18,45,0.6)';ctx.fill();ctx.strokeStyle=`rgba(180,140,80,${0.2+fillAmount*0.3})`;ctx.lineWidth=1.5;ctx.stroke();
  if(fillAmount>0){ctx.save();starPath();ctx.clip();
    const fillTop=y+size-(fillAmount*size*2);
    const waveAmp=1.5+fillAmount*2;
    ctx.fillStyle='#ffc820';
    ctx.beginPath();ctx.moveTo(x-size,y+size);ctx.lineTo(x+size,y+size);
    for(let s=20;s>=0;s--){const f=s/20,px=x-size+f*size*2;ctx.lineTo(px,fillTop+Math.sin(t*3+f*6)*waveAmp)}
    ctx.closePath();ctx.fill();
    ctx.globalAlpha=1;ctx.restore()}
  ctx.restore();
}

// ============================================================
const Reactions={
  likes:0,meh:0,
  loaded:false,
  hasVoted:false,  // session lock — one vote per session
  _myVote:null,

  async load(){
    // Fail open: mark loaded immediately so UI always renders
    this.likes=0;this.meh=0;this.loaded=true;
    if(!db)return;
    try{
      const doc=await db.collection('game_feedback').doc(GAME_ID).get();
      if(doc.exists){const d=doc.data();this.likes=d.likes||0;this.meh=d.meh||0;}
    }catch(e){console.warn('Reactions: Firestore read failed, showing UI with zero counts',e);}
  },

  async vote(type){
    if(this.hasVoted)return;
    this.hasVoted=true;
    this._myVote=type;
    if(type==='like')this.likes++;else this.meh++;
    if(db){
      try{
        await db.collection('game_feedback').doc(GAME_ID).set(
          {[type==='like'?'likes':'meh']:firebase.firestore.FieldValue.increment(1)},
          {merge:true}
        );
      }catch(e){console.warn('Reactions: Firestore vote write failed',e);}
    }
  }
};
// Load reactions on startup
Reactions.load();

// Canvas-space hit rects for reaction buttons (set during draw)
let _reactionRects={like:null,meh:null};

function drawReactions(t){
  // Sits between the subtitle and the Tap to Begin button on the title screen
  const rW=Math.min(W*0.7,260),rH=46*SCALE;
  const rX=(W-rW)/2,rY=H*0.56;

  ctx.globalAlpha=0.88;
  ctx.fillStyle='rgba(8,4,20,0.72)';ctx.beginPath();roundRect(ctx,rX,rY,rW,rH,10);ctx.fill();
  ctx.strokeStyle='rgba(70,50,120,0.20)';ctx.lineWidth=1;ctx.beginPath();roundRect(ctx,rX,rY,rW,rH,10);ctx.stroke();

  const btnW=rW*0.42,btnH=34*SCALE,gap=rW*0.06;
  const likeX=rX+rW/2-btnW-gap/2,mehX=rX+rW/2+gap/2;

  const voted=Reactions.hasVoted;
  ['like','meh'].forEach((type,idx)=>{

    const dimmed=voted&&!isMine;
    ctx.globalAlpha=dimmed?0.35:0.92;
    ctx.fillStyle=isMine?'rgba(35,25,70,0.95)':'rgba(18,12,38,0.80)';
    ctx.beginPath();roundRect(ctx,bx,btnY-btnH/2,btnW,btnH,7);ctx.fill();

      :`rgba(200,160,80,${isMine?0.75:0.22})`;
    ctx.lineWidth=1.2;ctx.beginPath();roundRect(ctx,bx,btnY-btnH/2,btnW,btnH,7);ctx.stroke();
    const icon=type==='like'?'👍':'😐';
    const count=type==='like'?Reactions.likes:Reactions.meh;
    ctx.fillStyle=isMine?'rgba(220,210,255,0.96)':'rgba(185,170,230,0.80)';
    ctx.font=`${12*SCALE}px Georgia,serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(`${icon}  ${count}`,bx+btnW/2,btnY);
  });

  // "Thanks!" confirmation after voting
  if(voted){
    ctx.globalAlpha=0.55;ctx.fillStyle='rgba(160,140,210,1)';
    ctx.font=`${8*SCALE}px Georgia,serif`;ctx.textAlign='center';
    ctx.fillText('Thanks for the feedback!',W/2,rY+rH+9*SCALE);
  }
  ctx.globalAlpha=1;ctx.restore();
}

function handleEndScreenTap(cx,cy){
  if(state!==STATE.LEVEL_COMPLETE||starAnimTimer<=2.4)return false;
  if(_replayBtnRect&&cx>=_replayBtnRect.x&&cx<=_replayBtnRect.x+_replayBtnRect.w&&cy>=_replayBtnRect.y&&cy<=_replayBtnRect.y+_replayBtnRect.h){replayLevel();return true;}
  if(_contBtnRect&&cx>=_contBtnRect.x&&cx<=_contBtnRect.x+_contBtnRect.w&&cy>=_contBtnRect.y&&cy<=_contBtnRect.y+_contBtnRect.h){nextLevel();return true;}
  return false;
}
function handleReactionTap(cx,cy){
  if(state!==STATE.TITLE||Reactions.hasVoted)return false;
  const {like,meh}=_reactionRects;
  if(like&&cx>=like.x&&cx<=like.x+like.w&&cy>=like.y&&cy<=like.y+like.h){Reactions.vote('like');return true;}
  if(meh&&cx>=meh.x&&cx<=meh.x+meh.w&&cy>=meh.y&&cy<=meh.y+meh.h){Reactions.vote('meh');return true;}
  return false;
}

// Track which star sounds have been triggered
let starSfxFired=[false,false,false];
let _replayBtnRect=null,_contBtnRect=null; // end screen button rects

function drawLevelComplete(t){
  const stars=calcStars();const total=orbsMatched+orbsMissed;
  const acc=total>0?Math.round(orbsMatched/total*100):100;
  const perfect=orbsMissed===0&&total>0;
  const panelA=easeOutCubic(Math.min(starAnimTimer*2.5,1));

  ctx.fillStyle=`rgba(2,1,6,${panelA*0.5})`;ctx.fillRect(0,0,W,H);

  const pW=Math.min(W*0.85,320),pH=H*0.62,pX=(W-pW)/2,pY=(H-pH)/2;
  ctx.globalAlpha=panelA;
  ctx.fillStyle='rgba(12,8,24,0.92)';ctx.beginPath();roundRect(ctx,pX,pY,pW,pH,14);ctx.fill();
  // Gold border on perfect 3-star, purple otherwise
  if(perfect&&stars===3){
    const goldPulse=0.55+Math.sin(t*1.8)*0.15;
    ctx.strokeStyle=`rgba(220,175,60,${goldPulse})`;ctx.lineWidth=2;
    ctx.beginPath();roundRect(ctx,pX,pY,pW,pH,14);ctx.stroke();
    // Outer gold glow ring
    ctx.strokeStyle=`rgba(255,210,80,${goldPulse*0.18})`;ctx.lineWidth=6;
    ctx.beginPath();roundRect(ctx,pX-2,pY-2,pW+4,pH+4,15);ctx.stroke();
    const ig=ctx.createRadialGradient(W/2,pY+pH*0.3,0,W/2,pY+pH*0.3,pH*0.55);
    ig.addColorStop(0,'rgba(90,65,10,0.12)');ig.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=ig;ctx.fillRect(pX,pY,pW,pH);
  }else{
    ctx.strokeStyle='rgba(100,70,160,0.2)';ctx.lineWidth=1;ctx.beginPath();roundRect(ctx,pX,pY,pW,pH,14);ctx.stroke();
    const ig=ctx.createRadialGradient(W/2,pY+pH*0.3,0,W/2,pY+pH*0.3,pH*0.5);ig.addColorStop(0,'rgba(60,30,100,0.06)');ig.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=ig;ctx.fillRect(pX,pY,pW,pH);
  }

  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='rgba(225,215,252,0.96)';ctx.font=`${22*SCALE}px Georgia,serif`;
  ctx.fillText('Essence Captured',W/2,pY+pH*0.1);
  ctx.fillStyle='rgba(175,155,215,0.68)';ctx.font=`italic ${12*SCALE}px Georgia,serif`;
  ctx.fillText(getWorld(level).name,W/2,pY+pH*0.17);

  // Stars — slow liquid fill, elastic pop, idle breathe
  const starY=pY+pH*0.35,starSp=62*SCALE;
  for(let i=0;i<3;i++){
    const sx=W/2+(i-1)*starSp,earned=i<stars;
    const delay=0.35+i*0.38;
    const raw=Math.max(0,(starAnimTimer-delay));
    const fillDur=0.75;
    const fillAmt=earned?Math.min(raw/fillDur,1):0;
    const popRaw=Math.max(0,raw-fillDur);
    const popBounce=earned&&fillAmt>=1?easeOutElastic(Math.min(popRaw*2.5,1))*0.22:0;
    const idlePulse=earned&&popRaw>0.3?Math.sin(t*2.2+i*1.1)*0.04:0;
    const sz=23*SCALE*(1+popBounce+idlePulse);
    drawFillingStarAt(sx,starY,sz,fillAmt,t);
    // Fire star fill sound once per star
    if(earned&&raw>0&&!starSfxFired[i]){starSfxFired[i]=true;Audio.sfxStarFill(i);}
  }

  if(perfect&&starAnimTimer>2.2){
    const pfA=easeOutCubic(Math.min((starAnimTimer-2.2)*3,1));
    ctx.globalAlpha=panelA*pfA;
    ctx.fillStyle='rgba(255,228,110,0.96)';ctx.font=`bold ${15*SCALE}px Georgia,serif`;
    ctx.fillText(stars===3?'✦ Flawless ✦':'✦ Perfect ✦',W/2,starY+38*SCALE);
    ctx.globalAlpha=panelA;
  }

  const infoA=easeOutCubic(Math.max(0,Math.min((starAnimTimer-2.0)*2,1)));
  ctx.globalAlpha=panelA*infoA;
  ctx.fillStyle='rgba(225,215,252,0.94)';ctx.font=`bold ${24*SCALE}px Georgia,serif`;
  ctx.fillText(`${score}`,W/2,pY+pH*0.55);
  ctx.fillStyle='rgba(185,168,220,0.72)';ctx.font=`${11*SCALE}px Georgia,serif`;
  ctx.fillText('SCORE',W/2,pY+pH*0.6);

  ctx.fillStyle='rgba(188,172,225,0.78)';ctx.font=`${12*SCALE}px Georgia,serif`;
  ctx.fillText(`Accuracy: ${acc}%${bestStreak>1?`  ·  Streak: ${bestStreak}×`:''}`,W/2,pY+pH*0.68);
  ctx.fillText(`Matched: ${orbsMatched}  ·  Missed: ${orbsMissed}`,W/2,pY+pH*0.74);
  ctx.globalAlpha=panelA;

  const btnA=easeOutCubic(Math.max(0,Math.min((starAnimTimer-2.4)*2,1)));
  if(btnA>0){
    const btnY=pY+pH*0.88,btnH=36*SCALE;
    // Equal margins from panel edges, gap between buttons
    const edgePad=14*SCALE,innerGap=10*SCALE;
    const btnW=(pW-edgePad*2-innerGap)/2;
    const replayX=pX+edgePad,contX=pX+edgePad+btnW+innerGap;
    ctx.save();ctx.globalAlpha=panelA*btnA;

    // Replay button — darker, more subdued (secondary action)
    ctx.globalAlpha=panelA*btnA*0.65;
    const rbf=ctx.createLinearGradient(replayX+btnW/2,btnY-btnH/2,replayX+btnW/2,btnY+btnH/2);
    rbf.addColorStop(0,'rgba(14,22,45,0.82)');rbf.addColorStop(1,'rgba(8,14,30,0.92)');
    ctx.fillStyle=rbf;ctx.beginPath();roundRect(ctx,replayX,btnY-btnH/2,btnW,btnH,8);ctx.fill();
    ctx.strokeStyle='rgba(60,90,160,0.30)';ctx.lineWidth=1;
    ctx.beginPath();roundRect(ctx,replayX,btnY-btnH/2,btnW,btnH,8);ctx.stroke();
    ctx.fillStyle='rgba(150,168,210,0.70)';ctx.font=`${13*SCALE}px Georgia,serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('↺ Replay',replayX+btnW/2,btnY);

    // Continue button — gold on perfect 3-star, blue otherwise
    ctx.globalAlpha=panelA*btnA;
    const isPerfect=perfect&&stars===3;
    const pr=0.5+Math.sin(t*2.4)*0.5;
    const goldPulse=0.5+Math.sin(t*2.2)*0.5;
    ctx.globalAlpha=panelA*btnA*(isPerfect?0.18*goldPulse:0.10*pr);
    ctx.strokeStyle=isPerfect?'rgba(255,200,60,1)':'rgba(80,160,255,1)';ctx.lineWidth=isPerfect?2*SCALE:1.5*SCALE;
    ctx.beginPath();roundRect(ctx,contX-4*SCALE,btnY-btnH/2-4*SCALE,btnW+8*SCALE,btnH+8*SCALE,10);ctx.stroke();
    ctx.globalAlpha=panelA*btnA;
    const cbf=ctx.createLinearGradient(contX+btnW/2,btnY-btnH/2,contX+btnW/2,btnY+btnH/2);
    if(isPerfect){cbf.addColorStop(0,'rgba(90,65,10,0.85)');cbf.addColorStop(1,'rgba(60,42,6,0.95)');}
    else{cbf.addColorStop(0,'rgba(28,70,160,0.75)');cbf.addColorStop(1,'rgba(16,45,120,0.88)');}
    ctx.fillStyle=cbf;ctx.beginPath();roundRect(ctx,contX,btnY-btnH/2,btnW,btnH,8);ctx.fill();
    ctx.strokeStyle=isPerfect?`rgba(220,175,60,${0.65+Math.sin(t*2.2)*0.25})`:`rgba(80,150,255,${0.45+Math.sin(t*2.4)*0.18})`;
    ctx.lineWidth=isPerfect?2:1.5;ctx.beginPath();roundRect(ctx,contX,btnY-btnH/2,btnW,btnH,8);ctx.stroke();
    ctx.shadowColor=isPerfect?'rgba(255,200,60,0.6)':'rgba(80,160,255,0.45)';ctx.shadowBlur=isPerfect?12*SCALE:8*SCALE;
    ctx.fillStyle=isPerfect?`rgba(255,228,140,${0.90+Math.sin(t*2.2)*0.08})`:'rgba(215,230,255,0.95)';
    ctx.font=`bold ${13*SCALE}px Georgia,serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('Continue →',contX+btnW/2,btnY);
    ctx.shadowBlur=0;

    _replayBtnRect={x:replayX,y:btnY-btnH/2,w:btnW,h:btnH};
    _contBtnRect={x:contX,y:btnY-btnH/2,w:btnW,h:btnH};
    ctx.restore();
  }

  ctx.globalAlpha=1;
}

// ============================================================
//  TRANSITIONS
// ============================================================
function transitionTo(ns){
  Audio.sfxTransition();
  transitionAlpha=0;transitionDir=1;transitionCallback=()=>{
    state=ns;
    if(ns===STATE.LEVEL_INTRO){
      levelIntroTimer=0;introSfxFired=false;
      const cfg=getLevelConfig(level);initContainers(cfg.numContainers);
      activeOrb=null;landingOrb=null;trailingOrbs=[];orbsMatched=0;orbsMissed=0;streak=0;bestStreak=0;score=0;orbSpawnCount=0;
      levelTimerMax=cfg.timeLimit;levelTimer=cfg.timeLimit;
      initMist();initBgParticles();
    }else if(ns===STATE.PLAYING){
      spawnTimer=0;
    }else if(ns===STATE.LEVEL_COMPLETE){
      starAnimTimer=0;totalScore+=score;
      starSfxFired=[false,false,false];
      Audio.sfxLevelComplete();
      // Record win for current container tier (only if timer didn't expire)
      if(levelTimer>0){const nc=getLevelConfig(level).numContainers;containerTierWins[nc]=(containerTierWins[nc]||0)+1;}

    }
    transitionDir=-1;
  }
}
function startGame(){level=1;totalScore=0;containerTierWins={};Audio.sfxGameStart();transitionTo(STATE.LEVEL_INTRO)}
function nextLevel(){level++;Audio.sfxContinue();transitionTo(STATE.LEVEL_INTRO)}
function replayLevel(){Audio.sfxContinue();transitionTo(STATE.LEVEL_INTRO)}

// ============================================================
//  INPUT
// ============================================================
let touchStartX=0,touchStartY=0,touchMoved=false,touchBoosted=false;const SWIPE_THRESHOLD=22,SWIPE_DOWN_THRESHOLD=28;
canvas.addEventListener('touchstart',(e)=>{e.preventDefault();ensureAudio();touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;touchMoved=false;touchBoosted=false},{passive:false});
canvas.addEventListener('touchmove',(e)=>{
  e.preventDefault();
  const dx=e.touches[0].clientX-touchStartX;
  const dy=e.touches[0].clientY-touchStartY;
  // Horizontal swipe — lane change
  if(Math.abs(dx)>SWIPE_THRESHOLD&&Math.abs(dx)>Math.abs(dy)*0.8){
    moveOrb(dx>0?1:-1);touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;touchMoved=true;
  }
  // Downward swipe — boost orb (fire once per gesture)
  else if(dy>SWIPE_DOWN_THRESHOLD&&Math.abs(dy)>Math.abs(dx)*1.2&&!touchBoosted){
    touchBoosted=true;touchMoved=true;boostOrb();
  }
},{passive:false});
// Tap a container to aim the active orb at that lane
function handleContainerTap(cx,cy){
  if(state!==STATE.PLAYING||!activeOrb)return false;
  for(let i=0;i<containers.length;i++){
    const con=containers[i];
    // Hit area: full width of container, generous height covering the vial
    const left=con.x-con.w*0.7,right=con.x+con.w*0.7;
    const top=con.y-con.h/2-10,bottom=con.y+con.h/2+16;
    if(cx>=left&&cx<=right&&cy>=top&&cy<=bottom){
      // Compute lane direction and call moveOrb repeatedly to reach target lane
      const diff=i-activeOrb.laneIdx;
      if(diff===0)return false; // already in that lane — don't block
      const dir=diff>0?1:-1;
      for(let step=0;step<Math.abs(diff);step++) moveOrb(dir);
      return true;
    }
  }
  return false;
}

canvas.addEventListener('touchend',(e)=>{
  const tx=e.changedTouches[0].clientX,ty=e.changedTouches[0].clientY;
  if(!touchMoved){
    const tappedContainer=handleContainerTap(tx,ty);
    const tappedReaction=!tappedContainer&&handleReactionTap(tx,ty);
    const tappedEnd=!tappedContainer&&!tappedReaction&&handleEndScreenTap(tx,ty);
    if(!tappedContainer&&!tappedReaction&&!tappedEnd&&state===STATE.TITLE)startGame();
  }
});
canvas.addEventListener('click',(e)=>{
  ensureAudio();
  const tappedContainer=handleContainerTap(e.clientX,e.clientY);
  const tappedReaction=!tappedContainer&&handleReactionTap(e.clientX,e.clientY);
  const tappedEnd=!tappedContainer&&!tappedReaction&&handleEndScreenTap(e.clientX,e.clientY);
  if(!tappedContainer&&!tappedReaction&&!tappedEnd&&state===STATE.TITLE)startGame();
});
document.addEventListener('keydown',(e)=>{
  ensureAudio();
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A'){moveOrb(-1);e.preventDefault()}
  else if(e.key==='ArrowRight'||e.key==='d'||e.key==='D'){moveOrb(1);e.preventDefault()}
  else if(e.key==='ArrowDown'||e.key==='s'||e.key==='S'){boostOrb();e.preventDefault()}
  else if(e.key==='Enter'||e.key===' '){if(state===STATE.TITLE)startGame();else if(state===STATE.LEVEL_COMPLETE&&starAnimTimer>2.4)nextLevel();e.preventDefault()}else if(e.key==='r'||e.key==='R'){if(state===STATE.LEVEL_COMPLETE&&starAnimTimer>2.4)replayLevel();e.preventDefault()}
  else if(e.key==='m'||e.key==='M'){Audio.init();Audio.toggleMute();}

});

// ============================================================
//  MAIN LOOP
// ============================================================
let lastTime=0;initMist();initBgParticles();
function gameLoop(timestamp){
  const dt=Math.min((timestamp-lastTime)/1000,0.05);lastTime=timestamp;const t=timestamp/1000;
  gearAngle+=dt*0.08;
  updateMist(dt);updateBgParticles(dt);updateParticles(dt);updateRuneSparkles(dt);updateFloatTexts(dt);
  Audio.update(dt);
  if(transitionDir!==0){transitionAlpha+=transitionDir*dt*2.8;if(transitionDir===1&&transitionAlpha>=1){transitionAlpha=1;if(transitionCallback){transitionCallback();transitionCallback=null}}if(transitionDir===-1&&transitionAlpha<=0){transitionAlpha=0;transitionDir=0}}
  if(shakeTimer>0)shakeTimer-=dt;if(screenFlashAlpha>0)screenFlashAlpha-=dt*2;if(wrongFlashTimer>0)wrongFlashTimer-=dt;
  for(const c of containers){c.pulsePhase+=dt*2;if(c.glowIntensity>0)c.glowIntensity=Math.max(0,c.glowIntensity-dt*1.8);if(c.wrongPulse>0)c.wrongPulse=Math.max(0,c.wrongPulse-dt*3);if(c.shakeDecay>0){c.shakeDecay-=dt*5;c.shakeX=Math.sin(c.shakeDecay*30)*c.shakeX*0.9;if(c.shakeDecay<=0)c.shakeX=0}if(c.completePulse>0)c.completePulse-=dt*1.5;updateContainerBubbles(c,dt);updateEnergyArcs(c,dt)}
  if(state===STATE.TITLE)titleTime+=dt;
  if(state===STATE.LEVEL_INTRO){levelIntroTimer+=dt;if(levelIntroTimer>=2.2){state=STATE.PLAYING;spawnTimer=0;currentSpawnDelay=getSpawnDelay()}}
  if(state===STATE.PLAYING){
    updateOrb(dt);updateLandingOrb(dt);updateTrailingOrbs(dt);
    if(!activeOrb&&!landingOrb&&!trailingOrbs.length&&containers.some(c=>!c.full)){spawnTimer+=dt*1000;if(spawnTimer>=currentSpawnDelay){spawnOrb();spawnTimer=0;currentSpawnDelay=getSpawnDelay();}}
    // Countdown timer — fail level when it hits 0
    if(levelTimer>0){levelTimer=Math.max(0,levelTimer-dt);if(levelTimer<=0){levelTimer=0;activeOrb=null;landingOrb=null;trailingOrbs=[];state=STATE.COMPLETING;completionTimer=0;completionBurstDone=false;shakeTimer=0.6;shakeIntensity=8;screenFlashAlpha=0.6;}}
  }
  if(damageFlashTimer>0)damageFlashTimer=Math.max(0,damageFlashTimer-dt);
  if(state===STATE.COMPLETING)updateCompletion(dt);
  if(state===STATE.LEVEL_COMPLETE)starAnimTimer+=dt;

  // DRAW
  ctx.save();
  if(shakeTimer>0){const sa=shakeIntensity*Math.min(shakeTimer/0.3,1);ctx.translate((Math.random()-0.5)*sa*2,(Math.random()-0.5)*sa*2)}
  drawBackground(t);drawBackgroundGear();drawMist('back');drawBgParticles();drawRuneSparkles();
  if(state===STATE.TITLE)drawTitleScreen(t);
  if(state===STATE.LEVEL_INTRO){drawLaneGuides(t);for(const c of containers)drawContainer(c,t);drawLevelIntro(t)}
  if(state===STATE.PLAYING){drawLaneGuides(t);for(const c of containers)drawContainer(c,t);drawTrailingOrbs(t);drawOrb(t);drawLandingOrb(t)}
  if(state===STATE.COMPLETING){for(const c of containers)drawContainer(c,t)}
  if(state===STATE.LEVEL_COMPLETE){for(const c of containers)drawContainer(c,t);drawLevelComplete(t)}
  drawParticles();drawMist('front');
  if(state!==STATE.TITLE&&state!==STATE.LEVEL_COMPLETE)drawForegroundSilhouettes(t);
  drawFloatTexts();if(state===STATE.PLAYING)drawHUD(t);
  ctx.restore();
  // Post-processing
  if(wrongFlashTimer>0){const wa=wrongFlashTimer*0.16;ctx.fillStyle=`rgba(110,18,35,${wa*0.5})`;ctx.fillRect(0,0,W,H);const fR=110+(1-wrongFlashTimer/0.5)*50;const lf=ctx.createRadialGradient(wrongFlashX,wrongFlashY,0,wrongFlashX,wrongFlashY,fR);lf.addColorStop(0,`rgba(160,25,50,${wa*0.4})`);lf.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=lf;ctx.fillRect(wrongFlashX-fR,wrongFlashY-fR,fR*2,fR*2)}
  if(screenFlashAlpha>0){ctx.fillStyle=`rgba(180,140,230,${screenFlashAlpha*0.25})`;ctx.fillRect(0,0,W,H)}
  // Damage vignette — deep red pulse on wrong match drain
  if(damageFlashTimer>0){
    const da=damageFlashTimer/0.55;
    const dv=ctx.createRadialGradient(W/2,H/2,H*0.1,W/2,H/2,H*0.75);
    dv.addColorStop(0,'rgba(0,0,0,0)');
    dv.addColorStop(1,`rgba(180,0,20,${da*0.45})`);
    ctx.fillStyle=dv;ctx.fillRect(0,0,W,H);
  }
  if(transitionAlpha>0){ctx.fillStyle=`rgba(2,1,6,${transitionAlpha})`;ctx.fillRect(0,0,W,H)}
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
