<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DRIFTLINE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">

  <!-- HUD -->
  <div id="hud">
    <div class="hud-block">
      <span class="hud-label">Distance</span>
      <span class="hud-value" id="hud-dist">0m</span>
    </div>
    <div class="hud-block" style="text-align:right">
      <span class="hud-label">Best</span>
      <span class="hud-value best" id="hud-best">0m</span>
    </div>
  </div>
  <div id="drift-indicator">⟳ DRIFT</div>

  <!-- Start Screen -->
  <div id="start-screen">
    <div id="logo">DRIFTLINE</div>
    <div id="tagline">endless road · endless slide</div>
    <div id="car-select-label">Select Your Car</div>
    <div id="car-grid">
      <div class="car-card" data-car="0">
        <div class="car-canvas-wrap"><canvas id="preview-0" width="110" height="130"></canvas></div>
        <div class="car-name">Vacation Wagon</div>
      </div>
      <div class="car-card" data-car="1">
        <div class="car-canvas-wrap"><canvas id="preview-1" width="110" height="130"></canvas></div>
        <div class="car-name">Ice Cream Truck</div>
      </div>
      <div class="car-card" data-car="2">
        <div class="car-canvas-wrap"><canvas id="preview-2" width="110" height="130"></canvas></div>
        <div class="car-name">Pure Muscle</div>
      </div>
    </div>
    <button id="start-btn">Start Drive</button>
  </div>

  <!-- Game Over Screen -->
  <div id="gameover-screen">
    <div id="gameover-panel">
      <div id="go-title">Run Ended</div>
      <div id="go-dist">0m</div>
      <div id="go-dist-label">Distance</div>
      <div id="go-best-wrap">
        <div id="go-best">0m</div>
        <div id="go-best-label">Best Record</div>
      </div>
      <button class="go-btn primary" id="retry-btn">↺ Retry</button>
      <button class="go-btn" id="change-car-btn">⟳ Change Car</button>
    </div>
  </div>

  <!-- Mobile Controls -->
  <div id="mobile-controls">
    <div id="btn-left">◀</div>
    <div id="btn-right">▶</div>
  </div>

</div>

<!--
  Script load order matters — each file depends on globals from files above it:
    1. game.js   — canvas, ctx, roundRect, car state, keys, game loop (defines shared globals)
    2. road.js   — ROAD_W, VISIBLE_SEGS, roadSegs, particles (needs canvas for maybeSpawnLeaf)
    3. cars.js   — CAR_DEFS, preview draws, top-down draws (needs ctx, car, roundRect from game.js)
    4. render.js — camera, drawRoad, drawScenery, drawCar, drawParticles, drawStartBG (needs all above)
    5. ui.js     — startGame, endGame, HUD, button wiring (needs all of the above)
-->
<script src="game.js"></script>
<script src="road.js"></script>
<script src="cars.js"></script>
<script src="render.js"></script>
<script src="ui.js"></script>

</body>
</html>
