<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>DRIFTLINE</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a1f;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
  font-family: 'Courier New', monospace;
  user-select: none;
  -webkit-user-select: none;
}
canvas { display: block; touch-action: none; }
#ui {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}

/* ── HUD ── */
#hud {
  display: none;
  position: absolute;
  top: 0; left: 0; right: 0;
  padding: max(18px, env(safe-area-inset-top, 18px)) max(24px, env(safe-area-inset-right, 24px)) 0 max(24px, env(safe-area-inset-left, 24px));
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}
.hud-block { display: flex; flex-direction: column; }
.hud-left { display: flex; align-items: flex-start; gap: 12px; }
.hud-label { font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.4); text-transform: uppercase; }
.hud-value { font-size: 26px; font-weight: bold; color: #fff; letter-spacing: 2px; text-shadow: 0 0 20px rgba(255,200,80,0.6); }
.hud-value.best { color: rgba(255,200,80,0.7); }
#drift-indicator {
  position: absolute;
  bottom: 80px; left: 50%;
  transform: translateX(-50%);
  font-size: 11px; letter-spacing: 4px;
  color: rgba(255,180,50,0.0);
  text-transform: uppercase;
  transition: color 0.1s;
}
#drift-indicator.active { color: rgba(255,180,50,0.9); }

/* ── START SCREEN ── */
#start-screen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: linear-gradient(180deg, #0e0e12 0%, #1a1a22 60%, #0e0e12 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: all;
}
#logo {
  font-size: clamp(36px, 8vw, 72px); font-weight: 900; letter-spacing: 12px;
  color: #fff; text-transform: uppercase;
  text-shadow: 0 0 60px rgba(255,190,60,0.4), 0 2px 0 rgba(0,0,0,0.8);
  margin-bottom: 4px;
}
#tagline { font-size: 11px; letter-spacing: 5px; color: rgba(255,200,80,0.6); text-transform: uppercase; margin-bottom: 40px; }
#car-select-label { font-size: 10px; letter-spacing: 4px; color: rgba(255,255,255,0.35); text-transform: uppercase; margin-bottom: 20px; }
#car-grid { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; justify-content: center; padding: 0 16px; }
.car-card {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; padding: 20px 16px 16px;
  cursor: pointer; transition: all 0.2s;
  display: flex; flex-direction: column; align-items: center; gap: 12px; width: 148px;
}
.car-card:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,200,80,0.3); transform: translateY(-3px); }
.car-card.selected { background: rgba(255,200,80,0.08); border-color: rgba(255,200,80,0.7); box-shadow: 0 0 24px rgba(255,200,80,0.15); transform: translateY(-4px); }
.car-canvas-wrap canvas { display: block; }
.car-name { font-size: 11px; letter-spacing: 2px; color: rgba(255,255,255,0.6); text-transform: uppercase; text-align: center; }
.car-card.selected .car-name { color: rgba(255,200,80,0.9); }
.car-stat { font-size: 9px; letter-spacing: 1px; color: rgba(255,255,255,0.3); text-align: center; }
.car-card.selected .car-stat { color: rgba(255,200,80,0.5); }
#start-btn {
  background: linear-gradient(135deg, #f0a020, #e07010); color: #000; border: none;
  padding: 16px 48px; font-size: 13px; font-weight: bold; letter-spacing: 5px;
  text-transform: uppercase; cursor: pointer; border-radius: 8px;
  font-family: 'Courier New', monospace; transition: all 0.2s;
  opacity: 0; pointer-events: none;
  box-shadow: 0 4px 24px rgba(240,160,32,0.3);
}
#start-btn.visible { opacity: 1; pointer-events: all; }
#start-btn:hover { transform: scale(1.04); box-shadow: 0 6px 32px rgba(240,160,32,0.5); }

/* ── GAME OVER ── */
#gameover-screen {
  display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
  align-items: center; justify-content: center; pointer-events: all;
}
#gameover-screen.show { display: flex; }
#gameover-panel {
  background: rgba(14,14,18,0.95); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px; padding: 40px 48px; text-align: center; min-width: 280px;
  box-shadow: 0 24px 80px rgba(0,0,0,0.8);
}
#go-title { font-size: 11px; letter-spacing: 5px; color: rgba(255,80,60,0.8); text-transform: uppercase; margin-bottom: 24px; }
#go-dist { font-size: 48px; font-weight: 900; color: #fff; letter-spacing: 2px; line-height: 1; text-shadow: 0 0 30px rgba(255,200,80,0.4); }
#go-dist-label { font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.35); margin-bottom: 20px; margin-top: 4px; }
#go-best-wrap { margin-bottom: 32px; }
#go-best { font-size: 18px; color: rgba(255,200,80,0.8); letter-spacing: 2px; }
#go-best-label { font-size: 9px; letter-spacing: 3px; color: rgba(255,255,255,0.25); text-transform: uppercase; }
.go-btn {
  display: block; width: 100%; padding: 13px; margin-bottom: 10px;
  border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
  background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.8);
  font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 3px;
  text-transform: uppercase; cursor: pointer; transition: all 0.2s;
}
.go-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.25); }
.go-btn.primary { background: linear-gradient(135deg, #f0a020, #e07010); border-color: transparent; color: #000; font-weight: bold; box-shadow: 0 4px 20px rgba(240,160,32,0.3); }
.go-btn.primary:hover { box-shadow: 0 6px 28px rgba(240,160,32,0.5); }

/* ── MOBILE CONTROLS ── */
#mobile-controls {
  display: none; position: absolute; bottom: 0; left: 0; right: 0; height: 120px; pointer-events: all;
}
#btn-left, #btn-right {
  position: absolute; bottom: 20px; width: 110px; height: 80px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px; display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: rgba(255,255,255,0.4); cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
#btn-left { left: 20px; } #btn-right { right: 20px; }
#btn-left:active, #btn-right:active { background: rgba(255,200,80,0.12); border-color: rgba(255,200,80,0.3); }

/* Arcade home button — shared brand element */
.arcade-home{
  width:32px;height:32px;border-radius:9px;flex-shrink:0;
  background:rgba(0,0,0,.04);overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  text-decoration:none;
  transition:transform .12s,background .12s;
  -webkit-tap-highlight-color:transparent;
  pointer-events:all;
}
.arcade-home:active{transform:scale(.88);background:rgba(0,0,0,.08)}
.arcade-home svg{width:28px;height:28px;pointer-events:none;display:block}

/* Arcade home on start screen — top-left corner with safe-area */
.start-home{
  position:absolute;
  top:max(16px, env(safe-area-inset-top, 16px));
  left:max(16px, env(safe-area-inset-left, 16px));
  z-index:10;
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div id="hud">
    <div class="hud-left">
      <a class="arcade-home" href="https://www.tonysnguyen.com/arcade" aria-label="Back to Arcade"><svg width="28" height="28" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="20" height="20" rx="5" fill="#5B6EE8"/><rect x=".7" y=".7" width="18.6" height="18.6" rx="4.3" stroke="#fff" stroke-opacity=".2" stroke-width="1.4"/><path d="M5 6.5C5 6 5.3 5.5 6 5.5h8c.7 0 1 .5 1 1s-.3 1-1 1h-2.8v6c0 .7-.5 1-1.1 1-.7 0-1.1-.3-1.1-1v-6H6c-.7 0-1-.5-1-1Z" fill="#fff"/><circle cx="14.2" cy="14.2" r="1.3" fill="#fff"/></svg></a>
      <div class="hud-block">
        <span class="hud-label">Distance</span>
        <span class="hud-value" id="hud-dist">0m</span>
      </div>
    </div>
    <div class="hud-block" style="text-align:right">
      <span class="hud-label">Best</span>
      <span class="hud-value best" id="hud-best">0m</span>
    </div>
  </div>
  <div id="drift-indicator">⟳ DRIFT</div>

  <div id="start-screen">
    <a class="arcade-home start-home" href="https://www.tonysnguyen.com/arcade" aria-label="Back to Arcade"><svg width="28" height="28" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="20" height="20" rx="5" fill="#5B6EE8"/><rect x=".7" y=".7" width="18.6" height="18.6" rx="4.3" stroke="#fff" stroke-opacity=".2" stroke-width="1.4"/><path d="M5 6.5C5 6 5.3 5.5 6 5.5h8c.7 0 1 .5 1 1s-.3 1-1 1h-2.8v6c0 .7-.5 1-1.1 1-.7 0-1.1-.3-1.1-1v-6H6c-.7 0-1-.5-1-1Z" fill="#fff"/><circle cx="14.2" cy="14.2" r="1.3" fill="#fff"/></svg></a>
    <div id="logo">DRIFTLINE</div>
    <div id="tagline">endless road · endless slide</div>
    <div id="car-select-label">Select Your Car</div>
    <div id="car-grid">
      <div class="car-card" data-car="0">
        <div class="car-canvas-wrap"><canvas id="preview-0" width="110" height="130"></canvas></div>
        <div class="car-name">Vacation Wagon</div>
      </div>
      <div class="car-card" data-car="1">
        <div class="car-canvas-wrap"><canvas id="preview-1" width="110" height="130"></canvas></div>
        <div class="car-name">Ice Cream Truck</div>
      </div>
      <div class="car-card" data-car="2">
        <div class="car-canvas-wrap"><canvas id="preview-2" width="110" height="130"></canvas></div>
        <div class="car-name">Pure Muscle</div>
      </div>
    </div>
    <button id="start-btn">Start Drive</button>
  </div>

  <div id="gameover-screen">
    <div id="gameover-panel">
      <div id="go-title">Run Ended</div>
      <div id="go-dist">0m</div>
      <div id="go-dist-label">Distance</div>
      <div id="go-best-wrap">
        <div id="go-best">0m</div>
        <div id="go-best-label">Best Record</div>
      </div>
      <button class="go-btn primary" id="retry-btn">↺ Retry</button>
      <button class="go-btn" id="change-car-btn">⟳ Change Car</button>
    </div>
  </div>

  <div id="mobile-controls">
    <div id="btn-left">◀</div>
    <div id="btn-right">▶</div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
//  DRIFTLINE — original v1
// ════════════════════════════════════════════════

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); if (STATE !== 'play') drawStartBG(); });

// ── State ──────────────────────────────────────
let STATE = 'start';
let selectedCar = -1;
let bestDistance = 0;

// ── Car definitions ────────────────────────────
const CAR_DEFS = [
  { name:'wagon',  color:'#d4b882', accent:'#b8956a', roof:'#c8a870',
    w:28, h:50, steerSpeed:0.028, steerReturn:0.055,
    driftFactor:0.45, driftBuild:0.012, maxDrift:22, speed:4.4 },
  { name:'truck',  color:'#e8e4dc', accent:'#6a8ab0', roof:'#d4d0c8',
    w:30, h:54, steerSpeed:0.024, steerReturn:0.05,
    driftFactor:0.5,  driftBuild:0.013, maxDrift:25, speed:4.6 },
  { name:'muscle', color:'#c03028', accent:'#d84030', roof:'#a02020',
    w:32, h:56, steerSpeed:0.022, steerReturn:0.04,
    driftFactor:0.6,  driftBuild:0.014, maxDrift:32, speed:4.8 },
];

// ── Helpers ────────────────────────────────────
function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y);
  c.closePath();
}

// ── Preview cars (side/3/4 view for select screen) ─
function drawPreviewCar(id, idx) {
  const el = document.getElementById(id);
  const cx = el.getContext('2d');
  const pw = el.width, ph = el.height;
  cx.clearRect(0,0,pw,ph);
  if      (idx===0) drawPreviewWagon(cx,pw,ph);
  else if (idx===1) drawPreviewTruck(cx,pw,ph);
  else              drawPreviewMuscle(cx,pw,ph);
}

// ── shared preview helper ──
function pRR(cx,x,y,w,h,r){
  cx.beginPath();
  cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.quadraticCurveTo(x+w,y,x+w,y+r);
  cx.lineTo(x+w,y+h-r);cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  cx.lineTo(x+r,y+h);cx.quadraticCurveTo(x,y+h,x,y+h-r);
  cx.lineTo(x,y+r);cx.quadraticCurveTo(x,y,x+r,y);
  cx.closePath();
}

// ── Vacation Wagon preview (side view) ──────────
function drawPreviewWagon(cx,pw,ph){
  const ox=pw/2, oy=ph*0.62;
  const W=88, H=34;

  // drop shadow
  cx.save(); cx.globalAlpha=0.18;
  cx.fillStyle='#000';
  cx.beginPath(); cx.ellipse(ox+1,oy+H/2+3,W*0.44,6,0,0,Math.PI*2); cx.fill();
  cx.restore();

  // body — beige/tan
  cx.fillStyle='#d4b882';
  pRR(cx,ox-W/2,oy-H/2,W,H,5); cx.fill();

  // body lower darker panel
  cx.fillStyle='#c0a06a';
  pRR(cx,ox-W/2,oy+H*0.22,W,H*0.38,3); cx.fill();

  // side windows (greenhouse)
  cx.fillStyle='rgba(160,210,230,0.55)';
  pRR(cx,ox-W/2+10,oy-H/2+4,W*0.38,H*0.44,3); cx.fill();
  pRR(cx,ox-W/2+10+W*0.38+4,oy-H/2+4,W*0.22,H*0.44,3); cx.fill();

  // window frames
  cx.strokeStyle='#b09060'; cx.lineWidth=1.5;
  pRR(cx,ox-W/2+10,oy-H/2+4,W*0.38,H*0.44,3); cx.stroke();
  pRR(cx,ox-W/2+10+W*0.38+4,oy-H/2+4,W*0.22,H*0.44,3); cx.stroke();

  // pillar
  cx.fillStyle='#b09060';
  cx.fillRect(ox-W/2+10+W*0.38+1,oy-H/2+4,3,H*0.44);

  // body crease line
  cx.strokeStyle='#b89060'; cx.lineWidth=1;
  cx.beginPath(); cx.moveTo(ox-W/2+2,oy+H*0.05); cx.lineTo(ox+W/2-2,oy+H*0.05); cx.stroke();

  // roof rack
  cx.fillStyle='#8a7050';
  cx.fillRect(ox-W/2+12,oy-H/2-4,W-24,5);
  cx.fillRect(ox-W/2+12,oy-H/2-4,3,4);
  cx.fillRect(ox+W/2-15,oy-H/2-4,3,4);

  // luggage on roof
  // suitcase 1
  cx.fillStyle='#8B4513';
  pRR(cx,ox-W*0.28,oy-H/2-10,18,8,2); cx.fill();
  cx.fillStyle='#6B3010';
  cx.fillRect(ox-W*0.28+7,oy-H/2-10,4,8);
  cx.fillStyle='#c8a060';
  cx.fillRect(ox-W*0.28+7,oy-H/2-7,4,2);
  // suitcase 2
  cx.fillStyle='#d4602a';
  pRR(cx,ox-W*0.05,oy-H/2-9,14,7,2); cx.fill();
  cx.fillStyle='#b84820';
  cx.fillRect(ox-W*0.05+5,oy-H/2-9,3,7);

  // front bumper
  cx.fillStyle='#c8a870';
  cx.fillRect(ox+W/2-3,oy+H*0.18,5,H*0.28);
  // rear bumper
  cx.fillStyle='#c8a870';
  cx.fillRect(ox-W/2-2,oy+H*0.18,5,H*0.28);

  // headlight
  cx.fillStyle='rgba(255,240,160,0.8)';
  cx.fillRect(ox+W/2-2,oy-H*0.28,4,8);
  // taillight
  cx.fillStyle='rgba(220,60,50,0.85)';
  cx.fillRect(ox-W/2-2,oy-H*0.28,4,8);

  // wheels
  [ox-W/2+14, ox+W/2-14].forEach(wx=>{
    const wy=oy+H/2+1;
    cx.fillStyle='#1a1a1a';
    cx.beginPath(); cx.arc(wx,wy,11,0,Math.PI*2); cx.fill();
    cx.fillStyle='#3a3a3a';
    cx.beginPath(); cx.arc(wx,wy,8,0,Math.PI*2); cx.fill();
    cx.fillStyle='#606060';
    cx.beginPath(); cx.arc(wx,wy,4.5,0,Math.PI*2); cx.fill();
    // spokes
    cx.strokeStyle='#505050'; cx.lineWidth=1.2;
    for(let a=0;a<6;a++){
      const ang=a*Math.PI/3;
      cx.beginPath(); cx.moveTo(wx,wy); cx.lineTo(wx+Math.cos(ang)*6,wy+Math.sin(ang)*6); cx.stroke();
    }
  });
}

// ── Ice Cream Truck preview (side view) ─────────
function drawPreviewTruck(cx,pw,ph){
  const ox=pw/2, oy=ph*0.60;
  const W=86, H=38;

  // drop shadow
  cx.save(); cx.globalAlpha=0.18;
  cx.fillStyle='#000';
  cx.beginPath(); cx.ellipse(ox,oy+H/2+4,W*0.42,6,0,0,Math.PI*2); cx.fill();
  cx.restore();

  // body — white/cream truck
  cx.fillStyle='#e8e4dc';
  pRR(cx,ox-W/2,oy-H/2,W,H,4); cx.fill();

  // blue lower band
  cx.fillStyle='#5a88b8';
  pRR(cx,ox-W/2,oy+H*0.28,W,H*0.38,3); cx.fill();

  // serving window opening
  cx.fillStyle='rgba(140,100,60,0.4)';
  pRR(cx,ox-W/2+10,oy-H*0.32,W*0.42,H*0.48,3); cx.fill();
  cx.strokeStyle='#8a8070'; cx.lineWidth=1.5;
  pRR(cx,ox-W/2+10,oy-H*0.32,W*0.42,H*0.48,3); cx.stroke();

  // awning — pink & white stripes
  const awL=ox-W/2+8, awR=ox-W/2+8+W*0.44, awY=oy-H*0.32-3;
  for(let i=0;i<5;i++){
    cx.fillStyle=i%2===0?'#f0a0b0':'#f8f0f0';
    cx.fillRect(awL+i*(W*0.44/5),awY-8,W*0.44/5,10);
  }
  // awning border
  cx.strokeStyle='#c07080'; cx.lineWidth=1;
  cx.strokeRect(awL,awY-8,W*0.44,10);
  // awning scallops
  cx.fillStyle='#f0a0b0';
  for(let i=0;i<5;i++){
    const sx=awL+i*(W*0.44/5)+W*0.044/2;
    cx.beginPath(); cx.arc(sx,awY+2,4,0,Math.PI); cx.fill();
  }

  // ice cream cone on roof
  const coneX=ox+W*0.18, coneBaseY=oy-H/2;
  // cone body
  cx.fillStyle='#d4a870';
  cx.beginPath();
  cx.moveTo(coneX-8,coneBaseY);
  cx.lineTo(coneX+8,coneBaseY);
  cx.lineTo(coneX,coneBaseY-16);
  cx.closePath(); cx.fill();
  cx.strokeStyle='#b88a50'; cx.lineWidth=0.8;
  cx.beginPath(); cx.moveTo(coneX-8,coneBaseY); cx.lineTo(coneX+8,coneBaseY); cx.stroke();
  // waffle lines
  cx.strokeStyle='#c09060'; cx.lineWidth=0.7;
  for(let y=0;y<3;y++){
    const yy=coneBaseY-4-y*4;
    const xspan=8*(1-(y*4/16));
    cx.beginPath(); cx.moveTo(coneX-xspan,yy); cx.lineTo(coneX+xspan,yy); cx.stroke();
  }
  // soft serve swirl
  cx.fillStyle='#f8d0d8';
  cx.beginPath(); cx.arc(coneX,coneBaseY-16,7,0,Math.PI*2); cx.fill();
  cx.fillStyle='#f0a8b8';
  cx.beginPath(); cx.arc(coneX-2,coneBaseY-21,5,0,Math.PI*2); cx.fill();
  cx.fillStyle='#f8d0d8';
  cx.beginPath(); cx.arc(coneX+1,coneBaseY-26,4,0,Math.PI*2); cx.fill();
  cx.fillStyle='#f0a8b8';
  cx.beginPath(); cx.arc(coneX-1,coneBaseY-30,2.5,0,Math.PI*2); cx.fill();

  // front cab
  cx.fillStyle='#d8d4cc';
  pRR(cx,ox+W/2-22,oy-H/2,22,H*0.65,4); cx.fill();
  // cab window

// ── Road ───────────────────────────────────────
const ROAD_W=220, SEG_LEN=60, VISIBLE_SEGS=80;
let roadSegs=[], roadGenAngle=-Math.PI/2, roadGenX=0, roadGenY=0;
let roadGenCurvature=0, roadGenCurveTarget=0, roadGenTimer=0, roadDifficulty=0;

function initRoad() {
  roadSegs=[]; roadGenAngle=-Math.PI/2; roadGenX=0; roadGenY=0;
  roadGenCurvature=0; roadGenCurveTarget=0; roadGenTimer=0; roadDifficulty=0;
  for (let i=0;i<VISIBLE_SEGS+20;i++) extendRoad();
}

function extendRoad() {
  roadGenTimer--;
  if (roadGenTimer<=0) {
    const maxC=0.012+roadDifficulty*0.022;
    roadGenCurveTarget=(Math.random()-0.5)*2*maxC;
    roadGenTimer=30+Math.floor(Math.random()*60*(1-roadDifficulty*0.5));
  }
  roadGenCurvature+=(roadGenCurveTarget-roadGenCurvature)*0.06;
  roadGenAngle+=roadGenCurvature;
  roadSegs.push({ x:roadGenX, y:roadGenY, angle:roadGenAngle });
  roadGenX+=Math.cos(roadGenAngle)*SEG_LEN;
  roadGenY+=Math.sin(roadGenAngle)*SEG_LEN;
}

// ── Scenery ────────────────────────────────────
let sceneryObjects=[];
const SCENERY_TYPES=['gasstation','tires','fence','smallhouse','parkedcar','barrier','bush'];

function spawnScenery(seg, segIdx) {

  const px=seg.x+Math.cos(seg.angle+Math.PI/2)*side*offset;
  const py=seg.y+Math.sin(seg.angle+Math.PI/2)*side*offset;
  sceneryObjects.push({ type, x:px, y:py, angle:Math.random()*Math.PI*2, segIdx });
}

// ── Camera ─────────────────────────────────────
let camX=0, camY=0, camAngle=0;
function updateCamera() {
  const ta=car.angle+Math.PI/2;
  camX+=(car.x-camX)*0.08; camY+=(car.y-camY)*0.08;
  let da=ta-camAngle; while(da>Math.PI)da-=Math.PI*2; while(da<-Math.PI)da+=Math.PI*2;
  camAngle+=da*0.08;
}
function w2s(wx,wy) {
  const dx=wx-camX, dy=wy-camY;
  const cos=Math.cos(-camAngle), sin=Math.sin(-camAngle);
  return { x:canvas.width/2+dx*cos-dy*sin, y:canvas.height*0.55+dx*sin+dy*cos };
}

// ── Draw Road ──────────────────────────────────
function drawRoad() {
  if (roadSegs.length<2) return;
  ctx.fillStyle='#3a3a30'; ctx.fillRect(0,0,canvas.width,canvas.height);
  const n=roadSegs.length;
  const left=[], right=[];
  for (let i=0;i<n;i++) {
    const seg=roadSegs[i], perp=seg.angle+Math.PI/2;
    left.push(w2s(seg.x+Math.cos(perp)*ROAD_W, seg.y+Math.sin(perp)*ROAD_W));
    right.push(w2s(seg.x-Math.cos(perp)*ROAD_W, seg.y-Math.sin(perp)*ROAD_W));
  }
  // surface
  ctx.beginPath(); ctx.moveTo(left[0].x,left[0].y);
  for (let i=1;i<n;i++) ctx.lineTo(left[i].x,left[i].y);
  for (let i=n-1;i>=0;i--) ctx.lineTo(right[i].x,right[i].y);
  ctx.closePath(); ctx.fillStyle='#4a4a44'; ctx.fill();
  // centre dashes
  ctx.save(); ctx.strokeStyle='rgba(255,240,180,0.18)'; ctx.lineWidth=2; ctx.setLineDash([24,28]);
  ctx.beginPath();
  for (let i=0;i<n;i++) { const s=w2s(roadSegs[i].x,roadSegs[i].y); if(i===0)ctx.moveTo(s.x,s.y); else ctx.lineTo(s.x,s.y); }
  ctx.stroke(); ctx.restore();
  // edges
  ctx.save(); ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=3; ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(left[0].x,left[0].y); for(let i=1;i<n;i++) ctx.lineTo(left[i].x,left[i].y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(right[0].x,right[0].y); for(let i=1;i<n;i++) ctx.lineTo(right[i].x,right[i].y); ctx.stroke();
  ctx.restore();
  // curb stripes
  for (let i=0;i<n-1;i+=2) {
    const s=roadSegs[i], s2=roadSegs[Math.min(i+2,n-1)];
    const p=s.angle+Math.PI/2, p2=s2.angle+Math.PI/2;
    const col=(i/2)%2===0?'rgba(220,60,50,0.5)':'rgba(240,240,230,0.4)';
    [[1],[- 1]].forEach(([sign])=>{
      const a=w2s(s.x+Math.cos(p)*sign*(ROAD_W-6), s.y+Math.sin(p)*sign*(ROAD_W-6));
      const b=w2s(s.x+Math.cos(p)*sign*(ROAD_W+6), s.y+Math.sin(p)*sign*(ROAD_W+6));
      const c2=w2s(s2.x+Math.cos(p2)*sign*(ROAD_W-6),s2.y+Math.sin(p2)*sign*(ROAD_W-6));
      const d=w2s(s2.x+Math.cos(p2)*sign*(ROAD_W+6),s2.y+Math.sin(p2)*sign*(ROAD_W+6));
      ctx.fillStyle=col; ctx.beginPath();
      ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(d.x,d.y); ctx.lineTo(c2.x,c2.y);
      ctx.closePath(); ctx.fill();
    });
  }
}

// ── Draw Scenery ───────────────────────────────
function drawScenery() {
  for (const obj of sceneryObjects) {
    const s=w2s(obj.x,obj.y);
    ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(obj.angle-camAngle);
    switch(obj.type) {
      case 'gasstation': dGasStation(); break;
      case 'tires':      dTireStack();  break;
      case 'fence':      dFence();      break;
      case 'smallhouse': dHouse();      break;
      case 'parkedcar':  dParkedCar();  break;
      case 'barrier':    dBarrier();    break;
      case 'bush':       dBush();       break;
    }
    ctx.restore();
  }
}

function dGasStation() {
  ctx.fillStyle='#5a5248'; ctx.fillRect(-28,-18,56,6);
  ctx.fillStyle='#4a4240'; ctx.fillRect(-24,-28,6,10); ctx.fillRect(18,-28,6,10);
  ctx.fillStyle='#6a6058'; ctx.fillRect(4,-26,8,16);
  ctx.fillStyle='#888070'; ctx.fillRect(6,-24,4,8);
}
function dTireStack() {
  for(let i=0;i<3;i++) {
    ctx.fillStyle='#282820'; ctx.beginPath(); ctx.ellipse(i*8-8,0,7,5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#383830'; ctx.beginPath(); ctx.ellipse(i*8-8,-3,5,3.5,0,0,Math.PI*2); ctx.fill();
  }
}
function dFence() {
  ctx.strokeStyle='#6a5a48'; ctx.lineWidth=2;
  for(let i=-30;i<=30;i+=10){ ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,-12); ctx.stroke(); }
  ctx.beginPath(); ctx.moveTo(-30,-8); ctx.lineTo(30,-8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-30,-4); ctx.lineTo(30,-4); ctx.stroke();
}
function dHouse() {
  ctx.fillStyle='#5a5248'; ctx.fillRect(-18,-14,36,22);
  ctx.fillStyle='#4a3e38';
  ctx.beginPath(); ctx.moveTo(-22,-14); ctx.lineTo(0,-32); ctx.lineTo(22,-14); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#3a3028'; ctx.fillRect(-6,-6,10,14);
  ctx.fillStyle='#2a2a22'; ctx.fillRect(8,-8,6,6);
}
function dParkedCar() {
  ctx.fillStyle='#5a5858';
  roundRect(ctx,-14,-8,28,16,4); ctx.fill();
  ctx.fillStyle='#383838'; ctx.fillRect(-10,-6,8,4); ctx.fillRect(2,-6,8,4);
  ctx.fillStyle='#222';
  [[-12,-5],[-12,5],[12,-5],[12,5]].forEach(([wx,wy])=>{ ctx.beginPath(); ctx.ellipse(wx,wy,4,3,0,0,Math.PI*2); ctx.fill(); });
}
function dBarrier() {
  for(let i=-2;i<=2;i++) {
    ctx.fillStyle=i%2===0?'#cc4422':'#ddd';
    ctx.fillRect(i*12-5,-10,10,18);
  }
}
function dBush() {
  const cols=['#3a4a2a','#4a5a3a','#2a3a1a'];
  for(let i=0;i<3;i++) {
    ctx.fillStyle=cols[i%3];
    ctx.beginPath(); ctx.arc((i-1)*10,-(i===1?8:5),8+i*2,0,Math.PI*2); ctx.fill();
  }
}

// ── Draw Car (top-down rear view, ~35% larger) ──
function drawCar() {
  const s=w2s(car.x,car.y);
  const def=car.def;
  const va=car.angle-camAngle+Math.PI/2;
  const la=car.driftAngle*0.5;
  ctx.save(); ctx.translate(s.x,s.y); ctx.rotate(va+la);

  // scale up ~35%
  ctx.scale(1.35, 1.35);

  if      (def.name==='wagon')  drawTopWagon(def);
  else if (def.name==='truck')  drawTopTruck(def);
  else                          drawTopMuscle(def);

  ctx.restore();
}

// ── shared top-down wheel helper ────────────────
function drawWheel(x,y,w,h,steer){
  ctx.save(); ctx.translate(x,y);
  if(steer) ctx.rotate(car.steerInput*0.35);
  ctx.fillStyle='#1a1a18';
  roundRect(ctx,-w/2,-h/2,w,h,2); ctx.fill();
  ctx.fillStyle='#2e2e2c';
  ctx.fillRect(-w/2+1,-h/2+2,w-2,h-4);
  ctx.restore();
}

// ── Ice Cream Truck — top-down rear view ─────────
function drawTopTruck(def){

  // shadow

  ctx.fillStyle='#000'; ctx.beginPath(); ctx.ellipse(1,3,cw*0.55,ch*0.42,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // body — white/cream
  ctx.fillStyle='#e8e4dc';

  // blue stripe along sides
  ctx.fillStyle='#5a88b8';
  ctx.fillRect(-cw/2,ch*0.1,cw,ch*0.22);

  // roof — slightly off-white
  ctx.fillStyle='#d8d4cc';
  roundRect(ctx,-cw/2+3,-ch/2+4,cw-6,ch*0.5,3); ctx.fill();

  // awning stripes on roof (pink & white)
  for(let i=0;i<5;i++){
    ctx.fillStyle=i%2===0?'#f0a0b0':'#f5f0ec';
    ctx.fillRect(-cw/2+4+i*(cw-8)/5,-ch/2+4,(cw-8)/5,ch*0.18);
  }

  // ice cream cone topper
  const coneX=0, coneY=-ch*0.1;
  // cone base
  ctx.fillStyle='#d4a870';
  ctx.beginPath(); ctx.moveTo(coneX-7,coneY+6); ctx.lineTo(coneX+7,coneY+6); ctx.lineTo(coneX,coneY+18); ctx.closePath(); ctx.fill();
  ctx.strokeStyle='#b88a50'; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.moveTo(coneX-7,coneY+6); ctx.lineTo(coneX+7,coneY+6); ctx.stroke();
  // soft serve top-down (circles stacked)
  ctx.fillStyle='#f8d0d8';
  ctx.beginPath(); ctx.arc(coneX,coneY+3,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#f0a8b8';
  ctx.beginPath(); ctx.arc(coneX,coneY-2,4.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#f8d0d8';
  ctx.beginPath(); ctx.arc(coneX,coneY-7,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#f0b0c0';
  ctx.beginPath(); ctx.arc(coneX,coneY-11,2,0,Math.PI*2); ctx.fill();
  // sprinkle dots
  const sprinkles=[[-3,-4,'#e84'],[4,-2,'#4a8'],[2,2,'#84e'],[-4,1,'#e44'],[0,-8,'#4ae']];
  sprinkles.forEach(([sx,sy,sc])=>{ ctx.fillStyle=sc; ctx.beginPath(); ctx.arc(coneX+sx,coneY+sy,0.9,0,Math.PI*2); ctx.fill(); });

  // rear panel
  ctx.fillStyle='#d0ccc4';
  roundRect(ctx,-cw/2,ch/2-9,cw,9,2); ctx.fill();

  // taillights
  ctx.fillStyle='rgba(220,50,40,0.95)';
  roundRect(ctx,-cw/2+2,ch/2-7,cw*0.25,5,1); ctx.fill();
  roundRect(ctx,cw/2-2-cw*0.25,ch/2-7,cw*0.25,5,1); ctx.fill();

  // headlights (front)
  ctx.fillStyle='rgba(255,245,200,0.85)';
  roundRect(ctx,-cw/2+3,-ch/2+2,cw*0.25,4,1); ctx.fill();
  roundRect(ctx,cw/2-3-cw*0.25,-ch/2+2,cw*0.25,4,1); ctx.fill();

  // wheels (truck = slightly wider)
  const wr=5.5, wh=11;
  drawWheel(-cw/2-2,-ch*0.3,wr,wh,true);
  drawWheel( cw/2+2,-ch*0.3,wr,wh,true);
  drawWheel(-cw/2-2, ch*0.3,wr,wh,false);
  drawWheel( cw/2+2, ch*0.3,wr,wh,false);
}

// ── Pure Muscle — top-down rear view ─────────────
function drawTopMuscle(def){
  const cw=def.w, ch=def.h;

  // shadow
  ctx.save(); ctx.globalAlpha=0.22;
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.ellipse(1,4,cw*0.58,ch*0.4,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // body — red
  ctx.fillStyle='#c03028';
  roundRect(ctx,-cw/2,-ch/2,cw,ch,4); ctx.fill();

  // lower body slightly darker
  ctx.fillStyle='#a02020';
  ctx.fillRect(-cw/2,ch*0.12,cw,ch*0.3);

  // white racing stripes (top to bottom)
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.fillRect(-cw*0.12,-ch/2,cw*0.1,ch);
  ctx.fillRect( cw*0.02,-ch/2,cw*0.1,ch);

  // roof / cab — darker red
  ctx.fillStyle='#8a1818';
  roundRect(ctx,-cw/2+4,-ch/2+8,cw-8,ch*0.42,3); ctx.fill();

  // rear windshield
  ctx.fillStyle='rgba(150,210,225,0.5)';
  roundRect(ctx,-cw/2+6,-ch/2+16,cw-12,ch*0.14,2); ctx.fill();
  ctx.strokeStyle='rgba(200,240,255,0.3)'; ctx.lineWidth=0.7;
  roundRect(ctx,-cw/2+6,-ch/2+16,cw-12,ch*0.14,2); ctx.stroke();

  // hood scoop
  ctx.fillStyle='#701010';
  roundRect(ctx,-cw*0.12,-ch/2+2,cw*0.24,ch*0.1,2); ctx.fill();
  ctx.fillStyle='#1a0808';
  roundRect(ctx,-cw*0.09,-ch/2+3,cw*0.18,ch*0.06,1); ctx.fill();

  // rear spoiler — wide wing
  ctx.fillStyle='#1a1a1a';
  roundRect(ctx,-cw/2-3,ch/2-5,cw+6,4,1); ctx.fill();
  // spoiler uprights
  ctx.fillStyle='#2a2a2a';
  ctx.fillRect(-cw/2+4,ch/2-10,4,6);
  ctx.fillRect( cw/2-8,ch/2-10,4,6);

  // side exhaust pipes
  ctx.fillStyle='#585850';
  roundRect(ctx,-cw/2-3,ch*0.08,4,8,1); ctx.fill();
  roundRect(ctx,-cw/2-3,ch*0.22,4,8,1); ctx.fill();
  ctx.fillStyle='#888880';
  ctx.beginPath(); ctx.ellipse(-cw/2-2,ch*0.08+4,1.5,3,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(-cw/2-2,ch*0.22+4,1.5,3,0,0,Math.PI*2); ctx.fill();

  // rear bumper / taillights
  ctx.fillStyle='#901818';
  roundRect(ctx,-cw/2,ch/2-8,cw,8,2); ctx.fill();
  // taillights — bright red
  ctx.fillStyle='rgba(255,50,40,0.95)';
  roundRect(ctx,-cw/2+2,ch/2-7,cw*0.32,5,1); ctx.fill();
  roundRect(ctx,cw/2-2-cw*0.32,ch/2-7,cw*0.32,5,1); ctx.fill();
  // centre brake light
  ctx.fillStyle='rgba(255,80,60,0.6)';
  ctx.fillRect(-cw*0.08,ch/2-7,cw*0.16,5);

  // headlights (front)
  ctx.fillStyle='rgba(255,245,180,0.85)';
  roundRect(ctx,-cw/2+3,-ch/2+2,cw*0.3,4,1); ctx.fill();
  roundRect(ctx,cw/2-3-cw*0.3,-ch/2+2,cw*0.3,4,1); ctx.fill();

  // wheels — slightly wider
  const wr=6, wh=11;
  drawWheel(-cw/2-3,-ch*0.28,wr,wh,true);
  drawWheel( cw/2+3,-ch*0.28,wr,wh,true);
  drawWheel(-cw/2-3, ch*0.3, wr,wh,false);
  drawWheel( cw/2+3, ch*0.3, wr,wh,false);
}

// ── Draw Particles ─────────────────────────────
function drawParticles() {
  for (const tm of tireMarks) {
    const s=w2s(tm.x,tm.y);
    ctx.save(); ctx.globalAlpha=tm.alpha*0.5; ctx.fillStyle='#1a1a18';
    ctx.beginPath(); ctx.arc(s.x,s.y,tm.r,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
  for (const p of smokeParticles) {
    const s=w2s(p.x,p.y);
    ctx.save(); ctx.globalAlpha=p.life*0.4;
    ctx.fillStyle=`rgba(200,200,180,${p.life*0.3})`;
    ctx.beginPath(); ctx.arc(s.x,s.y,p.size*(2-p.life),0,Math.PI*2); ctx.fill(); ctx.restore();
  }
  for (const lf of leafParticles) {
    ctx.save(); ctx.translate(lf.x,lf.y); ctx.rotate(lf.angle);
    ctx.globalAlpha=lf.life*0.7; ctx.fillStyle='#7a8a4a';
    ctx.beginPath(); ctx.ellipse(0,0,lf.size,lf.size*0.5,0,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ── Off-road Check ─────────────────────────────
function lateralOffRoad() {
  let best=Infinity, bestIdx=0;
  for(let i=0;i<roadSegs.length;i++){
    const seg=roadSegs[i], dx=car.x-seg.x, dy=car.y-seg.y;
    const d2=dx*dx+dy*dy; if(d2<best){best=d2;bestIdx=i;}
  }
  const seg=roadSegs[bestIdx];
  const dx=car.x-seg.x, dy=car.y-seg.y, perp=seg.angle+Math.PI/2;
  return Math.abs(dx*Math.cos(perp)+dy*Math.sin(perp));
}

// ── Update ─────────────────────────────────────
let gameTime=0;
function updateGame() {
  if(!car.alive) return;
  gameTime++;
  roadDifficulty=Math.min(1,gameTime/3600);
  while(roadSegs.length<VISIBLE_SEGS+20) extendRoad();
  const def=car.def;
  let steer=0;
  if(keys.left)  steer=-1;
  if(keys.right) steer=1;
  car.steerInput+=(steer-car.steerInput)*0.15;
  if(steer!==0){ car.driftAngle+=steer*def.driftBuild*2; car.driftAmount=Math.min(1,car.driftAmount+0.025); }
  else { car.driftAngle*=(1-def.steerReturn); car.driftAmount=Math.max(0,car.driftAmount-0.04); }
  car.driftAngle=Math.max(-def.maxDrift*Math.PI/180,Math.min(def.maxDrift*Math.PI/180,car.driftAngle));
  car.angle+=car.steerInput*def.steerSpeed+car.driftAngle*def.driftFactor*0.015;
  car.x+=Math.cos(car.angle)*def.speed; car.y+=Math.sin(car.angle)*def.speed;
  car.distanceTraveled+=def.speed;
  // tire marks
  if(car.driftAmount>0.3){
    const perp=car.angle+Math.PI/2, ww=def.w*0.45;
    tireMarks.push({x:car.x+Math.cos(perp)*ww, y:car.y+Math.sin(perp)*ww, r:2.5, alpha:car.driftAmount});
    tireMarks.push({x:car.x-Math.cos(perp)*ww, y:car.y-Math.sin(perp)*ww, r:2.5, alpha:car.driftAmount});
    if(tireMarks.length>600) tireMarks.splice(0,50);
  }
  // smoke
  if(car.driftAmount>0.5&&Math.random()<0.4){
    const back=car.angle+Math.PI;
    spawnSmoke(car.x+Math.cos(back)*def.h*0.4, car.y+Math.sin(back)*def.h*0.4);
  }
  for(const p of smokeParticles){p.x+=p.vx;p.y+=p.vy;p.life-=0.022;}
  smokeParticles=smokeParticles.filter(p=>p.life>0);
  maybeSpawnLeaf();
  for(const lf of leafParticles){lf.x+=lf.vx;lf.y+=lf.vy;lf.angle+=lf.spin;lf.life-=0.004;}
  leafParticles=leafParticles.filter(lf=>lf.life>0&&lf.y<canvas.height+20);
  // cull road & spawn scenery
  let bestIdx=0, bestDist=Infinity;
  for(let i=0;i<roadSegs.length;i++){
    const seg=roadSegs[i], dx=car.x-seg.x, dy=car.y-seg.y, d2=dx*dx+dy*dy;
    if(d2<bestDist){bestDist=d2;bestIdx=i;}
  }
  if(bestIdx>10){
    const newSeg=roadSegs[roadSegs.length-1];
    if(Math.random()<0.3) spawnScenery(newSeg, roadSegs.length-1);
    roadSegs.splice(0,bestIdx-8);
    sceneryObjects=sceneryObjects.filter(o=>o.segIdx>=bestIdx-10);
  }
  // off-road
  const lat=lateralOffRoad();
  if(lat>ROAD_W+30){ car.crashTimer++; if(car.crashTimer>30){car.alive=false;endGame();} }
  else car.crashTimer=0;
  // HUD
  const m=Math.floor(car.distanceTraveled/8);
  document.getElementById('hud-dist').textContent=m+'m';
  document.getElementById('hud-best').textContent=Math.max(m,bestDistance)+'m';
  document.getElementById('drift-indicator').classList.toggle('active',car.driftAmount>0.3);
}

// ── Render ─────────────────────────────────────
function drawStartBG() {
  ctx.fillStyle='#0e0e12'; ctx.fillRect(0,0,canvas.width,canvas.height);
  const cx2=canvas.width/2;
  ctx.fillStyle='rgba(74,74,68,0.3)';
  ctx.beginPath(); ctx.moveTo(cx2-80,canvas.height); ctx.lineTo(cx2-40,canvas.height*0.3);
  ctx.lineTo(cx2+40,canvas.height*0.3); ctx.lineTo(cx2+80,canvas.height); ctx.closePath(); ctx.fill();
}

function gameLoop() {
  requestAnimationFrame(gameLoop);
  if(STATE!=='play') return;
  updateCamera(); updateGame();
  ctx.fillStyle='#3a3a30'; ctx.fillRect(0,0,canvas.width,canvas.height);
  drawRoad(); drawParticles(); drawScenery(); drawCar();
  // vignette
  const g=ctx.createRadialGradient(canvas.width/2,canvas.height/2,canvas.height*0.2,canvas.width/2,canvas.height/2,canvas.height*0.8);
  g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,0.35)');
  ctx.fillStyle=g; ctx.fillRect(0,0,canvas.width,canvas.height);
}
requestAnimationFrame(gameLoop);

// ── Game Flow ──────────────────────────────────
function startGame() {
  if(selectedCar<0) return;
  tireMarks=[]; smokeParticles=[]; leafParticles=[]; sceneryObjects=[]; gameTime=0;
  initRoad(); initCar(selectedCar);
  updateCamera(); camX=car.x; camY=car.y; camAngle=car.angle+Math.PI/2;
  document.getElementById('start-screen').style.display='none';
  document.getElementById('gameover-screen').classList.remove('show');
  document.getElementById('hud').style.display='flex';
  document.getElementById('drift-indicator').style.display='block';
  if(('ontouchstart' in window)||navigator.maxTouchPoints>0)
    document.getElementById('mobile-controls').style.display='block';
  STATE='play';
}
function endGame() {
  const m=Math.floor(car.distanceTraveled/8);
  if(m>bestDistance) bestDistance=m;
  document.getElementById('go-dist').textContent=m+'m';
  document.getElementById('go-best').textContent=bestDistance+'m';
  document.getElementById('gameover-screen').classList.add('show');
  STATE='over';
}
function retryGame() { document.getElementById('gameover-screen').classList.remove('show'); startGame(); }
function changeCar() {
  document.getElementById('gameover-screen').classList.remove('show');
  document.getElementById('hud').style.display='none';
  document.getElementById('drift-indicator').style.display='none';
  document.getElementById('mobile-controls').style.display='none';
  document.getElementById('start-screen').style.display='flex';
  drawStartBG(); STATE='start'; keys.left=false; keys.right=false;
}

document.querySelectorAll('.car-card').forEach(card=>{
  card.addEventListener('click',()=>{
    document.querySelectorAll('.car-card').forEach(c=>c.classList.remove('selected'));
    card.classList.add('selected');
    selectedCar=parseInt(card.dataset.car);
    document.getElementById('start-btn').classList.add('visible');
  });
});
document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('retry-btn').addEventListener('click',retryGame);
document.getElementById('change-car-btn').addEventListener('click',changeCar);

drawStartBG();
</script>
