
<style>
html, body { touch-action: none; overscroll-behavior: none; }
* { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; touch-action: none; }
#pb { font-family: 'Courier New', monospace; background: #080010; display: flex; flex-direction: column; align-items: center; width: 100%; height: 100%; }
#sb { width: 100%; max-width: 420px; background: #0d0020; border-bottom: 2px solid #cc00ff; padding: 7px 16px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.sl { font-size: 8px; color: #9900cc; letter-spacing: 1px; display: block; margin-bottom: 2px; }
.sv { font-size: 16px; font-weight: bold; color: #00eeff; display: block; }
.sv.hi { color: #ff00cc; }
#gw { width: 100%; max-width: 420px; position: relative; background: #080010; flex-shrink: 0; }
canvas { display: block; width: 100%; touch-action: none; }
#ctrl { width: 100%; max-width: 420px; background: #0d0020; border-top: 2px solid #cc00ff; display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; gap: 8px; flex-shrink: 0; }
.fb {
  width: 96px; height: 70px;
  background: #1a0035; border: 2px solid #cc00ff; border-radius: 14px;
  color: #cc00ff; font-family: 'Courier New', monospace; font-size: 9px; font-weight: bold;
  cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; letter-spacing: 1px;
  /* Large touch target */
  min-width: 96px; min-height: 70px;
  touch-action: none;
}
.fb.on { background: #4400aa; box-shadow: 0 0 18px #cc00ff; border-color: #ff00ff; }
.fa { font-size: 22px; line-height: 1; }

  background: #002200; border: 2px solid #00ff55; border-radius: 10px;

  letter-spacing: 1px; cursor: pointer; padding: 10px 14px; line-height: 1.6; text-align: center;
  touch-action: none; min-width: 72px;
}
.pip { width: 10px; height: 10px; border-radius: 50%; background: #ff3300; display:inline-block; margin: 0 3px; }
.pip.off { background: #300; }
#ov { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; z-index: 5; }
#ot { font-family: 'Courier New', monospace; font-size: 22px; font-weight: bold; color: #ffff00; text-align: center; line-height: 1.5; opacity: 0; transition: opacity 0.25s; letter-spacing: 2px; white-space: pre-line; }
#ot.show { opacity: 1; }

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<div id="pb">
  <div id="sb">
    <div style="text-align:center"><span class="sl">SCORE</span><span class="sv" id="ds">000000</span></div>
    <div style="text-align:center"><span class="sl">BEST</span><span class="sv hi" id="dh">000000</span></div>
    <div style="text-align:center"><span class="sl">BALL</span><span class="sv" id="db">1</span></div>
  </div>
  <div id="gw">
    <canvas id="c"></canvas>
    <div id="ov"><div id="ot"></div></div>
  </div>
  <div id="ctrl">
    <button class="fb" id="lbtn" aria-label="Left flipper"><span class="fa">&#9664;</span><span>LEFT</span></button>
    <div id="mc">
      <div style="font-size:7px;color:#ff3300;letter-spacing:1px">BALLS</div>
      <div id="pr"></div>
      <button id="lb" onclick="handleLaunch()" aria-label="Launch ball">LAUNCH<br>BALL</button>
    </div>
    <button class="fb" id="rbtn" aria-label="Right flipper"><span class="fa">&#9654;</span><span>RIGHT</span></button>
  </div>
</div>

<script>
// ── Prevent all zoom / scroll gestures on the game ───────────────────────────
document.addEventListener('gesturestart',  e=>e.preventDefault(), {passive:false});
document.addEventListener('gesturechange', e=>e.preventDefault(), {passive:false});
document.addEventListener('gestureend',    e=>e.preventDefault(), {passive:false});
document.addEventListener('touchmove',     e=>e.preventDefault(), {passive:false});
document.addEventListener('touchstart',    e=>{
  if(e.touches.length>1) e.preventDefault();
}, {passive:false});
// Block double-tap zoom via fast successive taps
let lastTap=0;
document.addEventListener('touchend', e=>{
  const now=Date.now();
  if(now-lastTap<350){ e.preventDefault(); }
  lastTap=now;
}, {passive:false});

const cv = document.getElementById('c');
const cx = cv.getContext('2d');
const gwEl = document.getElementById('gw');
let W=0, H=0;

function resize(){
  const r = gwEl.getBoundingClientRect();
  W = cv.width  = Math.floor(r.width) || 360;
  H = cv.height = Math.floor(W*1.6);
  gwEl.style.height = H+'px';
  buildLayout();
  initBg();
}

let score=0, hi=0, lives=3, ballN=1, gameOn=false, launched=false;
let lDown=false, rDown=false;
let lAng=0, rAng=0;
let parts=[], flashes=[], bgDots=[], shootingStars=[], tick=0, msgT=null;
let bx=0, by=0, vx=0, vy=0;
let L={};

const LF_REST=30, LF_ACT=-28, RF_REST=30, RF_ACT=-28;

function buildLayout(){
  const w=W, h=H, wall=8;
  const chuteW=Math.round(w*0.09);
  const pL=wall, pR=w-wall-chuteW, pW=pR-pL;
  const ballR=Math.max(7,Math.round(w*0.03));
  L={
    wall,chuteW,pL,pR,pW,wallT:wall,ballR,
    flipLen:  Math.round(pW*0.30),
    flipY:    Math.round(h*0.855),
    lfX:      Math.round(pL+pW*0.12),
    rfX:      Math.round(pL+pW*0.88),
    flipThickBase: Math.max(9,Math.round(w*0.026)),
    flipThickTip:  Math.max(3,Math.round(w*0.007)),
    bumpers:[
      {x:pL+pW*0.25,y:h*0.18,r:Math.round(w*0.072),pts:100,lit:0,col:'#ff0088'},
      {x:pL+pW*0.75,y:h*0.18,r:Math.round(w*0.072),pts:100,lit:0,col:'#ff8800'},
      {x:pL+pW*0.50,y:h*0.11,r:Math.round(w*0.068),pts:150,lit:0,col:'#00ffcc'},
      {x:pL+pW*0.20,y:h*0.30,r:Math.round(w*0.052),pts:75, lit:0,col:'#ff44aa'},
      {x:pL+pW*0.80,y:h*0.30,r:Math.round(w*0.052),pts:75, lit:0,col:'#44aaff'},
    ],
    slings:[
      {x1:pL+4,y1:h*0.63,x2:pL+pW*0.22,y2:h*0.72,lit:0,pts:50},
      {x1:pR-4,y1:h*0.63,x2:pL+pW*0.78,y2:h*0.72,lit:0,pts:50},
    ],
    targets:(()=>{
      const ts=[],n=5,span=pW*0.6,off=pL+pW*0.2;
      ['#ff0044','#ff8800','#ffff00','#00ff66','#00ccff'].forEach((col,i)=>
        ts.push({x:off+i*(span/(n-1)),y:h*0.065,hw:5,hh:11,lit:0,pts:50,col}));
      return ts;
    })(),
    dropX: Math.round(pL+pW*0.85),
    dropY: wall+Math.max(7,Math.round(w*0.03))+2,
  };
  if(!launched){bx=L.dropX;by=L.dropY;vx=0;vy=0;}
}

// ── Background ────────────────────────────────────────────────────────────────
function mkDot(layer,y){
  const cfg=[
    {spd:0.18,rMin:2.5,rMax:5,  alpha:0.11,drift:0.04,cols:['#cc00ff','#8800ff','#0044ff']},
    {spd:0.32,rMin:1.2,rMax:3,  alpha:0.17,drift:0.06,cols:['#ff0088','#cc00ff','#00ccff']},
    {spd:0.55,rMin:0.5,rMax:1.6,alpha:0.26,drift:0.10,cols:['#00eeff','#ffffff','#ffcc00']},
  ][layer];
  return{layer,col:cfg.cols[Math.floor(Math.random()*cfg.cols.length)],
    x:Math.random()*W,y:y!==undefined?y:Math.random()*H,
    r:cfg.rMin+Math.random()*(cfg.rMax-cfg.rMin),spd:cfg.spd*(0.7+Math.random()*0.6),
    alpha:cfg.alpha*(0.6+Math.random()*0.8),drift:(Math.random()-0.5)*cfg.drift,
    pulse:Math.random()*Math.PI*2,pulseSpd:0.02+Math.random()*0.03};
}
function initBg(){
  bgDots=[];
  for(let i=0;i<18;i++)bgDots.push(mkDot(0));
  for(let i=0;i<28;i++)bgDots.push(mkDot(1));
  for(let i=0;i<40;i++)bgDots.push(mkDot(2));
  shootingStars=[];
}
function spawnStar(){
  const fl=Math.random()<0.5;
  const sx=fl?Math.random()*W*0.3:W*0.7+Math.random()*W*0.3;
  const sy=Math.random()*H*0.25;
  const ang=(fl?1:-1)*(25+Math.random()*30)*Math.PI/180;
  const spd=5+Math.random()*7;
  shootingStars.push({x:sx,y:sy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
    len:60+Math.random()*120,col:['#ffffff','#00eeff','#ffcc44','#ff88ff'][Math.floor(Math.random()*4)],
    trail:[],life:1,decay:0.018+Math.random()*0.012});
}
function updateBg(){
  bgDots.forEach(p=>{
    p.y+=p.spd;p.x+=p.drift;p.pulse+=p.pulseSpd;
    if(p.y>H+10){const np=mkDot(p.layer,-10);Object.assign(p,np);}
    if(p.x<-10)p.x=W+5;if(p.x>W+10)p.x=-5;
  });
  if(Math.random()<0.004)spawnStar();
  shootingStars=shootingStars.filter(s=>{
    s.trail.push({x:s.x,y:s.y});
    const maxT=Math.ceil(s.len/Math.sqrt(s.vx*s.vx+s.vy*s.vy));
    if(s.trail.length>maxT)s.trail.shift();
    s.x+=s.vx;s.y+=s.vy;s.life-=s.decay;
    return s.life>0&&s.x>-50&&s.x<W+50&&s.y<H+50;
  });
}
function drawBg(){
  bgDots.forEach(p=>{
    const pulse=0.7+0.3*Math.sin(p.pulse);
    cx.globalAlpha=p.alpha*pulse;
    cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fillStyle=p.col;cx.fill();
    if(p.layer===2&&p.r>1){
      cx.strokeStyle=p.col;cx.lineWidth=0.5;
      cx.beginPath();cx.moveTo(p.x-p.r*2,p.y);cx.lineTo(p.x+p.r*2,p.y);cx.stroke();
      cx.beginPath();cx.moveTo(p.x,p.y-p.r*2);cx.lineTo(p.x,p.y+p.r*2);cx.stroke();
    }
  });
  cx.globalAlpha=1;
  shootingStars.forEach(s=>{
    if(s.trail.length<2)return;
    for(let i=1;i<s.trail.length;i++){
      const t=i/s.trail.length;
      cx.globalAlpha=t*s.life*0.95;
      cx.beginPath();cx.moveTo(s.trail[i-1].x,s.trail[i-1].y);cx.lineTo(s.trail[i].x,s.trail[i].y);
      cx.strokeStyle=s.col;cx.lineWidth=t*2.5;cx.lineCap='round';cx.stroke();
    }
    cx.globalAlpha=s.life;
    cx.beginPath();cx.arc(s.x,s.y,2,0,Math.PI*2);cx.fillStyle=s.col;cx.fill();
    cx.strokeStyle=s.col;cx.lineWidth=1;
    cx.beginPath();cx.moveTo(s.x-5,s.y);cx.lineTo(s.x+5,s.y);cx.stroke();
    cx.beginPath();cx.moveTo(s.x,s.y-5);cx.lineTo(s.x,s.y+5);cx.stroke();
    cx.globalAlpha=1;
  });
}

// ── Flipper geometry ──────────────────────────────────────────────────────────
function getFlipperPoly(isLeft,ang){
  const rad=ang*Math.PI/180,px=isLeft?L.lfX:L.rfX,py=L.flipY,len=L.flipLen;
  const tb=L.flipThickBase/2,tt=L.flipThickTip/2,sign=isLeft?1:-1;
  const ux=sign*Math.cos(rad),uy=Math.sin(rad),nx=-uy,ny=ux;
  return[{x:px+nx*tb,y:py+ny*tb},{x:px-nx*tb,y:py-ny*tb},
         {x:px+ux*len-nx*tt,y:py+uy*len-ny*tt},{x:px+ux*len+nx*tt,y:py+uy*len+ny*tt}];
}
function getSpine(isLeft,ang){
  const rad=ang*Math.PI/180,sign=isLeft?1:-1,px=isLeft?L.lfX:L.rfX,py=L.flipY;
  return{px,py,tx:px+sign*L.flipLen*Math.cos(rad),ty:py+L.flipLen*Math.sin(rad)};
}
function stepFlippers(){
  lAng+=((lDown?LF_ACT:LF_REST)-lAng)*0.28;
  rAng+=((rDown?RF_ACT:RF_REST)-rAng)*0.28;
}

// ── Collision ─────────────────────────────────────────────────────────────────
function ptSeg(px,py,ax,ay,bxp,byp){
  const dx=bxp-ax,dy=byp-ay,len2=dx*dx+dy*dy;
  const t=len2>0?Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/len2)):0;
  const cx2=ax+t*dx,cy2=ay+t*dy,ex=px-cx2,ey=py-cy2,d=Math.sqrt(ex*ex+ey*ey);
  return{dist:d,cx:cx2,cy:cy2,nx:d>0?ex/d:0,ny:d>0?ey/d:-1};
}
function resolveFlippers(){
  [[true,lAng,lDown],[false,rAng,rDown]].forEach(([isLeft,ang,active])=>{
    const{px,py,tx,ty}=getSpine(isLeft,ang);
    const{dist,cx:ccx,cy:ccy,nx,ny}=ptSeg(bx,by,px,py,tx,ty);
    const thresh=L.ballR+L.flipThickBase/2;
    if(dist<thresh){
      bx=ccx+nx*thresh;by=ccy+ny*thresh;
      const spd=Math.max(Math.sqrt(vx*vx+vy*vy),8),dot=vx*nx+vy*ny;
      vx-=2*dot*nx;vy-=2*dot*ny;
      const ns=Math.sqrt(vx*vx+vy*vy)||1;
      vx=vx/ns*spd;vy=vy/ns*spd;
      if(active&&vy>0)vy=-Math.abs(vy)*0.9;
      burst(ccx,ccy,'#00ccff',7);addFlash(ccx,ccy,'#00ccff');addScore(10,ccx,ccy);
    }
  });
}
function moveWithSubsteps(steps){
  const sx=vx/steps,sy=vy/steps;
  for(let i=0;i<steps;i++){
    bx+=sx;by+=sy;
    if(bx-L.ballR<L.pL){bx=L.pL+L.ballR;vx=Math.abs(vx)*0.72;burst(bx,by,'#ff00ff',4);addFlash(bx,by,'#ff00ff');}
    if(bx+L.ballR>L.pR){bx=L.pR-L.ballR;vx=-Math.abs(vx)*0.72;burst(bx,by,'#ff00ff',4);addFlash(bx,by,'#ff00ff');}
    if(by-L.ballR<L.wallT){by=L.wallT+L.ballR;vy=Math.abs(vy)*0.65;burst(bx,by,'#00eeff',5);addFlash(bx,by,'#00eeff');}
    L.bumpers.forEach(b=>{
      const dx=bx-b.x,dy=by-b.y,d=Math.sqrt(dx*dx+dy*dy),minD=b.r+L.ballR;
      if(d<minD&&d>0.01){
        const nx=dx/d,ny=dy/d;bx=b.x+nx*minD;by=b.y+ny*minD;
        const spd=Math.max(Math.sqrt(vx*vx+vy*vy),9);vx=nx*spd;vy=ny*spd;
        if(b.lit===0){b.lit=20;b.pts=Math.min(b.pts+25,500);addScore(b.pts,b.x,b.y);
          burst(b.x,b.y,b.col,14);addFlash(b.x,b.y,b.col);
          showMsg(['NICE!','COMBO!','HOT!','FIRE!','BOOM!','ZING!'][Math.floor(Math.random()*6)],700);}
      }
      if(b.lit>0)b.lit--;
    });
    L.slings.forEach(s=>{
      const{dist,cx:ccx,cy:ccy,nx,ny}=ptSeg(bx,by,s.x1,s.y1,s.x2,s.y2);
      if(dist<L.ballR+6){
        bx=ccx+nx*(L.ballR+6);by=ccy+ny*(L.ballR+6);
        const dot=vx*nx+vy*ny;vx-=2*dot*nx;vy-=2*dot*ny;
        const spd=Math.sqrt(vx*vx+vy*vy);if(spd<9){vx*=9/spd;vy*=9/spd;}
        if(s.lit===0){s.lit=14;addScore(s.pts,ccx,ccy);burst(ccx,ccy,'#ffff00',8);addFlash(ccx,ccy,'#ffff00');}
      }
      if(s.lit>0)s.lit--;
    });
    L.targets.forEach(t=>{
      const nearX=Math.max(t.x-t.hw,Math.min(bx,t.x+t.hw)),nearY=Math.max(t.y,Math.min(by,t.y+t.hh*2));
      const dx=bx-nearX,dy=by-nearY,d=Math.sqrt(dx*dx+dy*dy);
      if(d<L.ballR){
        const nx=d>0?dx/d:0,ny=d>0?dy/d:-1;bx=nearX+nx*L.ballR;by=nearY+ny*L.ballR;
        const dot=vx*nx+vy*ny;vx-=2*dot*nx*0.8;vy-=2*dot*ny*0.8;
        if(t.lit===0){t.lit=22;addScore(t.pts,t.x,t.y);burst(t.x,t.y,t.col,7);addFlash(t.x,t.y,t.col);}
      }
      if(t.lit>0)t.lit--;
    });
    resolveFlippers();
  }
}

// ── Effects ───────────────────────────────────────────────────────────────────
function addScore(pts,x,y){
  score+=pts;if(score>hi)hi=score;updateUI();
  parts.push({x,y,vx:(Math.random()-.5)*.8,vy:-1.4,life:1,decay:.015,text:'+'+pts,col:'#ffff00'});
}
function burst(x,y,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=1.5+Math.random()*3;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,decay:.04+Math.random()*.03,r:2+Math.random()*3,col});
  }
}
function addFlash(x,y,col){flashes.push({x,y,col,t:0,dur:16});}
function showMsg(txt,dur){
  const el=document.getElementById('ot');el.textContent=txt;el.classList.add('show');
  if(msgT)clearTimeout(msgT);
  if(dur)msgT=setTimeout(()=>el.classList.remove('show'),dur);
}
function updateUI(){
  document.getElementById('ds').textContent=String(score).padStart(6,'0');
  document.getElementById('dh').textContent=String(hi).padStart(6,'0');
  document.getElementById('db').textContent=ballN;
  const pr=document.getElementById('pr');pr.innerHTML='';
  for(let i=0;i<3;i++){const d=document.createElement('span');d.className='pip'+(i>=lives?' off':'');pr.appendChild(d);}
}
updateUI();

// ── Input — pointer events handle both touch and mouse ────────────────────────
const lbtn=document.getElementById('lbtn'),rbtn=document.getElementById('rbtn');
function setL(v){lDown=v;lbtn.classList.toggle('on',v);}
function setR(v){rDown=v;rbtn.classList.toggle('on',v);}

// Use pointerdown/up/cancel — works for touch and mouse, no ghost click delay
lbtn.addEventListener('pointerdown', e=>{e.preventDefault();setL(true);});
lbtn.addEventListener('pointerup',   e=>{e.preventDefault();setL(false);});
lbtn.addEventListener('pointercancel',()=>setL(false));
lbtn.addEventListener('pointerleave', ()=>setL(false));

rbtn.addEventListener('pointerdown', e=>{e.preventDefault();setR(true);});
rbtn.addEventListener('pointerup',   e=>{e.preventDefault();setR(false);});
rbtn.addEventListener('pointercancel',()=>setR(false));
rbtn.addEventListener('pointerleave', ()=>setR(false));

document.getElementById('lb').addEventListener('pointerdown', e=>{e.preventDefault();handleLaunch();});

// Keyboard fallback
document.addEventListener('keydown',e=>{
  if(e.key==='z'||e.key==='Z'||e.key==='ArrowLeft'){e.preventDefault();setL(true);}
  if(e.key==='/'||e.key==='ArrowRight'){e.preventDefault();setR(true);}
  if(e.key===' '){e.preventDefault();handleLaunch();}
});
document.addEventListener('keyup',e=>{
  if(e.key==='z'||e.key==='Z'||e.key==='ArrowLeft')setL(false);
  if(e.key==='/'||e.key==='ArrowRight')setR(false);
});

function handleLaunch(){
  if(!gameOn){startGame();return;}
  if(!launched){launched=true;vx=(Math.random()-0.5)*1.5;vy=1.5;bx=L.dropX;by=L.dropY;}
}
function startGame(){
  score=0;lives=3;ballN=1;gameOn=true;parts=[];flashes=[];tick=0;
  L.bumpers.forEach(b=>{b.lit=0;b.pts=100;});
  L.targets.forEach(t=>t.lit=0);L.slings.forEach(s=>s.lit=0);
  buildLayout();launched=false;bx=L.dropX;by=L.dropY;vx=0;vy=0;
  updateUI();showMsg('GET READY!',1400);
}

// ── Game loop ─────────────────────────────────────────────────────────────────
function update(){
  tick++;
  updateBg();
  if(!gameOn)return;
  stepFlippers();
  if(!launched){bx=L.dropX;by=L.dropY;vx=0;vy=0;return;}
  vy+=0.3;
  const spd=Math.sqrt(vx*vx+vy*vy);
  if(spd>18){vx*=18/spd;vy*=18/spd;}
  moveWithSubsteps(Math.max(3,Math.ceil(spd/4)));
  parts=parts.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.06;p.life-=p.decay;return p.life>0;});
  flashes=flashes.filter(f=>++f.t<f.dur);
  if(by>H+20){
    lives--;
    if(lives<=0){gameOn=false;if(score>hi)hi=score;updateUI();showMsg('GAME\nOVER',0);return;}
    ballN++;launched=false;bx=L.dropX;by=L.dropY;vx=0;vy=0;
    updateUI();showMsg('BALL '+ballN,1400);
  }
}

function drawFlipper(isLeft,ang,active){
  const poly=getFlipperPoly(isLeft,ang);
  const{px,py}=getSpine(isLeft,ang);
  cx.shadowColor='#00ccff';cx.shadowBlur=active?24:10;
  cx.beginPath();
  cx.moveTo(poly[0].x,poly[0].y);cx.lineTo(poly[1].x,poly[1].y);
  cx.lineTo(poly[2].x,poly[2].y);cx.lineTo(poly[3].x,poly[3].y);
  cx.closePath();
  cx.fillStyle=active?'#00ddff':'#0077aa';cx.fill();
  cx.beginPath();cx.moveTo(poly[0].x,poly[0].y);cx.lineTo(poly[3].x,poly[3].y);
  cx.strokeStyle=active?'#ffffff':'#00eeff';cx.lineWidth=1.5;cx.lineCap='round';cx.stroke();
  cx.beginPath();cx.moveTo(poly[1].x,poly[1].y);cx.lineTo(poly[2].x,poly[2].y);
  cx.strokeStyle='rgba(0,40,80,0.8)';cx.lineWidth=1;cx.stroke();
  cx.shadowBlur=0;
  cx.beginPath();cx.arc(px,py,5,0,Math.PI*2);cx.fillStyle=active?'#fff':'#00ccff';cx.fill();
}

function draw(){
  cx.clearRect(0,0,W,H);
  cx.fillStyle='#080010';cx.fillRect(0,0,W,H);
  cx.strokeStyle='rgba(50,0,80,0.15)';cx.lineWidth=0.5;
  for(let x=0;x<W;x+=22){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke();}
  for(let y=0;y<H;y+=22){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
  drawBg();
  cx.lineCap='round';
  cx.shadowColor='#cc00ff';cx.shadowBlur=14;cx.strokeStyle='#cc00ff';cx.lineWidth=8;
  cx.beginPath();cx.moveTo(L.pL,L.wallT);cx.lineTo(L.pR,L.wallT);cx.stroke();
  cx.beginPath();cx.moveTo(L.pL,L.wallT);cx.lineTo(L.pL,H*0.87);cx.stroke();
  cx.beginPath();cx.moveTo(L.pR,L.wallT);cx.lineTo(L.pR,H*0.87);cx.stroke();
  cx.beginPath();cx.moveTo(L.pL,H*0.87);cx.lineTo(L.pL+(L.pR-L.pL)*0.18,H*0.97);cx.stroke();
  cx.beginPath();cx.moveTo(L.pR,H*0.87);cx.lineTo(L.pR-(L.pR-L.pL)*0.18,H*0.97);cx.stroke();
  cx.strokeStyle='#440066';cx.shadowColor='#440066';
  cx.beginPath();cx.moveTo(W-4,L.wallT);cx.lineTo(W-4,H*0.88);cx.stroke();
  cx.shadowBlur=0;cx.lineCap='butt';
  cx.save();cx.font='bold 7px Courier New';cx.fillStyle='rgba(160,0,220,0.3)';
  cx.textAlign='center';cx.translate(L.pR+L.chuteW/2,H*0.5);cx.rotate(-Math.PI/2);
  cx.fillText('CHUTE',0,0);cx.restore();
  if(gameOn&&!launched){
    cx.setLineDash([4,5]);cx.strokeStyle='rgba(0,255,100,0.4)';cx.lineWidth=2;
    cx.beginPath();cx.moveTo(L.dropX,L.dropY);cx.lineTo(L.dropX,H*0.5);cx.stroke();
    cx.setLineDash([]);cx.fillStyle='rgba(0,255,100,0.4)';
    cx.beginPath();cx.moveTo(L.dropX,H*0.5+4);cx.lineTo(L.dropX-6,H*0.5-8);cx.lineTo(L.dropX+6,H*0.5-8);cx.fill();
  }
  L.targets.forEach(t=>{
    const lit=t.lit>0;cx.shadowColor=t.col;cx.shadowBlur=lit?18:5;
    cx.fillStyle=lit?t.col:'#110022';cx.fillRect(t.x-t.hw,t.y,t.hw*2,t.hh*2);
    cx.strokeStyle=t.col;cx.lineWidth=2;cx.strokeRect(t.x-t.hw,t.y,t.hw*2,t.hh*2);cx.shadowBlur=0;
  });
  L.slings.forEach(s=>{
    const lit=s.lit>0;cx.beginPath();cx.moveTo(s.x1,s.y1);cx.lineTo(s.x2,s.y2);
    cx.strokeStyle=lit?'#ffffff':'#ddaa00';cx.shadowColor='#ffee00';cx.shadowBlur=lit?22:6;
    cx.lineWidth=lit?5:3;cx.lineCap='round';cx.stroke();cx.shadowBlur=0;cx.lineCap='butt';
  });
  L.bumpers.forEach(b=>{
    const lit=b.lit>0;cx.shadowColor=b.col;cx.shadowBlur=lit?28:10;
    cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);cx.fillStyle=lit?b.col:'#180028';cx.fill();
    cx.strokeStyle=b.col;cx.lineWidth=3;cx.stroke();
    cx.beginPath();cx.arc(b.x,b.y,b.r*0.55,0,Math.PI*2);cx.strokeStyle=lit?'#fff':b.col;cx.lineWidth=2;cx.stroke();
    cx.beginPath();cx.arc(b.x,b.y,b.r*0.15,0,Math.PI*2);cx.fillStyle=lit?'#fff':b.col;cx.fill();
    cx.shadowBlur=0;
  });
  drawFlipper(true,lAng,lDown);
  drawFlipper(false,rAng,rDown);
  if(gameOn){
    cx.beginPath();cx.arc(bx,by,L.ballR,0,Math.PI*2);
    cx.shadowColor='#fff';cx.shadowBlur=12;cx.fillStyle='#e0e0ff';cx.fill();
    cx.beginPath();cx.arc(bx-L.ballR*.3,by-L.ballR*.3,L.ballR*.35,0,Math.PI*2);
    cx.fillStyle='rgba(255,255,255,0.75)';cx.fill();cx.shadowBlur=0;
  }
  parts.forEach(p=>{
    cx.globalAlpha=Math.max(0,p.life);
    if(p.text){cx.font='bold 10px Courier New';cx.fillStyle=p.col;cx.textAlign='left';cx.fillText(p.text,p.x,p.y);}
    else{cx.beginPath();cx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);cx.fillStyle=p.col;cx.shadowColor=p.col;cx.shadowBlur=5;cx.fill();cx.shadowBlur=0;}
    cx.globalAlpha=1;
  });
  flashes.forEach(f=>{
    const prog=f.t/f.dur;cx.globalAlpha=(1-prog)*0.4;
    cx.beginPath();cx.arc(f.x,f.y,10+prog*32,0,Math.PI*2);cx.fillStyle=f.col;cx.fill();cx.globalAlpha=1;
  });
  if(!gameOn){
    const p2=(Math.sin(tick*.05)+1)/2;
    cx.font='bold 12px Courier New';cx.textAlign='center';
    cx.fillStyle=`rgba(0,255,120,${.5+p2*.5})`;cx.fillText('PRESS LAUNCH TO PLAY',W/2,H*.52);
    cx.font='8px Courier New';cx.fillStyle=`rgba(200,150,0,${.4+p2*.4})`;
    cx.fillText('Z / LEFT   /   / RIGHT',W/2,H*.58);
  }
  cx.font='bold 7px Courier New';cx.fillStyle='rgba(180,0,255,0.2)';
  cx.textAlign='center';cx.fillText('* RETRO PINBALL *',W/2,H*.047);
}

function loop(){update();draw();requestAnimationFrame(loop);}
resize();
window.addEventListener('resize',()=>{resize();});
loop();
</script>
