
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
#gc{width:100%;max-width:390px;margin:0 auto;background:#f2f2f7;border-radius:28px;overflow:hidden;position:relative;display:flex;flex-direction:column;font-family:'Inter',system-ui,sans-serif;}
#hud{display:flex;justify-content:space-between;align-items:flex-start;padding:18px 20px 0;z-index:5;}
.hgroup{display:flex;flex-direction:column;}
.hgroup.right{align-items:flex-end;}
.hlabel{font-size:11px;font-weight:500;color:#8e8e93;letter-spacing:.3px;}
.hval{font-size:26px;font-weight:300;color:#1c1c1e;letter-spacing:-1px;line-height:1.1;}
#lives-row{display:flex;gap:5px;align-items:center;margin-top:4px;}
.lv{width:8px;height:8px;border-radius:50%;background:#ff3b30;transition:background .3s;}
.lv.dead{background:#d1d1d6;}
canvas{display:block;touch-action:none;}

#start-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:44px;z-index:20;}
#start-overlay.hidden{display:none;}
#start-bg{position:absolute;inset:0;background:rgba(242,242,247,0.6);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);}
.start-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:10px;width:100%;padding:0 24px;}
.start-eyebrow{font-size:11px;font-weight:600;color:#8e8e93;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px;}
.start-title{font-size:38px;font-weight:700;color:#1c1c1e;letter-spacing:-2px;text-align:center;line-height:1.0;margin-bottom:0px;}
.start-rules{background:#fff;border-radius:16px;padding:14px 16px;width:100%;display:flex;flex-direction:column;gap:10px;box-shadow:0 2px 16px rgba(0,0,0,0.07);}
.rule-row{display:flex;align-items:center;gap:12px;}
.rule-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.rule-text{font-size:13px;color:#3a3a3c;line-height:1.4;font-weight:400;}
.rule-text b{color:#1c1c1e;font-weight:600;}
.rule-div{height:.5px;background:#f2f2f7;}

.start-btn{width:100%;padding:17px 0;background:#007aff;color:#fff;font-size:17px;font-weight:700;letter-spacing:-.3px;border:none;border-radius:16px;cursor:pointer;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(0,122,255,0.45);}
.start-btn:active{transform:scale(.98);}
.shine{position:absolute;top:0;left:-60%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.25),transparent);animation:shine 2.2s ease-in-out infinite;}
@keyframes shine{0%{left:-60%}60%,100%{left:130%}}
.start-btn-sub{font-size:11px;font-weight:500;color:rgba(255,255,255,0.7);margin-top:2px;display:block;letter-spacing:.1px;}

#end-overlay{position:absolute;inset:0;display:flex;align-items:flex-end;z-index:30;}
#end-overlay.hidden{display:none;}
#end-blur{position:absolute;inset:0;background:rgba(0,0,0,0.3);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-radius:28px;}
.end-sheet{position:relative;z-index:1;width:100%;background:#f2f2f7;border-radius:24px 24px 28px 28px;padding:8px 0 0;animation:slideUp .34s cubic-bezier(.32,1.18,.45,1) both;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:#c7c7cc;border-radius:2px;margin:10px auto 16px;}
.sheet-body{padding:0 20px 28px;}
.sheet-eyebrow{font-size:11px;font-weight:600;color:#8e8e93;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.sheet-title{font-size:30px;font-weight:700;color:#1c1c1e;letter-spacing:-1.5px;margin-bottom:16px;line-height:1.1;}
.sheet-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;}
.stat-card{background:#fff;border-radius:14px;padding:12px 14px;}
.stat-label{font-size:11px;font-weight:500;color:#8e8e93;letter-spacing:.3px;margin-bottom:2px;}
.stat-val{font-size:24px;font-weight:300;color:#1c1c1e;letter-spacing:-1px;}
.sheet-divider{height:.5px;background:#d1d1d6;margin-bottom:16px;}

.sbtn{width:100%;padding:15px 0;font-size:15px;font-weight:600;letter-spacing:-.2px;border:none;border-radius:14px;cursor:pointer;display:block;text-align:center;margin-bottom:8px;}
.sbtn:active{transform:scale(.98);}
.sbtn-blue{background:#007aff;color:#fff;box-shadow:0 4px 16px rgba(0,122,255,0.35);}
.sbtn-white{background:#fff;color:#007aff;border:1.5px solid rgba(0,122,255,0.25);}
.sbtn-ghost{background:none;color:#8e8e93;font-size:14px;font-weight:500;padding:10px 0;border:none;cursor:pointer;display:block;width:100%;text-align:center;}

#msg{position:absolute;left:50%;transform:translateX(-50%);font-size:13px;font-weight:600;color:#1c1c1e;background:#fff;border-radius:20px;padding:5px 14px;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:15;box-shadow:0 2px 12px rgba(0,0,0,0.08);}
#lvlcard{position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);background:#fff;border-radius:16px;padding:12px 26px;text-align:center;opacity:0;pointer-events:none;z-index:16;box-shadow:0 4px 24px rgba(0,0,0,0.08);transition:opacity .3s;}
#lvlcard-val{font-size:18px;font-weight:400;color:#1c1c1e;letter-spacing:-.5px;}
</style>

<div id="gc">
  <div id="hud">
    <div class="hgroup">
      <span class="hlabel">Score</span>
      <span class="hval" id="score-disp">0</span>
    </div>
    <div class="hgroup right">
      <span class="hlabel">Lives</span>
      <div id="lives-row"></div>
      <span style="font-size:13px;color:#8e8e93;font-weight:500;margin-top:2px;letter-spacing:0" id="level-disp">Level 1</span>
    </div>
  </div>
  <canvas id="c"></canvas>
  <div id="msg"></div>
  <div id="lvlcard"><div id="lvlcard-val"></div></div>

  <div id="start-overlay">
    <div id="start-bg"></div>
    <div class="start-inner">
      <span class="start-eyebrow">shape drop</span>
      <div class="start-title">Catch &amp;<br>Dodge</div>
      <div class="start-rules">
        <div class="rule-row">
          <div class="rule-dot" style="background:#e8f1ff">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 2L11.5 7H16L12 10.5L13.5 16L9 13L4.5 16L6 10.5L2 7H6.5Z" fill="#007aff"/></svg>
          </div>
          <div class="rule-text"><b>Collect</b> matching blue shapes — earn points</div>
        </div>
        <div class="rule-div"></div>
        <div class="rule-row">
          <div class="rule-dot" style="background:#fff0f0">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="3" y="3" width="12" height="12" rx="2.5" fill="#ff3b30"/></svg>
          </div>
          <div class="rule-text"><b>Avoid</b> red shapes — they subtract points</div>
        </div>
        <div class="rule-div"></div>
        <div class="rule-row">
          <div class="rule-dot" style="background:#f0fff4">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="6" fill="#34c759"/></svg>
          </div>
          <div class="rule-text">Slide left &amp; right · <b>new shape</b> every level</div>
        </div>
      </div>
      <button class="start-btn" id="start-btn">
        <span class="shine"></span>
        Start Playing
        <span class="start-btn-sub">swipe to move your shape</span>
      </button>
    </div>
  </div>

  <div id="end-overlay" class="hidden">
    <div id="end-blur"></div>
    <div class="end-sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-body">
        <div class="sheet-eyebrow" id="end-eyebrow">game over</div>
        <div class="sheet-title" id="end-title">Nice Try</div>
        <div class="sheet-stats">
          <div class="stat-card"><div class="stat-label">Score</div><div class="stat-val" id="end-score">0</div></div>
          <div class="stat-card"><div class="stat-label">Level</div><div class="stat-val" id="end-level">1</div></div>
          <div class="stat-card"><div class="stat-label">Collected</div><div class="stat-val" id="end-collected">0</div></div>
          <div class="stat-card"><div class="stat-label">Missed</div><div class="stat-val" id="end-missed">0</div></div>
        </div>
        <div class="sheet-divider"></div>
        <button class="sbtn sbtn-blue" id="end-btn1">Restart Level</button>
        <button class="sbtn sbtn-white" id="end-btn2">Play from Start</button>
        <button class="sbtn-ghost" id="end-btn3" style="display:none">Start Over</button>
      </div>
    </div>
  </div>
</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const scoreEl=document.getElementById('score-disp');
const levelEl=document.getElementById('level-disp');
const livesRow=document.getElementById('lives-row');
const startOverlay=document.getElementById('start-overlay');
const endOverlay=document.getElementById('end-overlay');
const startBtn=document.getElementById('start-btn');
const endBtn1=document.getElementById('end-btn1');
const endBtn2=document.getElementById('end-btn2');
const endBtn3=document.getElementById('end-btn3');
const msgEl=document.getElementById('msg');
const lvlcard=document.getElementById('lvlcard');
const lvlcardVal=document.getElementById('lvlcard-val');
const gc=document.getElementById('gc');

let W,H,cx,cy,playerX,targetPX;
let score=0,lives=3,level=1,combo=0,frameCount=0,levelFrames=0,collected=0,missed=0;
let drops=[],particles=[],gameState='idle';
let lastTouchX=null,mouseDown=false,lastMX=null;
let animId,msgT=null,lvlT=null;

const PLAYER_R=22;
const LINE_Y_FRAC=0.60;
const SHAPES=['diamond','square','triangle','circle','pentagon','star'];
const SHAPE_NAMES=['Diamond','Square','Triangle','Circle','Pentagon','Star'];
const ACCENT='#007aff',DANGER='#ff3b30',BG='#f2f2f7';

function getShape(){return SHAPES[(level-1)%SHAPES.length];}
function getShapeName(){return SHAPE_NAMES[(level-1)%SHAPE_NAMES.length];}
function getWrongShape(){
  const idx=(level-1)%SHAPES.length;
  return SHAPES[(idx+1+Math.floor(Math.random()*(SHAPES.length-1)))%SHAPES.length];
}

function resize(){
  const rect=gc.getBoundingClientRect();
  W=Math.min(rect.width||370,390);H=Math.round(W*1.52);
  canvas.width=W;canvas.height=H;cx=W/2;cy=H*LINE_Y_FRAC;
  if(playerX===undefined)playerX=cx;targetPX=playerX;
}

function buildLives(){
  livesRow.innerHTML='';
  for(let i=0;i<3;i++){const d=document.createElement('div');d.className='lv'+(i>=lives?' dead':'');livesRow.appendChild(d);}
}

function tracePath(c,type,x,y,sz,rot){
  c.save();c.translate(x,y);c.rotate(rot||0);c.beginPath();
  switch(type){
    case 'diamond':c.moveTo(0,-sz*1.3);c.lineTo(sz*0.85,0);c.lineTo(0,sz*1.05);c.lineTo(-sz*0.85,0);c.closePath();break;
    case 'square':{const r=sz*0.25;c.moveTo(-sz+r,-sz);c.lineTo(sz-r,-sz);c.quadraticCurveTo(sz,-sz,sz,-sz+r);c.lineTo(sz,sz-r);c.quadraticCurveTo(sz,sz,sz-r,sz);c.lineTo(-sz+r,sz);c.quadraticCurveTo(-sz,sz,-sz,sz-r);c.lineTo(-sz,-sz+r);c.quadraticCurveTo(-sz,-sz,-sz+r,-sz);c.closePath();break;}
    case 'triangle':for(let i=0;i<3;i++){const a=-Math.PI/2+(i/3)*Math.PI*2;c.lineTo(Math.cos(a)*sz*1.2,Math.sin(a)*sz*1.2);}c.closePath();break;
    case 'circle':c.arc(0,0,sz,0,Math.PI*2);break;
    case 'pentagon':for(let i=0;i<5;i++){const a=-Math.PI/2+(i/5)*Math.PI*2;c.lineTo(Math.cos(a)*sz*1.15,Math.sin(a)*sz*1.15);}c.closePath();break;
    case 'star':for(let i=0;i<10;i++){const a=-Math.PI/2+(i/10)*Math.PI*2;const r2=i%2===0?sz*1.2:sz*0.5;c.lineTo(Math.cos(a)*r2,Math.sin(a)*r2);}c.closePath();break;
  }
  c.restore();
}

function fillShape(c,type,x,y,sz,rot,fill,strokeCol,strokeW){
  tracePath(c,type,x,y,sz,rot||0);
  if(fill){c.fillStyle=fill;c.fill();}
  if(strokeW>0){c.strokeStyle=strokeCol;c.lineWidth=strokeW;c.stroke();}
}

function drawPlayer(){
  const sh=getShape(),rot=Date.now()*0.0007;
  ctx.save();ctx.globalAlpha=0.09;fillShape(ctx,sh,playerX,cy+5,PLAYER_R,rot,'#000','',0);ctx.globalAlpha=1;ctx.restore();
  fillShape(ctx,sh,playerX,cy,PLAYER_R,rot,'#fff','',0);
  fillShape(ctx,sh,playerX,cy,PLAYER_R,rot,null,ACCENT,2.5);
  ctx.save();ctx.globalAlpha=0.11;fillShape(ctx,sh,playerX,cy,PLAYER_R*0.52,rot,ACCENT,'',0);ctx.globalAlpha=1;ctx.restore();
}

function drawBG(){
  ctx.fillStyle=BG;ctx.fillRect(0,0,W,H);
  ctx.save();ctx.globalAlpha=0.05;ctx.strokeStyle='#1c1c1e';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(W,cy);ctx.stroke();ctx.globalAlpha=1;ctx.restore();
  ctx.save();ctx.font='500 10px Inter,system-ui';ctx.fillStyle='#8e8e93';ctx.globalAlpha=0.38;
  ctx.textAlign='left';ctx.fillText('CATCH ZONE',12,cy-8);
  ctx.textAlign='right';ctx.fillText(getShapeName().toUpperCase(),W-12,cy-8);
  ctx.globalAlpha=1;ctx.restore();
}

function spawnDrop(){
  const isWrong=Math.random()<(0.3+level*0.022);
  const sz=18+Math.floor(Math.random()*10);
  const x=sz*2+Math.random()*(W-sz*4);
  const speed=1.7+level*0.28+Math.random()*0.6;
  const shape=isWrong?getWrongShape():getShape();
  drops.push({x,y:-sz*2,sz,speed,rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.04,isWrong,shape});
}

function spawnInterval(){return Math.max(30,74-level*7);}

function drawDrop(d){
  const col=d.isWrong?DANGER:ACCENT;
  const bgFill=d.isWrong?'#fff5f5':'#f0f7ff';
  ctx.save();ctx.globalAlpha=0.08;fillShape(ctx,d.shape,d.x,d.y+4,d.sz,d.rot,'#000','',0);ctx.globalAlpha=1;ctx.restore();
  fillShape(ctx,d.shape,d.x,d.y,d.sz,d.rot,bgFill,'',0);
  fillShape(ctx,d.shape,d.x,d.y,d.sz,d.rot,null,col,2.5);
  ctx.save();ctx.globalAlpha=0.14;fillShape(ctx,d.shape,d.x,d.y,d.sz*0.50,d.rot,col,'',0);ctx.globalAlpha=1;ctx.restore();
}

function checkCollisions(){
  const catchR=PLAYER_R+10;
  drops=drops.filter(d=>{
    const dist=Math.hypot(d.x-playerX,d.y-cy);
    if(dist<catchR+d.sz*0.62){
      if(!d.isWrong){
        combo++;collected++;
        const pts=(10+level*4)*Math.max(1,combo);score+=pts;scoreEl.textContent=score;
        showMsg(combo>=3?combo+'x combo':'+'+pts);
        popParticles(d.x,d.y,ACCENT,10,d.shape);
      } else {
        combo=0;missed++;
        const pen=Math.max(0,8+level*2);score=Math.max(0,score-pen);scoreEl.textContent=score;
        showMsg('-'+pen);popParticles(d.x,d.y,DANGER,8,d.shape);
      }
      return false;
    }
    if(d.y>H+40){
      if(!d.isWrong){combo=0;lives=Math.max(0,lives-1);buildLives();if(lives<=0)setTimeout(()=>showEnd(false),300);}
      return false;
    }
    return true;
  });
}

function popParticles(x,y,color,n,shape){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=1.2+Math.random()*3.5;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.2,life:1,color,r:4+Math.random()*3,shape,rot:Math.random()*Math.PI*2});
  }
}

let popT=null;
function showMsg(txt){
  msgEl.style.top=(cy+PLAYER_R+18)+'px';msgEl.textContent=txt;msgEl.style.opacity='1';
  clearTimeout(popT);popT=setTimeout(()=>{msgEl.style.opacity='0';},680);
}

function doLevelUp(){
  level++;levelFrames=0;levelEl.textContent='Level '+level;drops=[];combo=0;
  lvlcardVal.textContent='Level '+level+' · '+getShapeName();
  lvlcard.style.opacity='1';clearTimeout(lvlT);lvlT=setTimeout(()=>{lvlcard.style.opacity='0';},1300);
  if(level>SHAPES.length)showEnd(true);
}

function draw(){
  drawBG();
  playerX+=(targetPX-playerX)*0.17;
  playerX=Math.max(PLAYER_R+4,Math.min(W-PLAYER_R-4,playerX));
  drops.forEach(d=>{d.y+=d.speed;d.rot+=d.rotSpeed;drawDrop(d);});
  drawPlayer();
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.14;p.life-=0.038;
    if(p.life<=0)return false;
    ctx.save();ctx.globalAlpha=p.life*0.85;
    fillShape(ctx,p.shape,p.x,p.y,p.r,p.rot,p.color,'',0);
    ctx.globalAlpha=1;ctx.restore();return true;
  });
  if(gameState==='playing'){
    if(frameCount%spawnInterval()===0)spawnDrop();
    checkCollisions();levelFrames++;
    if(levelFrames>=380)doLevelUp();
  }
  frameCount++;animId=requestAnimationFrame(draw);
}

function showEnd(won){
  gameState='over';cancelAnimationFrame(animId);
  document.getElementById('end-eyebrow').textContent=won?'level complete':'game over';
  document.getElementById('end-title').textContent=won?'You Won!':'Nice Try';
  document.getElementById('end-score').textContent=score;
  document.getElementById('end-level').textContent=level;
  document.getElementById('end-collected').textContent=collected;
  document.getElementById('end-missed').textContent=missed;
  if(won){
    endBtn1.textContent='Continue';endBtn1.className='sbtn sbtn-blue';
    endBtn1.onclick=()=>{endOverlay.classList.add('hidden');resumeGame();};
    endBtn2.textContent='Replay Level';endBtn2.className='sbtn sbtn-white';endBtn2.style.display='block';
    endBtn2.onclick=()=>{endOverlay.classList.add('hidden');initGame(level);};
    endBtn3.textContent='Start Over';endBtn3.style.display='block';
    endBtn3.onclick=()=>{endOverlay.classList.add('hidden');initGame(1);};
  } else {
    endBtn1.textContent='Restart Level';endBtn1.className='sbtn sbtn-blue';
    endBtn1.onclick=()=>{endOverlay.classList.add('hidden');initGame(level);};
    endBtn2.textContent='Play from Start';endBtn2.className='sbtn sbtn-white';endBtn2.style.display='block';
    endBtn2.onclick=()=>{endOverlay.classList.add('hidden');initGame(1);};
    endBtn3.style.display='none';
  }
  endOverlay.classList.remove('hidden');
}

function resumeGame(){
  level++;levelFrames=0;drops=[];frameCount=0;combo=0;
  levelEl.textContent='Level '+level;gameState='playing';draw();
}

function initGame(fromLevel){
  cancelAnimationFrame(animId);
  score=0;lives=3;level=fromLevel||1;combo=0;frameCount=0;levelFrames=0;collected=0;missed=0;
  playerX=cx;targetPX=cx;drops=[];particles=[];
  scoreEl.textContent='0';levelEl.textContent='Level '+level;
  buildLives();gameState='playing';draw();
}

startBtn.addEventListener('click',()=>{startOverlay.classList.add('hidden');initGame(1);});

canvas.addEventListener('touchstart',e=>{lastTouchX=e.touches[0].clientX;e.preventDefault();},{passive:false});
canvas.addEventListener('touchmove',e=>{
  if(gameState!=='playing'||lastTouchX===null)return;e.preventDefault();
  targetPX+=(e.touches[0].clientX-lastTouchX)*1.2;lastTouchX=e.touches[0].clientX;
},{passive:false});
canvas.addEventListener('touchend',e=>{lastTouchX=null;e.preventDefault();},{passive:false});
canvas.addEventListener('mousedown',e=>{mouseDown=true;lastMX=e.clientX;});
window.addEventListener('mousemove',e=>{
  if(!mouseDown||gameState!=='playing')return;targetPX+=(e.clientX-lastMX)*1.2;lastMX=e.clientX;
});
window.addEventListener('mouseup',()=>{mouseDown=false;lastMX=null;});
window.addEventListener('keydown',e=>{
  if(gameState!=='playing')return;
  if(e.key==='ArrowLeft')targetPX-=26;if(e.key==='ArrowRight')targetPX+=26;
});

resize();buildLives();draw();
</script>
