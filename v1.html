<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MARBLE MAZE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

  :root {
    --bg: #0a0a12;
    --panel: #0f0f1e;
    --neon-cyan: #00f5ff;
    --neon-orange: #ff6b00;
    --neon-green: #39ff14;
    --neon-pink: #ff0090;
    --wall: #1a2a4a;
    --wall-glow: #00aaff;
    --marble: #e8e8ff;
    --center: #ff6b00;
    --text: #c8d8ff;
    --dim: #445566;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Orbitron', monospace;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── SCREENS ── */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px;
    transition: opacity .4s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  /* ── TITLE SCREEN ── */
  #title-screen {
    background: radial-gradient(ellipse at 50% 30%, #0d1a3a 0%, var(--bg) 70%);
  }
  .title-logo {
    font-size: clamp(2rem, 10vw, 4rem);
    font-weight: 900;
    letter-spacing: .15em;
    color: var(--neon-cyan);
    text-shadow: 0 0 20px var(--neon-cyan), 0 0 60px rgba(0,245,255,.3);
    margin-bottom: 6px;
    text-align: center;
  }
  .title-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(.65rem, 3vw, .9rem);
    color: var(--neon-orange);
    letter-spacing: .25em;
    margin-bottom: 48px;
    text-align: center;
  }
  .marble-preview {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff 5%, var(--neon-cyan) 30%, #004466 80%);
    box-shadow: 0 0 30px var(--neon-cyan), 0 0 60px rgba(0,245,255,.2), inset 0 0 20px rgba(0,0,0,.5);
    margin: 0 auto 48px;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-12px) rotate(180deg); }
  }

  .btn {
    font-family: 'Orbitron', monospace;
    font-size: clamp(.75rem, 4vw, 1rem);
    font-weight: 700;
    letter-spacing: .15em;
    padding: 16px 40px;
    border: 2px solid var(--neon-cyan);
    background: transparent;
    color: var(--neon-cyan);
    cursor: pointer;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    transition: all .2s;
    margin: 8px;
    min-width: 220px;
    text-align: center;
  }
  .btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--neon-cyan);
    opacity: 0;
    transition: opacity .2s;
  }
  .btn:hover::before, .btn:active::before { opacity: .15; }
  .btn.orange {
    border-color: var(--neon-orange);
    color: var(--neon-orange);
  }
  .btn.orange::before { background: var(--neon-orange); }
  .btn.green {
    border-color: var(--neon-green);
    color: var(--neon-green);
  }
  .btn.green::before { background: var(--neon-green); }

  .how-to {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(.6rem, 2.5vw, .75rem);
    color: var(--dim);
    text-align: center;
    line-height: 1.8;
    margin-top: 24px;
    letter-spacing: .05em;
  }

  /* ── GAME SCREEN ── */
  #game-screen {
    background: var(--bg);
    flex-direction: column;
    justify-content: flex-start;
    padding: 0;
  }

  .hud {
    width: 100%;
    padding: 10px 16px 8px;
    background: var(--panel);
    border-bottom: 1px solid rgba(0,245,255,.15);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    z-index: 10;
  }
  .hud-level {
    font-size: clamp(.6rem, 3vw, .8rem);
    font-weight: 700;
    color: var(--neon-cyan);
    letter-spacing: .1em;
    white-space: nowrap;
  }
  .hud-level span {
    font-size: clamp(.9rem, 4.5vw, 1.2rem);
  }
  .timer-block {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    margin-left: auto;
    flex-shrink: 0;
  }
  .timer-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: .55rem;
    color: var(--dim);
    letter-spacing: .15em;
  }
  .timer-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(.9rem, 4.5vw, 1.3rem);
    color: var(--neon-green);
    transition: color .3s;
  }
  .timer-val.urgent { color: var(--neon-orange); animation: pulse .5s ease-in-out infinite alternate; }
  .timer-val.critical { color: var(--neon-pink); animation: pulse .25s ease-in-out infinite alternate; }
  @keyframes pulse { from { opacity: 1; } to { opacity: .4; } }

  .progress-bar-wrap {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,.06);
    flex-shrink: 0;
    position: relative;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-green));
    box-shadow: 0 0 8px var(--neon-cyan);
    transition: width .3s ease;
  }

  /* timer progress bar */
  .timer-bar-wrap {
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,.06);
    flex-shrink: 0;
  }
  .timer-bar-fill {
    height: 100%;
    background: var(--neon-green);
    transition: width .1s linear, background .3s;
    box-shadow: 0 0 6px var(--neon-green);
  }
  .timer-bar-fill.urgent { background: var(--neon-orange); box-shadow: 0 0 6px var(--neon-orange); }
  .timer-bar-fill.critical { background: var(--neon-pink); box-shadow: 0 0 6px var(--neon-pink); }

  #canvas-wrap {
    flex: 1;
    width: 100%;
    position: relative;
    overflow: hidden;
  }
  #gameCanvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* distance progress */
  .dist-bar-wrap {
    width: 100%;
    padding: 6px 16px 6px;
    background: var(--panel);
    border-top: 1px solid rgba(0,245,255,.1);
    flex-shrink: 0;
  }
  .dist-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: .55rem;
    color: var(--dim);
    letter-spacing: .15em;
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
  }
  .dist-bar-bg {
    width: 100%;
    height: 8px;
    background: rgba(255,255,255,.06);
    border-radius: 4px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,.07);
  }
  .dist-bar-fg {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--neon-orange), var(--neon-pink));
    box-shadow: 0 0 8px var(--neon-orange);
    transition: width .2s ease;
  }

  /* ── WIN / LOSE ── */
  #win-screen, #lose-screen {
    background: radial-gradient(ellipse at center, #0d2030 0%, var(--bg) 70%);
  }
  .result-icon {
    font-size: clamp(3rem,15vw,6rem);
    margin-bottom: 16px;
    animation: popIn .5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .result-title {
    font-size: clamp(1.5rem, 8vw, 2.5rem);
    font-weight: 900;
    margin-bottom: 8px;
    text-align: center;
  }
  .result-stats {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(.7rem, 3.5vw, .9rem);
    color: var(--dim);
    text-align: center;
    line-height: 2;
    margin-bottom: 32px;
    letter-spacing: .05em;
  }
  .result-stats span { color: var(--neon-cyan); }

  /* grid bg */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .screen { z-index: 1; }

  .permission-note {
    font-family: 'Share Tech Mono', monospace;
    font-size: .65rem;
    color: var(--dim);
    text-align: center;
    margin-top: 16px;
    line-height: 1.6;
    max-width: 280px;
  }
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div class="screen" id="title-screen">
  <div class="title-logo">MARBLE<br>MAZE</div>
  <div class="title-sub">[ TILT TO NAVIGATE ]</div>
  <div class="marble-preview"></div>
  <button class="btn" id="startBtn" onclick="startGame()">▶ START GAME</button>
  <p class="permission-note">
    Tilt your device to roll the marble.<br>
    Find the center to escape each maze.<br>
    Complete it before time runs out!
  </p>
</div>

<!-- GAME SCREEN -->
<div class="screen hidden" id="game-screen">
  <div class="hud">
    <div class="hud-level">LEVEL <span id="hud-level">1</span></div>
    <div style="flex:1; display:flex; flex-direction:column; gap:3px; padding: 0 8px;">
      <div style="font-family:'Share Tech Mono',monospace;font-size:.5rem;color:var(--dim);letter-spacing:.15em;">DISTANCE TO CENTER</div>
      <div class="dist-bar-bg" style="height:6px;">
        <div class="dist-bar-fg" id="distBar" style="width:0%"></div>
      </div>
    </div>
    <div class="timer-block">
      <div class="timer-label">TIME</div>
      <div class="timer-val" id="timerVal">60</div>
    </div>
  </div>
  <div class="timer-bar-wrap">
    <div class="timer-bar-fill" id="timerBar" style="width:100%"></div>
  </div>
  <div id="canvas-wrap">
    <canvas id="gameCanvas"></canvas>
  </div>
</div>

<!-- WIN SCREEN -->
<div class="screen hidden" id="win-screen">
  <div class="result-icon">🎯</div>
  <div class="result-title" style="color:var(--neon-green)">ESCAPED!</div>
  <div class="result-stats" id="win-stats"></div>
  <button class="btn green" onclick="nextLevel()">NEXT LEVEL ▶</button>
  <button class="btn" style="margin-top:4px" onclick="goTitle()">MAIN MENU</button>
</div>

<!-- LOSE SCREEN -->
<div class="screen hidden" id="lose-screen">
  <div class="result-icon">💥</div>
  <div class="result-title" style="color:var(--neon-pink)">TIME'S UP</div>
  <div class="result-stats" id="lose-stats"></div>
  <button class="btn orange" onclick="retryLevel()">RETRY ↺</button>
  <button class="btn" style="margin-top:4px" onclick="goTitle()">MAIN MENU</button>
</div>

<script>
// ── GLOBALS ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

let level = 1;
let gameRunning = false;
let animId = null;

// Physics
let marble = { x: 0, y: 0, vx: 0, vy: 0, r: 0 };
let gravity = { x: 0, y: 0 };
const FRICTION = 0.88;
const BOUNCE   = 0.35;

// Timer
let timeLeft  = 60;
let timerMax  = 60;
let lastTime  = null;
let timerInt  = null;

// Maze
let maze = null;
let cellSize = 0;
let cols = 0, rows = 0;
let exitX = 0, exitY = 0; // pixel center of exit cell
let startPx = 0, startPy = 0;

// Device orientation
let orientationGranted = false;

// ── LEVEL CONFIG ─────────────────────────────────────────────────────────────
function getLevelConfig(lvl) {
  // grid grows, time shrinks, walls get denser
  const base = {
    cols:  Math.min(5 + Math.floor(lvl * 1.5), 19),
    rows:  Math.min(5 + Math.floor(lvl * 1.2), 17),
    time:  Math.max(25, 90 - lvl * 4),
    speed: 0.18 + lvl * 0.015,
  };
  // keep odd so maze gen works
  if (base.cols % 2 === 0) base.cols--;
  if (base.rows % 2 === 0) base.rows--;
  return base;
}

// ── MAZE GENERATION (Recursive Backtracker) ────────────────────────────────
function generateMaze(cols, rows) {
  // walls: hWall[r][c] = true means horizontal wall below cell(r,c)
  //        vWall[r][c] = true means vertical wall right of cell(r,c)
  const hWall = Array.from({length: rows}, () => Array(cols).fill(true));
  const vWall = Array.from({length: rows}, () => Array(cols).fill(true));
  const visited = Array.from({length: rows}, () => Array(cols).fill(false));

  function carve(r, c) {
    visited[r][c] = true;
    const dirs = shuffle([[0,1,'R'],[0,-1,'L'],[1,0,'D'],[-1,0,'U']]);
    for (const [dr, dc, d] of dirs) {
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && !visited[nr][nc]) {
        if (d === 'R') vWall[r][c]   = false;
        if (d === 'L') vWall[r][c-1] = false;
        if (d === 'D') hWall[r][c]   = false;
        if (d === 'U') hWall[r-1][c] = false;
        carve(nr, nc);
      }
    }
  }
  carve(0, 0);
  return { hWall, vWall, cols, rows };
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── SCREEN MANAGEMENT ─────────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function goTitle() {
  stopGame();
  showScreen('title-screen');
}

// ── ORIENTATION PERMISSION ────────────────────────────────────────────────────
async function requestOrientation() {
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const res = await DeviceOrientationEvent.requestPermission();
      orientationGranted = res === 'granted';
    } catch(e) { orientationGranted = false; }
  } else {
    orientationGranted = true;
  }
}

window.addEventListener('deviceorientation', (e) => {
  if (!gameRunning) return;
  const cfg = getLevelConfig(level);
  // gamma = left/right tilt, beta = front/back tilt
  gravity.x = (e.gamma || 0) * cfg.speed * 0.12;
  gravity.y = (e.beta  || 0) * cfg.speed * 0.12;
  gravity.x = Math.max(-4, Math.min(4, gravity.x));
  gravity.y = Math.max(-4, Math.min(4, gravity.y));
}, true);

// Touch fallback (drag simulation)
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
});
canvas.addEventListener('touchmove', e => {
  if (!gameRunning || !touchStart) return;
  const dx = e.touches[0].clientX - touchStart.x;
  const dy = e.touches[0].clientY - touchStart.y;
  gravity.x = dx * 0.04;
  gravity.y = dy * 0.04;
  gravity.x = Math.max(-4, Math.min(4, gravity.x));
  gravity.y = Math.max(-4, Math.min(4, gravity.y));
});
canvas.addEventListener('touchend', () => {
  gravity.x *= 0.5;
  gravity.y *= 0.5;
});

// Arrow key fallback (desktop testing)
const keys = {};
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup',   e => keys[e.key] = false);

// ── START / STOP ──────────────────────────────────────────────────────────────
async function startGame() {
  await requestOrientation();
  level = 1;
  loadLevel();
}

function nextLevel() {
  level++;
  loadLevel();
}

function retryLevel() {
  loadLevel();
}

function loadLevel() {
  stopGame();
  showScreen('game-screen');

  const cfg = getLevelConfig(level);
  document.getElementById('hud-level').textContent = level;

  // resize canvas
  const wrap = document.getElementById('canvas-wrap');
  canvas.width  = wrap.clientWidth  * devicePixelRatio;
  canvas.height = wrap.clientHeight * devicePixelRatio;
  canvas.style.width  = wrap.clientWidth  + 'px';
  canvas.style.height = wrap.clientHeight + 'px';

  // Fit maze to canvas
  const W = canvas.width, H = canvas.height;
  const pad = Math.min(W, H) * 0.06;
  cellSize = Math.min(
    Math.floor((W - pad*2) / cfg.cols),
    Math.floor((H - pad*2) / cfg.rows)
  );
  cols = cfg.cols;
  rows = cfg.rows;

  // Generate maze
  maze = generateMaze(cols, rows);

  // Marble size scales with cell
  marble.r = cellSize * 0.28;

  // Start: top-left outer ring
  startPx = pad + cellSize * 0.5;
  startPy = pad + cellSize * 0.5;
  marble.x = startPx;
  marble.y = startPy;
  marble.vx = 0;
  marble.vy = 0;

  // Exit: center cell
  const cCol = Math.floor(cols / 2);
  const cRow = Math.floor(rows / 2);
  exitX = pad + (cCol + 0.5) * cellSize;
  exitY = pad + (cRow + 0.5) * cellSize;

  // Timer
  timerMax = cfg.time;
  timeLeft  = timerMax;
  gravity = { x: 0, y: 0 };

  updateTimerUI();
  gameRunning = true;
  lastTime = null;
  animId = requestAnimationFrame(gameLoop);
}

function stopGame() {
  gameRunning = false;
  if (animId) { cancelAnimationFrame(animId); animId = null; }
}

// ── GAME LOOP ──────────────────────────────────────────────────────────────────
function gameLoop(ts) {
  if (!gameRunning) return;

  // delta time (capped to avoid big jumps)
  if (!lastTime) lastTime = ts;
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;

  // keyboard fallback
  if (keys['ArrowLeft'])  gravity.x -= 0.15 * dt;
  if (keys['ArrowRight']) gravity.x += 0.15 * dt;
  if (keys['ArrowUp'])    gravity.y -= 0.15 * dt;
  if (keys['ArrowDown'])  gravity.y += 0.15 * dt;

  // update timer
  timeLeft -= (1/60) * dt;
  if (timeLeft <= 0) {
    timeLeft = 0;
    updateTimerUI();
    loseGame();
    return;
  }
  updateTimerUI();

  // physics
  marble.vx = (marble.vx + gravity.x * dt) * Math.pow(FRICTION, dt);
  marble.vy = (marble.vy + gravity.y * dt) * Math.pow(FRICTION, dt);

  marble.x += marble.vx * dt;
  marble.y += marble.vy * dt;

  resolveWalls();

  // check win (reach exit center)
  const dx = marble.x - exitX, dy = marble.y - exitY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const maxDist = Math.sqrt((exitX-startPx)**2 + (exitY-startPy)**2) || 1;
  const progress = Math.max(0, Math.min(1, 1 - dist/maxDist));
  document.getElementById('distBar').style.width = (progress*100).toFixed(1)+'%';

  if (dist < marble.r + cellSize * 0.3) {
    winGame();
    return;
  }

  draw();
  animId = requestAnimationFrame(gameLoop);
}

// ── WALL COLLISION ─────────────────────────────────────────────────────────────
function resolveWalls() {
  const pad = Math.min(canvas.width, canvas.height) * 0.06;
  const r = marble.r;

  // Canvas bounds
  const mazeW = cols * cellSize, mazeH = rows * cellSize;
  if (marble.x - r < pad)            { marble.x = pad + r;          marble.vx =  Math.abs(marble.vx) * BOUNCE; }
  if (marble.x + r > pad + mazeW)    { marble.x = pad + mazeW - r;  marble.vx = -Math.abs(marble.vx) * BOUNCE; }
  if (marble.y - r < pad)            { marble.y = pad + r;          marble.vy =  Math.abs(marble.vy) * BOUNCE; }
  if (marble.y + r > pad + mazeH)    { marble.y = pad + mazeH - r;  marble.vy = -Math.abs(marble.vy) * BOUNCE; }

  // Which cell is marble in?
  const col = Math.floor((marble.x - pad) / cellSize);
  const row = Math.floor((marble.y - pad) / cellSize);

  // Check walls around neighboring cells
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      const c = col + dc, rr = row + dr;
      if (c < 0 || c >= cols || rr < 0 || rr >= rows) continue;

      const cellL = pad + c * cellSize;
      const cellT = pad + rr * cellSize;
      const cellR = cellL + cellSize;
      const cellB = cellT + cellSize;

      const wallThick = Math.max(2, cellSize * 0.06);

      // right wall of cell (c, rr)
      if (c < cols - 1 && maze.vWall[rr][c]) {
        segmentCollide(cellR - wallThick, cellT, cellR + wallThick, cellB);
      }
      // bottom wall of cell (c, rr)
      if (rr < rows - 1 && maze.hWall[rr][c]) {
        segmentCollide(cellL, cellB - wallThick, cellR, cellB + wallThick);
      }
    }
  }
}

function segmentCollide(l, t, r, b) {
  const mx = marble.x, my = marble.y, mr = marble.r;
  const nearX = Math.max(l, Math.min(r, mx));
  const nearY = Math.max(t, Math.min(b, my));
  const dx = mx - nearX, dy = my - nearY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < mr && dist > 0.001) {
    const nx = dx/dist, ny = dy/dist;
    const overlap = mr - dist;
    marble.x += nx * overlap;
    marble.y += ny * overlap;
    const dot = marble.vx*nx + marble.vy*ny;
    if (dot < 0) {
      marble.vx -= (1 + BOUNCE) * dot * nx;
      marble.vy -= (1 + BOUNCE) * dot * ny;
    }
  }
}

// ── DRAW ───────────────────────────────────────────────────────────────────────
function draw() {
  const W = canvas.width, H = canvas.height;
  const pad = Math.min(W, H) * 0.06;

  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = '#08080f';
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(0,245,255,0.04)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 30) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 30) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  const wallThick = Math.max(2, cellSize * 0.08);

  // Draw exit glow
  const pulseR = cellSize * 0.38 + Math.sin(Date.now()*0.004) * cellSize * 0.08;
  const exitGrad = ctx.createRadialGradient(exitX, exitY, 0, exitX, exitY, pulseR * 2);
  exitGrad.addColorStop(0, 'rgba(255,107,0,0.6)');
  exitGrad.addColorStop(0.5, 'rgba(255,107,0,0.15)');
  exitGrad.addColorStop(1, 'rgba(255,107,0,0)');
  ctx.beginPath();
  ctx.arc(exitX, exitY, pulseR * 2, 0, Math.PI * 2);
  ctx.fillStyle = exitGrad;
  ctx.fill();

  ctx.beginPath();
  ctx.arc(exitX, exitY, pulseR, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,107,0,0.9)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // "C" symbol at center
  ctx.font = `bold ${Math.round(cellSize * 0.4)}px Orbitron`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(255,107,0,0.8)';
  ctx.fillText('★', exitX, exitY);

  // Draw walls
  ctx.lineCap = 'square';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const l = pad + c * cellSize;
      const t = pad + r * cellSize;

      // Right vertical wall
      if (c < cols-1 && maze.vWall[r][c]) {
        drawWall(l + cellSize - wallThick/2, t, l + cellSize + wallThick/2, t + cellSize, wallThick);
      }
      // Bottom horizontal wall
      if (r < rows-1 && maze.hWall[r][c]) {
        drawWall(l, t + cellSize - wallThick/2, l + cellSize, t + cellSize + wallThick/2, wallThick);
      }
    }
  }

  // Outer border
  ctx.strokeStyle = 'rgba(0,170,255,0.6)';
  ctx.lineWidth = wallThick;
  ctx.strokeRect(pad, pad, cols*cellSize, rows*cellSize);

  // Marble shadow
  ctx.beginPath();
  ctx.ellipse(marble.x + marble.r*0.3, marble.y + marble.r*0.4, marble.r*0.8, marble.r*0.3, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fill();

  // Marble glow
  const glowR = marble.r * 2.5;
  const glowG = ctx.createRadialGradient(marble.x, marble.y, marble.r, marble.x, marble.y, glowR);
  glowG.addColorStop(0, 'rgba(0,245,255,0.25)');
  glowG.addColorStop(1, 'rgba(0,245,255,0)');
  ctx.beginPath();
  ctx.arc(marble.x, marble.y, glowR, 0, Math.PI*2);
  ctx.fillStyle = glowG;
  ctx.fill();

  // Marble body
  const marbleG = ctx.createRadialGradient(
    marble.x - marble.r*0.3, marble.y - marble.r*0.3, marble.r*0.05,
    marble.x, marble.y, marble.r
  );
  marbleG.addColorStop(0, '#ffffff');
  marbleG.addColorStop(0.2, '#a8d8ff');
  marbleG.addColorStop(0.6, '#0088cc');
  marbleG.addColorStop(1, '#001a33');
  ctx.beginPath();
  ctx.arc(marble.x, marble.y, marble.r, 0, Math.PI*2);
  ctx.fillStyle = marbleG;
  ctx.fill();

  // Marble specular
  ctx.beginPath();
  ctx.arc(marble.x - marble.r*0.28, marble.y - marble.r*0.28, marble.r*0.25, 0, Math.PI*2);
  const specG = ctx.createRadialGradient(
    marble.x - marble.r*0.28, marble.y - marble.r*0.28, 0,
    marble.x - marble.r*0.28, marble.y - marble.r*0.28, marble.r*0.25
  );
  specG.addColorStop(0, 'rgba(255,255,255,0.9)');
  specG.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = specG;
  ctx.fill();

  // Speed trail
  const speed = Math.sqrt(marble.vx**2 + marble.vy**2);
  if (speed > 0.5) {
    const tx = marble.x - marble.vx * 2.5;
    const ty = marble.y - marble.vy * 2.5;
    const trailG = ctx.createLinearGradient(tx, ty, marble.x, marble.y);
    trailG.addColorStop(0, 'rgba(0,245,255,0)');
    trailG.addColorStop(1, `rgba(0,245,255,${Math.min(0.4, speed*0.04)})`);
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.lineTo(marble.x, marble.y);
    ctx.strokeStyle = trailG;
    ctx.lineWidth = marble.r * 1.5;
    ctx.lineCap = 'round';
    ctx.stroke();
  }
}

function drawWall(l, t, r, b, thick) {
  // Glow layer
  ctx.shadowColor = '#00aaff';
  ctx.shadowBlur = thick * 2;
  ctx.fillStyle = '#1a3a6a';
  ctx.fillRect(l, t, r-l, b-t);
  // Bright edge
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(0,180,255,0.5)';
  ctx.fillRect(l, t, r-l, Math.min(b-t, 1.5));
  ctx.fillRect(l, t, Math.min(r-l, 1.5), b-t);
}

// ── TIMER UI ───────────────────────────────────────────────────────────────────
function updateTimerUI() {
  const t = Math.ceil(timeLeft);
  const el = document.getElementById('timerVal');
  const bar = document.getElementById('timerBar');
  el.textContent = t;
  const pct = timeLeft / timerMax;
  bar.style.width = (pct*100).toFixed(1)+'%';

  el.className = 'timer-val';
  bar.className = 'timer-bar-fill';
  if (pct < 0.2) {
    el.classList.add('critical');
    bar.classList.add('critical');
  } else if (pct < 0.4) {
    el.classList.add('urgent');
    bar.classList.add('urgent');
  }
}

// ── WIN / LOSE ─────────────────────────────────────────────────────────────────
function winGame() {
  stopGame();
  const elapsed = (timerMax - timeLeft).toFixed(1);
  document.getElementById('win-stats').innerHTML =
    `LEVEL <span>${level}</span> COMPLETE<br>` +
    `TIME USED: <span>${elapsed}s</span><br>` +
    `TIME LEFT: <span>${Math.ceil(timeLeft)}s</span>`;
  showScreen('win-screen');
}

function loseGame() {
  stopGame();
  const cCol = Math.floor(cols/2), cRow = Math.floor(rows/2);
  const pad = Math.min(canvas.width, canvas.height) * 0.06;
  const dx = marble.x - exitX, dy = marble.y - exitY;
  const dist = Math.sqrt(dx*dx+dy*dy);
  document.getElementById('lose-stats').innerHTML =
    `LEVEL <span>${level}</span> FAILED<br>` +
    `DISTANCE TO CENTER: <span>${Math.round(dist/cellSize)} cells</span>`;
  showScreen('lose-screen');
}

// ── RESIZE ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  if (gameRunning) loadLevel();
});

// Lock screen orientation if possible
if (screen.orientation && screen.orientation.lock) {
  screen.orientation.lock('portrait').catch(() => {});
}
</script>
