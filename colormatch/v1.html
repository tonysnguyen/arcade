<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Color Match</title>

<!-- Firebase SDK (compat builds for simple single-file usage) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Fredoka:wght@400;500;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;user-select:none}
:root{
  --bg:#faf5ef;--bg2:#f0e8dd;--card:#fffaf5;--text:#3d2c1e;--text2:#8a7565;
  --board:#ede4d8;--board-inner:#e8ddd0;
  --shadow:0 4px 16px rgba(60,40,20,.12);
  --red:#e8736c;--orange:#f0a05a;--yellow:#f0d060;--green:#6ec88f;--blue:#6aaae0;--purple:#b085d0;--pink:#e88aaf;
}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Quicksand',sans-serif;color:var(--text)}
canvas{display:block}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .4s ease}
.screen.active{opacity:1;pointer-events:auto}
.screen-bg{position:absolute;inset:0;background:var(--bg)}
.title-text{font-family:'Fredoka',sans-serif;font-size:clamp(2.4rem,8vw,3.6rem);font-weight:700;color:var(--text);letter-spacing:-.02em;position:relative;z-index:1}
.title-sub{font-size:clamp(.85rem,2.5vw,1rem);color:var(--text2);margin-top:4px;font-weight:500;position:relative;z-index:1}

.btn{
  font-family:'Fredoka',sans-serif;font-weight:600;font-size:clamp(1rem,3vw,1.15rem);
  border:none;border-radius:16px;padding:14px 40px;cursor:pointer;
  color:#fff;background:var(--orange);
  box-shadow:0 6px 0 #c4803a,0 8px 20px rgba(200,130,60,.25);
  transition:transform .12s,box-shadow .12s;position:relative;z-index:1
}
.btn:active{transform:translateY(3px);box-shadow:0 3px 0 #c4803a,0 4px 10px rgba(200,130,60,.2)}
.btn-sm{padding:10px 28px;font-size:.95rem;border-radius:12px;box-shadow:0 4px 0 #c4803a,0 6px 14px rgba(200,130,60,.2)}
.btn-green{background:var(--green);box-shadow:0 6px 0 #4a9a66,0 8px 20px rgba(80,160,100,.25)}
.btn-green:active{box-shadow:0 3px 0 #4a9a66,0 4px 10px rgba(80,160,100,.2)}

.leaderboard-box{
  background:var(--card);border-radius:18px;padding:16px 20px;
  width:min(85vw,320px);box-shadow:var(--shadow);position:relative;z-index:1
}
.lb-title{font-family:'Fredoka',sans-serif;font-weight:600;font-size:.95rem;color:var(--text);margin-bottom:8px;text-align:center}
.lb-row{display:flex;align-items:center;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.04)}
.lb-row:last-child{border:none}
.lb-rank{width:26px;font-weight:700;color:var(--orange);font-size:.85rem}
.lb-name{flex:1;font-weight:500;font-size:.85rem}
.lb-score{font-weight:700;color:var(--text);font-size:.85rem}

.lb-top-player{display:flex;align-items:center;justify-content:center;gap:8px;padding:2px 0}
.lb-top-player .lb-crown{font-size:1rem}
.lb-top-player .lb-tp-name{font-weight:600;font-size:.9rem;color:var(--text)}
.lb-top-player .lb-tp-score{font-weight:700;font-size:.9rem;color:var(--orange)}

.hud{position:fixed;top:0;left:0;right:0;z-index:50;padding:8px 12px 5px;display:flex;align-items:center;gap:7px;background:linear-gradient(to bottom,var(--bg) 70%,transparent)}
.hud-level{font-family:'Fredoka',sans-serif;font-weight:700;font-size:.9rem;color:var(--text);white-space:nowrap}
.hud-score{font-family:'Fredoka',sans-serif;font-weight:600;font-size:.85rem;color:var(--orange);white-space:nowrap}
.progress-wrap{flex:1;height:9px;background:var(--bg2);border-radius:8px;overflow:hidden;position:relative;min-width:0}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--yellow));border-radius:8px;transition:width .3s ease}
.hud-sound{
  width:32px;height:32px;border-radius:9px;border:none;
  background:rgba(0,0,0,.04);
  font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .2s
}
.hud-sound:active{background:rgba(0,0,0,.08)}

/* Replay tile badge — styled like a mini game tile */
.hud-replay{
  font-family:'Fredoka',sans-serif;font-weight:700;font-size:.8rem;
  color:#fff;white-space:nowrap;display:flex;align-items:center;gap:3px;
  padding:4px 10px;border-radius:10px;flex-shrink:0;
  background:var(--purple);
  box-shadow:0 2px 0 #8a60aa,0 3px 8px rgba(176,133,208,.25);
  position:relative
}
.hud-replay::after{
  content:'';position:absolute;top:1px;left:3px;right:3px;height:40%;
  border-radius:8px 8px 4px 4px;
  background:linear-gradient(to bottom,rgba(255,255,255,.3),rgba(255,255,255,0))
}

.board-controls{
  position:fixed;z-index:51;left:0;right:0;
  display:flex;align-items:center;justify-content:center;gap:12px;
  padding:0 16px;pointer-events:none
}
.board-controls>*{pointer-events:auto}

.bc-timer{
  font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.3rem;
  min-width:72px;text-align:center;padding:8px 18px;border-radius:14px;
  background:var(--card);color:var(--text);
  box-shadow:0 3px 12px rgba(60,40,20,.1);
  transition:color .3s,background .3s,transform .15s;
  display:flex;align-items:center;justify-content:center;gap:6px;line-height:1
}
.bc-timer .timer-icon{font-size:1rem;opacity:.45}
.bc-timer.warn{color:#d45a3a;background:rgba(220,80,50,.08);box-shadow:0 3px 14px rgba(220,80,50,.14)}
.bc-timer.critical{color:#fff;background:var(--red);box-shadow:0 3px 18px rgba(232,115,108,.4);animation:timerPulse 1s ease-in-out infinite}
@keyframes timerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

.shuffle-btn{
  font-family:'Fredoka',sans-serif;font-weight:600;font-size:.95rem;
  border:none;border-radius:13px;padding:8px 18px;cursor:pointer;
  color:#fff;background:var(--blue);
  box-shadow:0 4px 0 #4a84b8,0 5px 12px rgba(74,132,184,.2);
  transition:transform .1s,box-shadow .1s,opacity .3s,filter .3s;
  white-space:nowrap;display:flex;align-items:center;gap:6px;line-height:1
}
.shuffle-btn:active:not(.used){transform:translateY(3px);box-shadow:0 1px 0 #4a84b8}
.shuffle-btn.used{opacity:.4;filter:grayscale(.7);cursor:default;box-shadow:0 2px 0 #999;background:#9aa8b2}
.shuffle-btn .shuffle-icon{font-size:1.05rem}
.shuffle-btn.hidden{display:none}

.overlay{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .35s}
.overlay.active{opacity:1;pointer-events:auto}
.overlay-bg{position:absolute;inset:0;background:rgba(60,40,20,.45);backdrop-filter:blur(6px)}
.overlay-card{
  position:relative;z-index:1;background:var(--card);border-radius:24px;
  padding:24px 22px;text-align:center;
  box-shadow:0 12px 40px rgba(60,40,20,.18);
  width:min(88vw,340px);
  max-height:min(92vh,620px);
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.1) transparent
}
.overlay-card::-webkit-scrollbar{width:4px}
.overlay-card::-webkit-scrollbar-track{background:transparent}
.overlay-card::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:4px}
.overlay-title{font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.4rem;margin-bottom:4px}
.overlay-sub{color:var(--text2);font-size:.9rem;margin-bottom:14px;font-weight:500}
.overlay-score{font-family:'Fredoka',sans-serif;font-weight:700;font-size:1.8rem;color:var(--orange);margin-bottom:2px}
.overlay-btns{display:flex;gap:10px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.overlay-card .leaderboard-box{margin-top:14px;width:100%;padding:12px 14px;box-shadow:none;background:rgba(0,0,0,.03);border-radius:14px}
.overlay-card .lb-title{font-size:.85rem;margin-bottom:6px}
.overlay-card .lb-row{padding:4px 0}
.overlay-card .lb-rank,.overlay-card .lb-name,.overlay-card .lb-score{font-size:.8rem}

/* Name entry */
.name-entry{margin-top:14px;display:flex;flex-direction:column;align-items:center;gap:8px}
.name-entry-label{font-family:'Fredoka',sans-serif;font-weight:600;font-size:.85rem;color:var(--green)}
.name-entry-row{display:flex;gap:8px;align-items:center;width:100%;max-width:240px}
.name-entry-input{
  flex:1;font-family:'Fredoka',sans-serif;font-weight:600;font-size:1rem;
  border:2px solid var(--bg2);border-radius:12px;padding:8px 14px;
  background:var(--bg);color:var(--text);text-align:center;
  outline:none;transition:border-color .2s
}
.name-entry-input:focus{border-color:var(--orange)}
.name-entry-input::placeholder{color:var(--text2);opacity:.6}
.name-entry-submit{
  font-family:'Fredoka',sans-serif;font-weight:600;font-size:.85rem;
  border:none;border-radius:12px;padding:8px 16px;cursor:pointer;
  color:#fff;background:var(--green);
  box-shadow:0 3px 0 #4a9a66;transition:transform .1s,box-shadow .1s
}
.name-entry-submit:active{transform:translateY(2px);box-shadow:0 1px 0 #4a9a66}
.name-entry-submit:disabled{opacity:.5;cursor:default}
.name-entry-done{font-family:'Fredoka',sans-serif;font-weight:500;font-size:.8rem;color:var(--green);margin-top:2px}

/* Board toast — fading message over grid */
#boardToast{
  position:fixed;z-index:55;left:50%;transform:translateX(-50%);
  font-family:'Fredoka',sans-serif;font-weight:600;font-size:clamp(.78rem,2.6vw,.95rem);
  color:var(--text);background:rgba(255,250,245,.92);
  padding:8px 20px;border-radius:14px;white-space:nowrap;
  box-shadow:0 4px 16px rgba(60,40,20,.12);
  pointer-events:none;opacity:0;
  transition:opacity .4s ease
}
#boardToast.show{opacity:1}
#boardToast.fade-out{opacity:0}

.combo-text{
  position:fixed;z-index:60;font-family:'Fredoka',sans-serif;font-weight:700;
  font-size:1.6rem;color:var(--orange);pointer-events:none;
  text-shadow:0 2px 8px rgba(240,160,90,.4);
  animation:comboPop .8s ease-out forwards
}
@keyframes comboPop{
  0%{opacity:1;transform:translate(-50%,-50%) scale(.5)}
  30%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}
  100%{opacity:0;transform:translate(-50%,-120%) scale(1)}
}

.blob{position:absolute;border-radius:50%;opacity:.12;filter:blur(40px);z-index:0}
.blob1{width:200px;height:200px;background:var(--orange);top:-40px;left:-60px}
.blob2{width:160px;height:160px;background:var(--blue);bottom:-30px;right:-50px}
.blob3{width:120px;height:120px;background:var(--pink);top:30%;right:-30px}

.menu-tiles{position:relative;z-index:1;width:110px;height:110px;margin-bottom:12px}
.menu-tile{
  position:absolute;width:46px;height:46px;border-radius:12px;
  box-shadow:0 3px 0 rgba(0,0,0,.15),0 6px 16px rgba(0,0,0,.08)
}
.menu-tile::after{
  content:'';position:absolute;top:2px;left:3px;right:3px;height:40%;
  border-radius:10px 10px 6px 6px;
  background:linear-gradient(to bottom,rgba(255,255,255,.38),rgba(255,255,255,0))
}
.menu-tile:nth-child(1){background:var(--red);top:0;left:4px;animation:tileBob1 3s ease-in-out infinite}
.menu-tile:nth-child(2){background:var(--blue);top:0;right:4px;animation:tileBob2 3s ease-in-out infinite .4s}
.menu-tile:nth-child(3){background:var(--yellow);bottom:0;left:4px;animation:tileBob3 3s ease-in-out infinite .8s}
.menu-tile:nth-child(4){background:var(--green);bottom:0;right:4px;animation:tileBob4 3s ease-in-out infinite 1.2s}
@keyframes tileBob1{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes tileBob2{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes tileBob3{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes tileBob4{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

.menu-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:0}
.menu-content .leaderboard-box{margin-top:22px;margin-bottom:0}
.menu-content .btn{margin-top:20px}
/* Arcade home button — inside HUD */
.arcade-home{
  width:32px;height:32px;border-radius:9px;flex-shrink:0;
  background:rgba(0,0,0,.04);
  display:flex;align-items:center;justify-content:center;
  text-decoration:none;
  transition:transform .12s,background .12s;
  -webkit-tap-highlight-color:transparent
}
.arcade-home:active{transform:scale(.88);background:rgba(0,0,0,.08)}
.arcade-home svg{pointer-events:none}
</style>
</head>
<body>

<!-- Main Menu -->
<div class="screen active" id="menuScreen">
  <div class="screen-bg">
    <div class="blob blob1"></div><div class="blob blob2"></div><div class="blob blob3"></div>
  </div>
  <div class="menu-content">
    <div class="menu-tiles">
      <div class="menu-tile"></div><div class="menu-tile"></div>
      <div class="menu-tile"></div><div class="menu-tile"></div>
    </div>
    <div class="title-text">Color Match</div>
    <div class="title-sub">Swipe · Match · Score</div>
    <div class="leaderboard-box" id="menuLB"></div>
    <div id="lbStatus" style="margin-top:8px;font-size:.8rem;color:var(--text2);position:relative;z-index:1;">Connecting leaderboard...</div>
    <button class="btn" onclick="startGame()">Play</button>
  </div>
</div>

<div class="hud" id="hud" style="display:none">
  <a class="arcade-home" href="https://www.tonysnguyen.com/arcade" aria-label="Back to Arcade"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="20" height="20" rx="5" fill="#5B6EE8"/><rect x=".7" y=".7" width="18.6" height="18.6" rx="4.3" stroke="#fff" stroke-opacity=".2" stroke-width="1.4"/><path d="M5 6.5C5 6 5.3 5.5 6 5.5h8c.7 0 1 .5 1 1s-.3 1-1 1h-2.8v6c0 .7-.5 1-1.1 1-.7 0-1.1-.3-1.1-1v-6H6c-.7 0-1-.5-1-1Z" fill="#fff"/><circle cx="14.2" cy="14.2" r="1.3" fill="#fff"/></svg></a>
  <div class="hud-level" id="hudLevel">Lv 1</div>
  <div class="progress-wrap"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="hud-score" id="hudScore">0</div>
  <div class="hud-replay" id="hudReplay" style="display:none">🔄 <span id="replayCount">0</span></div>
  <button class="hud-sound" id="soundBtn" onclick="toggleSound()">🔊</button>
</div>

<div class="board-controls" id="boardControls" style="display:none">
  <button class="shuffle-btn hidden" id="shuffleBtn" onclick="useShuffle()"><span class="shuffle-icon">🔀</span><span id="shuffleLabel">1×</span></button>
  <div class="bc-timer" id="hudTimer"><span class="timer-icon">⏱</span><span id="timerValue">60s</span></div>
</div>

<canvas id="gameCanvas"></canvas>

<!-- Level Complete -->
<div class="overlay" id="levelComplete">
  <div class="overlay-bg"></div>
  <div class="overlay-card">
    <div class="overlay-title" style="color:var(--green)">Level Complete! 🎉</div>
    <div class="overlay-score" id="lcScore">0</div>
    <div class="overlay-sub" id="lcSub">Great job!</div>
    <div id="lcReplayEarned" style="font-family:'Fredoka',sans-serif;font-weight:600;font-size:.85rem;color:var(--purple);margin-bottom:8px"></div>
    <div class="overlay-btns">
      <button class="btn btn-green" onclick="nextLevel()">Next Level</button>
    </div>
  </div>
</div>

<!-- Game Over -->
<div class="overlay" id="gameOver">
  <div class="overlay-bg"></div>
  <div class="overlay-card">
    <div class="overlay-title" style="color:var(--red)">Time's Up!</div>
    <div class="overlay-score" id="goScore">0</div>
    <div class="overlay-sub" id="goSub">Target: 100</div>
    <div id="goNameEntry"></div>
    <div class="overlay-btns" id="goBtns"></div>
    <div class="leaderboard-box" id="goLB"></div>
  </div>
</div>

<!-- Board toast message (fading, non-modal) -->
<div id="boardToast" style="display:none"></div>

<script>
// ============================================================
// CONSTANTS & STATE
// ============================================================
const COLORS = [
  {name:'red',   hex:'#e8736c',shadow:'#c45a54',hi:'#f09a95'},
  {name:'orange',hex:'#f0a05a',shadow:'#c47e3e',hi:'#f5be88'},
  {name:'yellow',hex:'#f0d060',shadow:'#c4a838',hi:'#f5e08a'},
  {name:'green', hex:'#6ec88f',shadow:'#4a9a66',hi:'#98dab0'},
  {name:'blue',  hex:'#6aaae0',shadow:'#4a84b8',hi:'#96c6ee'},
  {name:'purple',hex:'#b085d0',shadow:'#8a60aa',hi:'#caa8e4'},
  {name:'pink',  hex:'#e88aaf',shadow:'#c06888',hi:'#f0aec8'}
];

// ============================================================
// LEVEL PROGRESSION — starts at 3x3, ramps up smoothly
// ============================================================
const LEVELS = [];
const LEVEL_DEFS = [
  // Lv1: 3x3 (9 tiles), 2 colors — gentle intro
  {cols:3,rows:3,numColors:2,target:40,time:50},
  // Lv2: 3x3, 3 colors
  {cols:3,rows:3,numColors:3,target:70,time:50},
  // Lv3: 3x4 (12 tiles), 3 colors — shuffle unlocks
  {cols:3,rows:4,numColors:3,target:100,time:50},
  // Lv4: 4x4 (16 tiles), 3 colors
  {cols:4,rows:4,numColors:3,target:140,time:55},
  // Lv5: 4x4, 4 colors — first replay tile earned
  {cols:4,rows:4,numColors:4,target:180,time:55},
  // Lv6: 4x5, 4 colors
  {cols:4,rows:5,numColors:4,target:240,time:55},
  // Lv7: 4x5, 4 colors — replay tile earned
  {cols:4,rows:5,numColors:4,target:300,time:55},
  // Lv8: 5x5, 4 colors
  {cols:5,rows:5,numColors:4,target:360,time:55},
  // Lv9: 5x5, 5 colors — replay tile earned
  {cols:5,rows:5,numColors:5,target:420,time:50},
  // Lv10: 5x6, 5 colors
  {cols:5,rows:6,numColors:5,target:500,time:50},
];
// Generate remaining levels (11–30) with gradual ramp
for(let i=LEVEL_DEFS.length;i<30;i++){
  const cols=Math.min(5+Math.floor((i-10)/4),8);
  const rows=Math.min(6+Math.floor((i-10)/3),9);
  const numColors=Math.min(5+Math.floor((i-10)/3),7);
  const target=500+(i-10)*90+Math.floor((i-10)*(i-10)*2);
  const time=Math.max(25,50-Math.floor((i-10)*1.2));
  LEVEL_DEFS.push({cols,rows,numColors,target,time});
}
LEVEL_DEFS.forEach(d=>LEVELS.push(d));

const SHUFFLE_UNLOCK_LEVEL = 2; // Level 3 (index 2)

// Replay tile earned after completing these level indices
// (Lv5, Lv7, Lv9, Lv12, Lv16, Lv20, Lv24, Lv28)
const REPLAY_EARN_LEVELS = [4,6,8,11,15,19,23,27];

let state = {
  screen:'menu', level:0, score:0, totalScore:0, timer:0, timerInterval:null,
  grid:[], gridCols:0, gridRows:0, numColors:3,
  path:[], dragging:false,
  particles:[], comboTexts:[],
  tileSize:0, gridOffsetX:0, gridOffsetY:0, gap:6,
  boardTrayX:0, boardTrayY:0, boardTrayW:0, boardTrayH:0,
  animFrame:null, canvasW:0, canvasH:0,
  soundOn:true, audioCtx:null,
  shakeAmount:0, shakeDecay:.9,
  shuffleUsed:false, shuffling:false, shuffleAvailable:false,
  shuffleAnims:[], shuffleT:0,
  scoreSubmitted:false,
  // Replay tiles
  replayTiles:0,
  // Out-of-moves check pending flag
  oomCheckPending:false
};

// ============================================================
// 🔒 PROTECTED FIREBASE / LEADERBOARD CODE
// DO NOT MODIFY THIS SECTION UNLESS EXPLICITLY REQUESTED
// This code is live and currently working.
// Includes Firebase init, leaderboard reads, leaderboard writes,
// menu leaderboard rendering, and score submission flow.
// ============================================================

const GAME_ID = 'color-match';

// ---- Firebase config ----
const firebaseConfig = {
  apiKey: "AIzaSyCFW1U5NURzx9zNa0EQAjIJijTGwx4no7E",
  authDomain: "tony-arcade.firebaseapp.com",
  projectId: "tony-arcade",
  storageBucket: "tony-arcade.firebasestorage.app",
  messagingSenderId: "88041829355",
  appId: "1:88041829355:web:56d7048e7c842d14e99fae",
  measurementId: "G-RVYF35QB7W"
};

const MAX_NAME_LENGTH = 8;
const LEADERBOARD_SIZE = 5;

let db = null;
let firebaseReady = false;

function setLeaderboardStatus(message, isError = false) {
  const el = document.getElementById('lbStatus');
  if (!el) return;
  el.textContent = message;
  el.style.color = isError ? 'var(--red)' : 'var(--text2)';
}

function initFirebase() {
  if (typeof firebase === 'undefined') {
    console.error('[Leaderboard] Firebase SDK not loaded.');
    setLeaderboardStatus('Leaderboard unavailable (SDK missing)', true);
    return;
  }

  if (!firebaseConfig.apiKey) {
    console.warn('[Leaderboard] Missing Firebase config.');
    setLeaderboardStatus('Leaderboard offline (no config)', true);
    return;
  }

  try {
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    db = firebase.firestore();
    firebaseReady = true;
    console.log('[Leaderboard] Firebase connected.');
    setLeaderboardStatus('Leaderboard connected ✓');
  } catch (e) {
    console.error('[Leaderboard] Firebase init failed:', e);
    setLeaderboardStatus('Leaderboard error (init failed)', true);
    firebaseReady = false;
  }
}

const Leaderboard = {
  async getTop(n = LEADERBOARD_SIZE) {
    if (!firebaseReady) {
      console.warn('[Leaderboard] getTop called but Firebase not ready.');
      return [];
    }

    try {
      const snap = await db
        .collection('leaderboards')
        .doc(GAME_ID)
        .collection('scores')
        .orderBy('score', 'desc')
        .limit(n)
        .get();

      return snap.docs.map(d => ({
        name: d.data().name || 'PLAYER',
        score: d.data().score || 0
      }));
    } catch (e) {
      console.error('[Leaderboard] getTop failed:', e);
      setLeaderboardStatus('Failed to load scores', true);
      return [];
    }
  },

  async qualifies(score, n = LEADERBOARD_SIZE) {
    if (score <= 0) return false;
    if (!firebaseReady) return false;

    try {
      const top = await this.getTop(n);
      if (top.length < n) return true;
      return score > top[top.length - 1].score;
    } catch (e) {
      console.error('[Leaderboard] qualifies failed:', e);
      return false;
    }
  },

  async submit(rawName, score) {
    let name = (rawName || '')
      .trim()
      .substring(0, MAX_NAME_LENGTH)
      .replace(/[<>"'&]/g, '');

    if (!name) name = 'PLAYER';

    if (!firebaseReady) {
      console.error('[Leaderboard] submit called but Firebase not ready.');
      setLeaderboardStatus('Could not save score (offline)', true);
      return false;
    }

    try {
      await db
        .collection('leaderboards')
        .doc(GAME_ID)
        .collection('scores')
        .add({
          name,
          score,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

      console.log('[Leaderboard] Score submitted:', name, score);
      setLeaderboardStatus('Score saved ✓');
      return true;
    } catch (e) {
      console.error('[Leaderboard] submit failed:', e);
      setLeaderboardStatus('Failed to save score', true);
      return false;
    }
  }
};

function createGrid(){const{gridCols:c,gridRows:r,numColors:nc}=state;state.grid=[];for(let row=0;row<r;row++){state.grid[row]=[];for(let col=0;col<c;col++){state.grid[row][col]={colorIdx:Math.floor(Math.random()*nc),scale:1,alpha:1,offsetY:0,targetOffsetY:0,velY:0,alive:true,spawning:true,spawnT:0,shuffleOffX:0,shuffleOffY:0}}}}
function tileRect(row,col){const s=state.tileSize,g=state.gap;return{x:state.gridOffsetX+col*(s+g),y:state.gridOffsetY+row*(s+g),w:s,h:s}}
function getTileAt(px,py){if(state.shuffling)return null;const{gridCols:c,gridRows:r}=state;for(let row=0;row<r;row++)for(let col=0;col<c;col++){const t=tileRect(row,col),tile=state.grid[row][col],oY=tile?tile.offsetY:0;if(px>=t.x&&px<=t.x+t.w&&py>=t.y+oY&&py<=t.y+t.h+oY)return{row,col}}return null}

// ============================================================
// OUT-OF-MOVES DETECTION (lightweight board toast, no modal)
// ============================================================
function hasValidMoves(){
  const{gridCols:c,gridRows:r}=state;
  const visited=Array.from({length:r},()=>Array(c).fill(false));
  for(let row=0;row<r;row++){
    for(let col=0;col<c;col++){
      const tile=state.grid[row]?.[col];
      if(!tile||!tile.alive||visited[row][col])continue;
      const color=tile.colorIdx;
      let count=0;
      const queue=[{row,col}];
      visited[row][col]=true;
      while(queue.length){
        const cur=queue.shift();
        count++;
        const neighbors=[{row:cur.row-1,col:cur.col},{row:cur.row+1,col:cur.col},{row:cur.row,col:cur.col-1},{row:cur.row,col:cur.col+1}];
        for(const n of neighbors){
          if(n.row>=0&&n.row<r&&n.col>=0&&n.col<c&&!visited[n.row][n.col]){
            const nt=state.grid[n.row]?.[n.col];
            if(nt&&nt.alive&&nt.colorIdx===color){
              visited[n.row][n.col]=true;
              queue.push(n);
            }
          }
        }
      }
      if(count>=3)return true;
    }
  }
  return false;
}

function ensureGridHasMoves(){
  let attempts=0;
  while(!hasValidMoves()&&attempts<20){
    const{gridCols:c,gridRows:r,numColors:nc}=state;
    for(let row=0;row<r;row++)for(let col=0;col<c;col++){
      state.grid[row][col].colorIdx=Math.floor(Math.random()*nc);
    }
    attempts++;
  }
}

function checkForOutOfMoves(){
  if(state.screen!=='game'||state.shuffling)return;
  if(hasValidMoves())return;

  if(state.shuffleAvailable&&!state.shuffleUsed){
    // Shuffle still available — show a gentle nudge, keep playing
    showBoardToast('No moves — try Shuffle!',2500);
  } else {

    showBoardToast('No moves left',1800);
    setTimeout(()=>{
      if(state.screen==='game') gameOver();
    },2000);
  }
}

function useShuffle(){

  state.shuffleUsed=true;state.shuffling=true;initAudio();sfxShuffle();
  const ac=[];for(let r=0;r<state.gridRows;r++)for(let c=0;c<state.gridCols;c++){const t=state.grid[r][c];if(t&&t.alive)ac.push({row:r,col:c})}

  state.shuffleAnims=[];const oc=ac.map(c=>state.grid[c.row][c.col].colorIdx);
  for(let i=0;i<n;i++){const dc=ac[i],si=idx[i],sc=ac[si],dR=tileRect(dc.row,dc.col),sR=tileRect(sc.row,sc.col);
    state.shuffleAnims.push({row:dc.row,col:dc.col,newColorIdx:oc[si],startOffX:sR.x-dR.x,startOffY:sR.y-dR.y})}

}

// GRAVITY

function drawTile(row,col){

  const s=tile.scale,oY=tile.offsetY,sOX=tile.shuffleOffX||0,sOY=tile.shuffleOffY||0;
  const cx_=tr.x+tr.w/2+sOX,cy_=tr.y+tr.h/2+oY+sOY,w=tr.w*s,h=tr.h*s,rad=Math.min(w,h)*.22,x=cx_-w/2,y=cy_-h/2;

  ctx.fillStyle='rgba(0,0,0,.08)';roundRect(ctx,x+1,y+3,w,h,rad);ctx.fill();

}

  const gXY=p=>{const tr=tileRect(p.row,p.col),t=state.grid[p.row][p.col];return{x:tr.x+tr.w/2,y:tr.y+tr.h/2+(t?t.offsetY:0)}};

  ctx.strokeStyle='rgba(255,255,255,.65)';ctx.lineWidth=state.tileSize*.14;ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();state.path.forEach((p,i)=>{const{x,y}=gXY(p);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)});ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,.9)';ctx.lineWidth=state.tileSize*.05;ctx.beginPath();state.path.forEach((p,i)=>{const{x,y}=gXY(p);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)});ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.6)';state.path.forEach(p=>{const{x,y}=gXY(p);ctx.beginPath();ctx.arc(x,y,state.tileSize*.09,0,Math.PI*2);ctx.fill()});
}

function drawParticles(){state.particles.forEach(p=>{ctx.globalAlpha=p.alpha;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill()});ctx.globalAlpha=1}

function render(){
  ctx.clearRect(0,0,state.canvasW,state.canvasH);
  if(state.screen!=='game'){state.animFrame=requestAnimationFrame(render);return}
  ctx.save();if(state.shakeAmount>.5){ctx.translate((Math.random()-.5)*state.shakeAmount,(Math.random()-.5)*state.shakeAmount);state.shakeAmount*=state.shakeDecay}
  drawBoardTray();drawPath();
  for(let r=0;r<state.gridRows;r++)for(let c=0;c<state.gridCols;c++)drawTile(r,c);
  drawParticles();ctx.restore();updateShuffleAnimation();updatePhysics();state.animFrame=requestAnimationFrame(render);
}

function updatePhysics(){
  for(let r=0;r<state.gridRows;r++)for(let c=0;c<state.gridCols;c++){const t=state.grid[r]?.[c];if(!t||!t.alive)continue;
    if(Math.abs(t.offsetY-t.targetOffsetY)>.5){t.velY+=(t.targetOffsetY-t.offsetY)*.15;t.velY*=.7;t.offsetY+=t.velY}else{t.offsetY=t.targetOffsetY;t.velY=0}
    if(t.spawning){t.spawnT+=.08;t.scale=Math.min(1,t.spawnT);if(t.spawnT>=1)t.spawning=false}
    if(!state.shuffling){if(state.path.some(p=>p.row===r&&p.col===c))t.scale=Math.min(t.scale+.03,1.12);else if(!t.spawning)t.scale+=(1-t.scale)*.15}}
  state.particles=state.particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.life-=.03;p.alpha=Math.max(0,p.life);p.r*=.98;return p.life>0});
}

// ============================================================
// HUD
// ============================================================
function updateHUD(){
  const lv=LEVELS[state.level];
  document.getElementById('hudLevel').textContent=`Lv ${state.level+1}`;
  document.getElementById('hudScore').textContent=state.score;
  const pct=Math.min(100,state.score/lv.target*100);
  document.getElementById('progressFill').style.width=pct+'%';
  updateShuffleBtn();
  // Replay tiles display
  const rEl=document.getElementById('hudReplay');
  const rCount=document.getElementById('replayCount');
  if(state.replayTiles>0){rEl.style.display='flex';rCount.textContent=state.replayTiles}
  else{rEl.style.display='none'}
}
function updateTimer(){
  state.timer--;const te=document.getElementById('hudTimer'),tv=document.getElementById('timerValue');
  tv.textContent=state.timer+'s';te.classList.remove('warn','critical');
  const lv=LEVELS[state.level],pct=state.timer/lv.time;
  if(state.timer<=5)te.classList.add('critical');else if(state.timer<=10||pct<=.25)te.classList.add('warn');
  if(state.timer<=0){clearInterval(state.timerInterval);if(state.score>=LEVELS[state.level].target)levelComplete();else gameOver()}
}

// ============================================================
// 🔒 PROTECTED LEADERBOARD RENDERING & SCORE SUBMISSION
// DO NOT MODIFY THIS SECTION
// ============================================================
async function renderLeaderboard(containerId, n=5){
  const el=document.getElementById(containerId);if(!el)return;
  const top=await Leaderboard.getTop(n);
  let html='<div class="lb-title">🏆 Leaderboard</div>';
  if(!top.length){html+='<div style="color:var(--text2);font-size:.8rem;padding:4px 0;text-align:center">No scores yet</div>'}
  else top.forEach((s,i)=>{html+=`<div class="lb-row"><div class="lb-rank">${i+1}</div><div class="lb-name">${s.name}</div><div class="lb-score">${s.score}</div></div>`});
  el.innerHTML=html;
}
async function showNameEntryIfQualified(score){
  const container=document.getElementById('goNameEntry');
  container.innerHTML='';
  state.scoreSubmitted=false;

  const qualified=await Leaderboard.qualifies(score);
  if(!qualified||score<=0)return;

  container.innerHTML=`
    <div class="name-entry">
      <div class="name-entry-label">🎉 New High Score!</div>
      <div class="name-entry-row">
        <input class="name-entry-input" id="nameInput" type="text" maxlength="${MAX_NAME_LENGTH}" placeholder="Your name" autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
        <button class="name-entry-submit" id="nameSubmitBtn" onclick="submitLeaderboardScore()">Save</button>
      </div>
    </div>`;

  const inp=document.getElementById('nameInput');
  inp.addEventListener('touchstart',e=>e.stopPropagation());
  inp.addEventListener('mousedown',e=>e.stopPropagation());
  setTimeout(()=>inp.focus(),300);
}

async function submitLeaderboardScore(){
  if(state.scoreSubmitted)return;

  const btn=document.getElementById('nameSubmitBtn');
  const inp=document.getElementById('nameInput');
  if(!inp||!btn)return;

  btn.disabled=true;
  btn.textContent='...';

  const ok = await Leaderboard.submit(inp.value, state.totalScore);

  if(ok){
    state.scoreSubmitted=true;
    const container=document.getElementById('goNameEntry');
    container.innerHTML='<div class="name-entry-done">✅ Score saved!</div>';

    // refresh BOTH leaderboards
    await renderLeaderboard('goLB',5);
    await renderMenuLeaderboard();

  } else {
    btn.disabled=false;
    btn.textContent='Save';

    const container=document.getElementById('goNameEntry');
    container.insertAdjacentHTML(
      'beforeend',
      '<div class="name-entry-done" style="color:var(--red)">Could not save. Check Firebase rules.</div>'
    );
  }
}
// ============================================================
// 🔒 END PROTECTED LEADERBOARD RENDERING & SCORE SUBMISSION
// ============================================================

// ============================================================
// SCREENS
// ============================================================
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.overlay').forEach(s=>s.classList.remove('active'));
  const hud=document.getElementById('hud'),bc=document.getElementById('boardControls');
  if(name==='menu'){document.getElementById('menuScreen').classList.add('active');hud.style.display='none';bc.style.display='none';state.screen='menu';renderMenuLeaderboard()}
  else if(name==='game'){hud.style.display='flex';bc.style.display='flex';state.screen='game'}
  else if(name==='levelComplete'){document.getElementById('levelComplete').classList.add('active');state.screen='levelComplete'}
  else if(name==='gameOver'){document.getElementById('gameOver').classList.add('active');state.screen='gameOver';renderLeaderboard('goLB',5)}
}

// ============================================================
// GAME FLOW
// ============================================================
function startGame(){
  initAudio();state.level=0;state.score=0;state.totalScore=0;
  state.replayTiles=0; // Reset replay tiles on new run
  startLevel();
}

function startLevel(){
  const lv=LEVELS[state.level];state.gridCols=lv.cols;state.gridRows=lv.rows;state.numColors=lv.numColors;
  state.score=0;state.path=[];state.particles=[];state.dragging=false;state.shakeAmount=0;state.shuffling=false;state.shuffleAnims=[];
  state.shuffleAvailable=state.level>=SHUFFLE_UNLOCK_LEVEL;state.shuffleUsed=false;
  recalcGrid();createGrid();ensureGridHasMoves();updateHUD();
  state.timer=lv.time;const te=document.getElementById('hudTimer'),tv=document.getElementById('timerValue');
  tv.textContent=state.timer+'s';te.classList.remove('warn','critical');
  clearInterval(state.timerInterval);state.timerInterval=setInterval(updateTimer,1000);
  showScreen('game');startMusic();
  // Schedule an OOM check after tiles finish spawning in
  setTimeout(()=>checkForOutOfMoves(),600);
}

function levelComplete(){
  clearInterval(state.timerInterval);stopMusic();sfxLevelComplete();
  document.getElementById('lcScore').textContent=state.score;
  document.getElementById('lcSub').textContent=`Target: ${LEVELS[state.level].target} — Cleared!`;

  // Check if player earns a replay tile for completing this level
  const earnedEl=document.getElementById('lcReplayEarned');
  if(REPLAY_EARN_LEVELS.includes(state.level)){
    state.replayTiles++;
    earnedEl.textContent=`🔄 +1 Replay Tile earned! (${state.replayTiles} total)`;
  } else {
    earnedEl.textContent='';
  }

  showScreen('levelComplete');
}

function nextLevel(){state.level=Math.min(state.level+1,LEVELS.length-1);startLevel()}

async function gameOver(){
  clearInterval(state.timerInterval);stopMusic();sfxFail();
  document.getElementById('goScore').textContent=state.totalScore;
  document.getElementById('goSub').textContent=`Target: ${LEVELS[state.level].target}`;
  document.getElementById('goNameEntry').innerHTML='';

  const btns=document.getElementById('goBtns');
  if(state.replayTiles>0){
    // Has replay tiles — offer replay or end run
    btns.innerHTML=`<button class="btn btn-sm" style="background:var(--purple);box-shadow:0 4px 0 #8a60aa" onclick="useReplayFromGameOver()">Replay 🔄 (${state.replayTiles})</button><button class="btn btn-sm" onclick="endRunAndSubmit()" style="background:var(--text2);box-shadow:0 4px 0 #5a4a3a">End Run</button>`;
    showScreen('gameOver');
  } else {
    // No replay tiles — final game over
    btns.innerHTML=`<button class="btn btn-sm" onclick="backToMenu()">Back to Menu</button>`;
    showScreen('gameOver');
    await showNameEntryIfQualified(state.totalScore);
  }
}

function useReplayFromGameOver(){
  if(state.replayTiles<=0)return;
  state.replayTiles--;
  document.getElementById('gameOver').classList.remove('active');
  startLevel();
}

async function endRunAndSubmit(){
  document.getElementById('goBtns').innerHTML=`<button class="btn btn-sm" onclick="backToMenu()">Back to Menu</button>`;
  await showNameEntryIfQualified(state.totalScore);
}

function backToMenu(){clearInterval(state.timerInterval);stopMusic();showScreen('menu')}

// ============================================================
// INIT
// ============================================================
(async function initGame() {
  initFirebase();
  resizeCanvas();
  await renderMenuLeaderboard();
  render();
})();
</script>
</body>
</html>
